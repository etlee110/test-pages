- id: '2603.09951'
  title: Towards a Neural Debugger for Python
  authors: Maximilian Beck, Jonas Gehring, Jannik Kossen, Gabriel Synnaeve
  abstract: 'Training large language models (LLMs) on Python execution traces grounds
    them in code execution and enables the line-by-line execution prediction of whole
    Python programs, effectively turning them into neural interpreters (FAIR CodeGen
    Team et al., 2025). However, developers rarely execute programs step by step;
    instead, they use debuggers to stop execution at certain breakpoints and step
    through relevant portions only while inspecting or modifying program variables.
    Existing neural interpreter approaches lack such interactive control. To address
    this limitation, we introduce neural debuggers: language models that emulate traditional
    debuggers, supporting operations such as stepping into, over, or out of functions,
    as well as setting breakpoints at specific source lines. We show that neural debuggers
    -- obtained via fine-tuning large LLMs or pre-training smaller models from scratch
    -- can reliably model both forward execution (predicting future states and outputs)
    and inverse execution (inferring prior states or inputs) conditioned on debugger
    actions. Evaluated on CruxEval, our models achieve strong performance on both
    output and input prediction tasks, demonstrating robust conditional execution
    modeling. Our work takes first steps towards future agentic coding systems in
    which neural debuggers serve as a world model for simulated debugging environments,
    providing execution feedback or enabling agents to interact with real debugging
    tools. This capability lays the foundation for more powerful code generation,
    program understanding, and automated debugging.'
  published: '2026-03-10'
  pdf_url: http://arxiv.org/pdf/2603.09951
  arxiv_url: http://arxiv.org/abs/2603.09951
  key_findings: Training large language models (LLMs) on Python execution traces grounds
    them in code execution and enables the line-by-line execution prediction of whole
    Python programs, effectively turning them into neural interpreters (FAIR CodeGen
    Team et al. , 2025). However, developers rarely execute programs step by step;
    instead, they use debuggers to stop execution at certain breakpoints and step
    through relevant portions only while inspecting or modifying program variables.
- id: '2603.09950'
  title: 'When Learning Rates Go Wrong: Early Structural Signals in PPO Actor-Critic'
  authors: Alberto Fernández-Hernández, Cristian Pérez-Corral, Jose I. Mestre, Manuel
    F. Dolz, Jose Duato, Enrique S. Quintana-Ortí
  abstract: 'Deep Reinforcement Learning systems are highly sensitive to the learning
    rate (LR), and selecting stable and performant training runs often requires extensive
    hyperparameter search. In Proximal Policy Optimization (PPO) actor--critic methods,
    small LR values lead to slow convergence, whereas large LR values may induce instability
    or collapse. We analyse this phenomenon from the behavior of the hidden neurons
    in the network using the Overfitting-Underfitting Indicator (OUI), a metric that
    quantifies the balance of binary activation patterns over a fixed probe batch.
    We introduce an efficient batch-based formulation of OUI and derive a theoretical
    connection between LR and activation sign changes, clarifying how a correct evolution
    of the neuron''s inner structure depends on the step size. Empirically, across
    three discrete-control environments and multiple seeds, we show that OUI measured
    at only 10\% of training already discriminates between LR regimes. We observe
    a consistent asymmetry: critic networks achieving highest return operate in an
    intermediate OUI band (avoiding saturation), whereas actor networks achieving
    highest return exhibit comparatively high OUI values. We then compare OUI-based
    screening rules against early return, clip-based, divergence-based, and flip-based
    criteria under matched recall over successful runs. In this setting, OUI provides
    the strongest early screening signal: OUI alone achieves the best precision at
    broader recall, while combining early return with OUI yields the highest precision
    in best-performing screening regimes, enabling aggressive pruning of unpromising
    runs without requiring full training.'
  published: '2026-03-10'
  pdf_url: http://arxiv.org/pdf/2603.09950
  arxiv_url: http://arxiv.org/abs/2603.09950
  key_findings: Deep Reinforcement Learning systems are highly sensitive to the learning
    rate (LR), and selecting stable and performant training runs often requires extensive
    hyperparameter search. In Proximal Policy Optimization (PPO) actor--critic methods,
    small LR values lead to slow convergence, whereas large LR values may induce instability
    or collapse. We analyse this phenomenon from the behavior of the hidden neurons
    in the network using the Overfitting-Underfitting Indicator (OUI), a metric that
    quantifies the balance of binary activation patterns over a fixed probe batch.
- id: '2603.09947'
  title: 'The Confidence Gate Theorem: When Should Ranked Decision Systems Abstain?'
  authors: Ronald Doku
  abstract: 'Ranked decision systems -- recommenders, ad auctions, clinical triage
    queues -- must decide when to intervene in ranked outputs and when to abstain.
    We study when confidence-based abstention monotonically improves decision quality,
    and when it fails. The formal conditions are simple: rank-alignment and no inversion
    zones. The substantive contribution is identifying why these conditions hold or
    fail: the distinction between structural uncertainty (missing data, e.g., cold-start)
    and contextual uncertainty (missing context, e.g., temporal drift). Empirically,
    we validate this distinction across three domains: collaborative filtering (MovieLens,
    3 distribution shifts), e-commerce intent detection (RetailRocket, Criteo, Yoochoose),
    and clinical pathway triage (MIMIC-IV). Structural uncertainty produces near-monotonic
    abstention gains in all domains; structurally grounded confidence signals (observation
    counts) fail under contextual drift, producing as many monotonicity violations
    as random abstention on our MovieLens temporal split. Context-aware alternatives
    -- ensemble disagreement and recency features -- substantially narrow the gap
    (reducing violations from 3 to 1--2) but do not fully restore monotonicity, suggesting
    that contextual uncertainty poses qualitatively different challenges. Exception
    labels defined from residuals degrade substantially under distribution shift (AUC
    drops from 0.71 to 0.61--0.62 across three splits), providing a clean negative
    result against the common practice of exception-based intervention. The results
    provide a practical deployment diagnostic: check C1 and C2 on held-out data before
    deploying a confidence gate, and match the confidence signal to the dominant uncertainty
    type.'
  published: '2026-03-10'
  pdf_url: http://arxiv.org/pdf/2603.09947
  arxiv_url: http://arxiv.org/abs/2603.09947
  key_findings: 'Ranked decision systems -- recommenders, ad auctions, clinical triage
    queues -- must decide when to intervene in ranked outputs and when to abstain.
    We study when confidence-based abstention monotonically improves decision quality,
    and when it fails. The formal conditions are simple: rank-alignment and no inversion
    zones.'
- id: '2603.09945'
  title: 'No Image, No Problem: End-to-End Multi-Task Cardiac Analysis from Undersampled
    k-Space'
  authors: Yundi Zhang, Sevgi Gokce Kafali, Niklas Bubeck, Daniel Rueckert, Jiazhen
    Pan
  abstract: 'Conventional clinical CMR pipelines rely on a sequential "reconstruct-then-analyze"
    paradigm, forcing an ill-posed intermediate step that introduces avoidable artifacts
    and information bottlenecks. This creates a fundamental mathematical paradox:
    it attempts to recover high-dimensional pixel arrays (i.e., images) from undersampled
    k-space, rather than directly extracting the low-dimensional physiological labels
    actually required for diagnosis. To unlock the direct diagnostic potential of
    k-space, we propose k-MTR (k-space Multi-Task Representation), a k-space representation
    learning framework that aligns undersampled k-space data and fully-sampled images
    into a shared semantic manifold. Leveraging a large-scale controlled simulation
    of 42,000 subjects, k-MTR forces the k-space encoder to restore anatomical information
    lost to undersampling directly within the latent space, bypassing the explicit
    inverse problem for downstream analysis. We demonstrate that this latent alignment
    enables the dense latent space embedded with high-level physiological semantics
    directly from undersampled frequencies. Across continuous phenotype regression,
    disease classification, and anatomical segmentation, k-MTR achieves highly competitive
    performance against state-of-the-art image-domain baselines. By showcasing that
    precise spatial geometries and multi-task features can be successfully recovered
    directly from the k-space representations, k-MTR provides a robust architectural
    blueprint for task-aware cardiac MRI workflows.'
  published: '2026-03-10'
