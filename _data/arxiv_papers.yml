- id: '2603.01712'
  title: 'FT-Dojo: Towards Autonomous LLM Fine-Tuning with Language Agents'
  authors: Qizheng Li, Yifei Zhang, Xiao Yang, Xu Yang, Zhuo Wang, Weiqing Liu, Jiang
    Bian
  abstract: 'Fine-tuning large language models for vertical domains remains a labor-intensive
    and expensive process, requiring domain experts to curate data, configure training,
    and iteratively diagnose model behavior. Despite growing interest in autonomous
    machine learning, no prior work has tackled end-to-end LLM fine-tuning with agents.
    Can LLM-based agents automate this complete process? We frame this as a substantially
    open problem: agents must navigate an open-ended search space spanning data curation
    from diverse data sources, processing with complex tools, building a training
    pipeline, and iteratively refining their approach based on evaluation outcomes
    in rapidly growing logs--an overall scenario far more intricate than existing
    benchmarks. To study this question, we introduce FT-Dojo, an interactive environment
    comprising 13 tasks across 5 domains. We further develop FT-Agent, an autonomous
    system that mirrors human experts by leveraging evaluation-driven feedback to
    iteratively diagnose failures and refine fine-tuning strategies. Experiments on
    FT-Dojo demonstrate that purpose-built fine-tuning agents significantly outperform
    general-purpose alternatives, with FT-Agent achieving the best performance on
    10 out of 13 tasks across all five domains. Ablations show that the approach generalizes
    effectively to 3B models, with additional insights on data scaling trade-offs
    and backbone sensitivity. Case analyses reveal that agents can recover from failures
    through cumulative learning from historical experience, while also exposing fundamental
    limitations in causal reasoning--highlighting both the promise and current boundaries
    of autonomous LLM fine-tuning.'
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.01712
  arxiv_url: http://arxiv.org/abs/2603.01712
  key_findings: Fine-tuning large language models for vertical domains remains a labor-intensive
    and expensive process, requiring domain experts to curate data, configure training,
    and iteratively diagnose model behavior. Despite growing interest in autonomous
    machine learning, no prior work has tackled end-to-end LLM fine-tuning with agents.
    Can LLM-based agents automate this complete process.
- id: '2603.01698'
  title: 'Towards Principled Dataset Distillation: A Spectral Distribution Perspective'
  authors: Ruixi Wu, Shaobo Wang, Jiahuan Chen, Zhiyuan Liu, Yicun Yang, Zhaorun Chen,
    Zekai Li, Kaixin Li, Xinming Wang, Hongzhu Yi, Kai Wang, Linfeng Zhang
  abstract: 'Dataset distillation (DD) aims to compress large-scale datasets into
    compact synthetic counterparts for efficient model training. However, existing
    DD methods exhibit substantial performance degradation on long-tailed datasets.
    We identify two fundamental challenges: heuristic design choices for distribution
    discrepancy measure and uniform treatment of imbalanced classes. To address these
    limitations, we propose Class-Aware Spectral Distribution Matching (CSDM), which
    reformulates distribution alignment via the spectrum of a well-behaved kernel
    function. This technique maps the original samples into frequency space, resulting
    in the Spectral Distribution Distance (SDD). To mitigate class imbalance, we exploit
    the unified form of SDD to perform amplitude-phase decomposition, which adaptively
    prioritizes the realism in tail classes. On CIFAR-10-LT, with 10 images per class,
    CSDM achieves a 14.0% improvement over state-of-the-art DD methods, with only
    a 5.7% performance drop when the number of images in tail classes decreases from
    500 to 25, demonstrating strong stability on long-tailed data.'
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.01698
  arxiv_url: http://arxiv.org/abs/2603.01698
  key_findings: 'Dataset distillation (DD) aims to compress large-scale datasets into
    compact synthetic counterparts for efficient model training. However, existing
    DD methods exhibit substantial performance degradation on long-tailed datasets.
    We identify two fundamental challenges: heuristic design choices for distribution
    discrepancy measure and uniform treatment of imbalanced classes.'
- id: '2603.01697'
  title: 'DynaMoE: Dynamic Token-Level Expert Activation with Layer-Wise Adaptive
    Capacity for Mixture-of-Experts Neural Networks'
  authors: Gökdeniz Gülmez
  abstract: 'Mixture-of-Experts (MoE) architectures have emerged as a powerful paradigm
    for scaling neural networks while maintaining computational efficiency. However,
    standard MoE implementations rely on two rigid design assumptions: (1) fixed Top-K
    routing where exactly K experts are activated per token, and (2) uniform expert
    allocation across all layers. This paper introduces DynaMoE, a novel MoE framework
    that relaxes both constraints through dynamic token-level expert activation and
    layer-wise adaptive capacity allocation. DynaMoE introduces a principled routing
    mechanism where the number of active experts per token varies based on input complexity.
    Concurrently, the framework implements six distinct scheduling strategies for
    distributing expert capacity across network depth, including descending, ascending,
    pyramid, and wave patterns. We theoretically analyze the expressivity gains of
    dynamic routing and derive bounds on computational efficiency. Through extensive
    experiments on MNIST, Fashion-MNIST, CIFAR-10 (image classification), and Recycling-the-Web
    (language modeling) across multiple model scales, we demonstrate that DynaMoE
    achieves superior parameter efficiency compared to static baselines. Our key finding
    is that optimal expert schedules are task- and scale-dependent: descending schedules
    (concentrating capacity in early layers) outperform uniform baselines on image
    classification. For language modeling, optimal schedules vary by model size, descending
    for Tiny, ascending for Small, and uniform for Medium. Furthermore, dynamic routing
    reduces gradient variance during training, leading to improved convergence stability.
    DynaMoE establishes a new framework for adaptive computation in neural networks,
    providing principled guidance for MoE architecture design.'
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.01697
  arxiv_url: http://arxiv.org/abs/2603.01697
  key_findings: 'Mixture-of-Experts (MoE) architectures have emerged as a powerful
    paradigm for scaling neural networks while maintaining computational efficiency.
    However, standard MoE implementations rely on two rigid design assumptions: (1)
    fixed Top-K routing where exactly K experts are activated per token, and (2) uniform
    expert allocation across all layers. This paper introduces DynaMoE, a novel MoE
    framework that relaxes both constraints through dynamic token-level expert activation
    and layer-wise adaptive capacity allocation.'
- id: '2603.01696'
  title: 'Cross-modal Identity Mapping: Minimizing Information Loss in Modality Conversion
    via Reinforcement Learning'
  authors: Haonan Jia, Shichao Dong, Xin Dong, Zenghui Sun, Jin Wang, Jinsong Lan,
    Xiaoyong Zhu, Bo Zheng, Kaifu Zhang
  abstract: 'Large Vision-Language Models (LVLMs) often omit or misrepresent critical
    visual content in generated image captions. Minimizing such information loss will
    force LVLMs to focus on image details to generate precise descriptions. However,
    measuring information loss during modality conversion is inherently challenging
    due to the modal gap between visual content and text output. In this paper, we
    argue that the quality of an image caption is positively correlated with the similarity
    between images retrieved via text search using that caption. Based on this insight,
    we further propose Cross-modal Identity Mapping (CIM), a reinforcement learning
    framework that enhances image captioning without requiring additional annotations.
    Specifically, the method quantitatively evaluates the information loss from two
    perspectives: Gallery Representation Consistency and Query-gallery Image Relevance.
    Supervised under these metrics, LVLM minimizes information loss and aims to achieve
    identity mapping from images to captions. The experimental results demonstrate
    the superior performance of our method in image captioning, even when compared
    with Supervised Fine-Tuning. Particularly, on the COCO-LN500 benchmark, CIM achieves
    a 20% improvement in relation reasoning on Qwen2.5-VL-7B.The code will be released
    when the paper is accepted.'
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.01696
  arxiv_url: http://arxiv.org/abs/2603.01696
  key_findings: Large Vision-Language Models (LVLMs) often omit or misrepresent critical
    visual content in generated image captions. Minimizing such information loss will
    force LVLMs to focus on image details to generate precise descriptions. However,
    measuring information loss during modality conversion is inherently challenging
    due to the modal gap between visual content and text output.
