- id: '2603.04390'
  title: A Dual-Helix Governance Approach Towards Reliable Agentic AI for WebGIS Development
  authors: ' Boyuan,  Guan, Wencong Cui, Levente Juhasz'
  abstract: 'WebGIS development requires rigor, yet agentic AI frequently fails due
    to five large language model (LLM) limitations: context constraints, cross-session
    forgetting, stochasticity, instruction failure, and adaptation rigidity. We propose
    a dual-helix governance framework reframing these challenges as structural governance
    problems that model capacity alone cannot resolve. We implement the framework
    as a 3-track architecture (Knowledge, Behavior, Skills) that uses a knowledge
    graph substrate to stabilize execution by externalizing domain facts and enforcing
    executable protocols, complemented by a self-learning cycle for autonomous knowledge
    growth. Applying this to the FutureShorelines WebGIS tool, a governed agent refactored
    a 2,265-line monolithic codebase into modular ES6 components. Results demonstrated
    a 51\% reduction in cyclomatic complexity and a 7-point increase in maintainability
    index. A comparative experiment against a zero-shot LLM confirms that externalized
    governance, not just model capability, drives operational reliability in geospatial
    engineering. This approach is implemented in the open-source AgentLoom governance
    toolkit.'
  published: '2026-03-04'
  pdf_url: http://arxiv.org/pdf/2603.04390
  arxiv_url: http://arxiv.org/abs/2603.04390
  key_findings: 'WebGIS development requires rigor, yet agentic AI frequently fails
    due to five large language model (LLM) limitations: context constraints, cross-session
    forgetting, stochasticity, instruction failure, and adaptation rigidity. We propose
    a dual-helix governance framework reframing these challenges as structural governance
    problems that model capacity alone cannot resolve. We implement the framework
    as a 3-track architecture (Knowledge, Behavior, Skills) that uses a knowledge
    graph substrate to stabilize execution by externalizing domain facts and enforcing
    executable protocols, complemented by a self-learning cycle for autonomous knowledge
    growth.'
- id: '2603.04385'
  title: 'ZipMap: Linear-Time Stateful 3D Reconstruction with Test-Time Training'
  authors: Haian Jin, Rundi Wu, Tianyuan Zhang, Ruiqi Gao, Jonathan T. Barron, Noah
    Snavely, Aleksander Holynski
  abstract: Feed-forward transformer models have driven rapid progress in 3D vision,
    but state-of-the-art methods such as VGGT and $π^3$ have a computational cost
    that scales quadratically with the number of input images, making them inefficient
    when applied to large image collections. Sequential-reconstruction approaches
    reduce this cost but sacrifice reconstruction quality. We introduce ZipMap, a
    stateful feed-forward model that achieves linear-time, bidirectional 3D reconstruction
    while matching or surpassing the accuracy of quadratic-time methods. ZipMap employs
    test-time training layers to zip an entire image collection into a compact hidden
    scene state in a single forward pass, enabling reconstruction of over 700 frames
    in under 10 seconds on a single H100 GPU, more than $20\times$ faster than state-of-the-art
    methods such as VGGT. Moreover, we demonstrate the benefits of having a stateful
    representation in real-time scene-state querying and its extension to sequential
    streaming reconstruction.
  published: '2026-03-04'
  pdf_url: http://arxiv.org/pdf/2603.04385
  arxiv_url: http://arxiv.org/abs/2603.04385
  key_findings: Feed-forward transformer models have driven rapid progress in 3D vision,
    but state-of-the-art methods such as VGGT and $π^3$ have a computational cost
    that scales quadratically with the number of input images, making them inefficient
    when applied to large image collections. Sequential-reconstruction approaches
    reduce this cost but sacrifice reconstruction quality. We introduce ZipMap, a
    stateful feed-forward model that achieves linear-time, bidirectional 3D reconstruction
    while matching or surpassing the accuracy of quadratic-time methods.
- id: '2603.04378'
  title: Robustness of Agentic AI Systems via Adversarially-Aligned Jacobian Regularization
  authors: Furkan Mumcu, Yasin Yilmaz
  abstract: As Large Language Models (LLMs) transition into autonomous multi-agent
    ecosystems, robust minimax training becomes essential yet remains prone to instability
    when highly non-linear policies induce extreme local curvature in the inner maximization.
    Standard remedies that enforce global Jacobian bounds are overly conservative,
    suppressing sensitivity in all directions and inducing a large Price of Robustness.
    We introduce Adversarially-Aligned Jacobian Regularization (AAJR), a trajectory-aligned
    approach that controls sensitivity strictly along adversarial ascent directions.
    We prove that AAJR yields a strictly larger admissible policy class than global
    constraints under mild conditions, implying a weakly smaller approximation gap
    and reduced nominal performance degradation. Furthermore, we derive step-size
    conditions under which AAJR controls effective smoothness along optimization trajectories
    and ensures inner-loop stability. These results provide a structural theory for
    agentic robustness that decouples minimax stability from global expressivity restrictions.
  published: '2026-03-04'
  pdf_url: http://arxiv.org/pdf/2603.04378
  arxiv_url: http://arxiv.org/abs/2603.04378
  key_findings: As Large Language Models (LLMs) transition into autonomous multi-agent
    ecosystems, robust minimax training becomes essential yet remains prone to instability
    when highly non-linear policies induce extreme local curvature in the inner maximization.
    Standard remedies that enforce global Jacobian bounds are overly conservative,
    suppressing sensitivity in all directions and inducing a large Price of Robustness.
    We introduce Adversarially-Aligned Jacobian Regularization (AAJR), a trajectory-aligned
    approach that controls sensitivity strictly along adversarial ascent directions.
- id: '2603.04370'
  title: '$τ$-Knowledge: Evaluating Conversational Agents over Unstructured Knowledge'
  authors: Quan Shi, Alexandra Zytek, Pedram Razavi, Karthik Narasimhan, Victor Barres
  abstract: Conversational agents are increasingly deployed in knowledge-intensive
    settings, where correct behavior depends on retrieving and applying domain-specific
    knowledge from large, proprietary, and unstructured corpora during live interactions
    with users. Yet most existing benchmarks evaluate retrieval or tool use independently
    of each other, creating a gap in realistic, fully agentic evaluation over unstructured
    data in long-horizon interactions. We introduce $τ$-Knowledge, an extension of
    $τ$-Bench for evaluating agents in environments where success depends on coordinating
    external, natural-language knowledge with tool outputs to produce verifiable,
    policy-compliant state changes. Our new domain, $τ$-Banking, models realistic
    fintech customer support workflows in which agents must navigate roughly 700 interconnected
    knowledge documents while executing tool-mediated account updates. Across embedding-based
    retrieval and terminal-based search, even frontier models with high reasoning
    budgets achieve only $\sim$25.5% pass^1, with reliability degrading sharply over
    repeated trials. Agents struggle to retrieve the correct documents from densely
    interlinked knowledge bases and to reason accurately over complex internal policies.
    Overall, $τ$-Knowledge provides a realistic testbed for developing agents that
    integrate unstructured knowledge in human-facing deployments.
  published: '2026-03-04'
  pdf_url: http://arxiv.org/pdf/2603.04370
  arxiv_url: http://arxiv.org/abs/2603.04370
  key_findings: Conversational agents are increasingly deployed in knowledge-intensive
    settings, where correct behavior depends on retrieving and applying domain-specific
    knowledge from large, proprietary, and unstructured corpora during live interactions
    with users. Yet most existing benchmarks evaluate retrieval or tool use independently
    of each other, creating a gap in realistic, fully agentic evaluation over unstructured
    data in long-horizon interactions. We introduce $τ$-Knowledge, an extension of
    $τ$-Bench for evaluating agents in environments where success depends on coordinating
    external, natural-language knowledge with tool outputs to produce verifiable,
    policy-compliant state changes.
- id: '2603.04366'
  title: Low-Resource Guidance for Controllable Latent Audio Diffusion
  authors: Zachary Novack, Zack Zukowski, CJ Carr, Julian Parker, Zach Evans, Josiah
    Taylor, Taylor Berg-Kirkpatrick, Julian McAuley, Jordi Pons
  abstract: Generative audio requires fine-grained controllable outputs, yet most
    existing methods require model retraining on specific controls or inference-time
    controls (\textit{e.g.}, guidance) that can also be computationally demanding.
    By examining the bottlenecks of existing guidance-based controls, in particular
    their high cost-per-step due to decoder backpropagation, we introduce a guidance-based
    approach through selective TFG and Latent-Control Heads (LatCHs), which enables
    controlling latent audio diffusion models with low computational overhead. LatCHs
    operate directly in latent space, avoiding the expensive decoder step, and requiring
    minimal training resources (7M parameters and $\approx$ 4 hours of training).
    Experiments with Stable Audio Open demonstrate effective control over intensity,
    pitch, and beats (and a combination of those) while maintaining generation quality.
    Our method balances precision and audio fidelity with far lower computational
    costs than standard end-to-end guidance. Demo examples can be found at https://zacharynovack.github.io/latch/latch.html.
  published: '2026-03-04'
  pdf_url: http://arxiv.org/pdf/2603.04366
  arxiv_url: http://arxiv.org/abs/2603.04366
  key_findings: Generative audio requires fine-grained controllable outputs, yet most
    existing methods require model retraining on specific controls or inference-time
    controls (\textit{e. g. }, guidance) that can also be computationally demanding.
- id: '2603.04364'
  title: 'Dual-Modality Multi-Stage Adversarial Safety Training: Robustifying Multimodal
    Web Agents Against Cross-Modal Attacks'
  authors: Haoyu Liu, Dingcheng Li, Lukas Rutishauser, Zeyu Zheng
  abstract: 'Multimodal web agents that process both screenshots and accessibility
    trees are increasingly deployed to interact with web interfaces, yet their dual-stream
    architecture opens an underexplored attack surface: an adversary who injects content
    into the webpage DOM simultaneously corrupts both observation channels with a
    consistent deceptive narrative. Our vulnerability analysis on MiniWob++ reveals
    that attacks including a visual component far outperform text-only injections,
    exposing critical gaps in text-centric VLM safety training. Motivated by this
    finding, we propose Dual-Modality Multi-Stage Adversarial Safety Training (DMAST),
    a framework that formalizes the agent-attacker interaction as a two-player zero-sum
    Markov game and co-trains both players through a three-stage pipeline: (1) imitation
    learning from a strong teacher model, (2) oracle-guided supervised fine-tuning
    that uses a novel zero-acknowledgment strategy to instill task-focused reasoning
    under adversarial noise, and (3) adversarial reinforcement learning via Group
    Relative Policy Optimization (GRPO) self-play. On out-of-distribution tasks, DMAST
    substantially mitigates adversarial risks while simultaneously doubling task completion
    efficiency. Our approach significantly outperforms established training-based
    and prompt-based defenses, demonstrating genuine co-evolutionary progress and
    robust generalization to complex, unseen environments.'
  published: '2026-03-04'
  pdf_url: http://arxiv.org/pdf/2603.04364
  arxiv_url: http://arxiv.org/abs/2603.04364
  key_findings: 'Multimodal web agents that process both screenshots and accessibility
    trees are increasingly deployed to interact with web interfaces, yet their dual-stream
    architecture opens an underexplored attack surface: an adversary who injects content
    into the webpage DOM simultaneously corrupts both observation channels with a
    consistent deceptive narrative. Our vulnerability analysis on MiniWob++ reveals
    that attacks including a visual component far outperform text-only injections,
    exposing critical gaps in text-centric VLM safety training. Motivated by this
    finding, we propose Dual-Modality Multi-Stage Adversarial Safety Training (DMAST),
    a framework that formalizes the agent-attacker interaction as a two-player zero-sum
    Markov game and co-trains both players through a three-stage pipeline: (1) imitation
    learning from a strong teacher model, (2) oracle-guided supervised fine-tuning
    that uses a novel zero-acknowledgment strategy to instill task-focused reasoning
    under adversarial noise, and (3) adversarial reinforcement learning via Group
    Relative Policy Optimization (GRPO) self-play.'
- id: '2603.04359'
  title: 'Dissecting Quantization Error: A Concentration-Alignment Perspective'
  authors: Marco Federici, Boris van Breugel, Paul Whatmough, Markus Nagel
  abstract: 'Quantization can drastically increase the efficiency of large language
    and vision models, but typically incurs an accuracy drop. Recently, function-preserving
    transforms (e.g. rotations, Hadamard transform, channel-wise scaling) have been
    successfully applied to reduce post-training quantization error, yet a principled
    explanation remains elusive. We analyze linear-layer quantization via the signal-to-quantization-noise
    ratio (SQNR), showing that for uniform integer quantization at a fixed bit width,
    SQNR decomposes into (i) the concentration of weights and activations (capturing
    spread and outliers), and (ii) the alignment of their dominant variation directions.
    This reveals an actionable insight: beyond concentration - the focus of most prior
    transforms (e.g. rotations or Hadamard) - improving alignment between weight and
    activation can further reduce quantization error. Motivated by this, we introduce
    block Concentration-Alignment Transforms (CAT), a lightweight linear transformation
    that uses a covariance estimate from a small calibration set to jointly improve
    concentration and alignment, approximately maximizing SQNR. Experiments across
    several LLMs show that CAT consistently matches or outperforms prior transform-based
    quantization methods at 4-bit precision, confirming the insights gained in our
    framework.'
