- id: '2603.02175'
  title: 'Kiwi-Edit: Versatile Video Editing via Instruction and Reference Guidance'
  authors: Yiqi Lin, Guoqiang Liang, Ziyun Zeng, Zechen Bai, Yanzhe Chen, Mike Zheng
    Shou
  abstract: Instruction-based video editing has witnessed rapid progress, yet current
    methods often struggle with precise visual control, as natural language is inherently
    limited in describing complex visual nuances. Although reference-guided editing
    offers a robust solution, its potential is currently bottlenecked by the scarcity
    of high-quality paired training data. To bridge this gap, we introduce a scalable
    data generation pipeline that transforms existing video editing pairs into high-fidelity
    training quadruplets, leveraging image generative models to create synthesized
    reference scaffolds. Using this pipeline, we construct RefVIE, a large-scale dataset
    tailored for instruction-reference-following tasks, and establish RefVIE-Bench
    for comprehensive evaluation. Furthermore, we propose a unified editing architecture,
    Kiwi-Edit, that synergizes learnable queries and latent visual features for reference
    semantic guidance. Our model achieves significant gains in instruction following
    and reference fidelity via a progressive multi-stage training curriculum. Extensive
    experiments demonstrate that our data and architecture establish a new state-of-the-art
    in controllable video editing. All datasets, models, and code is released at https://github.com/showlab/Kiwi-Edit.
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.02175
  arxiv_url: http://arxiv.org/abs/2603.02175
  key_findings: Instruction-based video editing has witnessed rapid progress, yet
    current methods often struggle with precise visual control, as natural language
    is inherently limited in describing complex visual nuances. Although reference-guided
    editing offers a robust solution, its potential is currently bottlenecked by the
    scarcity of high-quality paired training data. To bridge this gap, we introduce
    a scalable data generation pipeline that transforms existing video editing pairs
    into high-fidelity training quadruplets, leveraging image generative models to
    create synthesized reference scaffolds.
- id: '2603.02170'
  title: 'SageBwd: A Trainable Low-bit Attention'
  authors: Jintao Zhang, Marco Chen, Haoxu Wang, Kai Jiang, Ion Stoica, Joseph E.
    Gonzalez, Jianfei Chen, Jun Zhu
  abstract: 'Low-bit attention, such as SageAttention, has emerged as an effective
    approach for accelerating model inference, but its applicability to training remains
    poorly understood. In prior work, we introduced SageBwd, a trainable INT8 attention
    that quantizes six of seven attention matrix multiplications while preserving
    fine-tuning performance. However, SageBwd exhibited a persistent performance gap
    to full-precision attention (FPA) during pre-training. In this work, we investigate
    why this gap occurs and demonstrate that SageBwd matches full-precision attention
    during pretraining. Through experiments and theoretical analysis, we reach a few
    important insights and conclusions: (i) QK-norm is necessary for stable training
    at large tokens per step, (ii) quantization errors primarily arise from the backward-pass
    score gradient dS, (iii) reducing tokens per step enables SageBwd to match FPA
    performance in pre-training, and (iv) K-smoothing remains essential for training
    stability, while Q-smoothing provides limited benefit during pre-training.'
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.02170
  arxiv_url: http://arxiv.org/abs/2603.02170
  key_findings: Low-bit attention, such as SageAttention, has emerged as an effective
    approach for accelerating model inference, but its applicability to training remains
    poorly understood. In prior work, we introduced SageBwd, a trainable INT8 attention
    that quantizes six of seven attention matrix multiplications while preserving
    fine-tuning performance. However, SageBwd exhibited a persistent performance gap
    to full-precision attention (FPA) during pre-training.
