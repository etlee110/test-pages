- id: '2603.13154'
  title: 'ESG-Bench: Benchmarking Long-Context ESG Reports for Hallucination Mitigation'
  authors: Siqi Sun, Ben Peng Wu, Mali Jin, Peizhen Bai, Hanpei Zhang, Xingyi Song
  abstract: 'As corporate responsibility increasingly incorporates environmental,
    social, and governance (ESG) criteria, ESG reporting is becoming a legal requirement
    in many regions and a key channel for documenting sustainability practices and
    assessing firms'' long-term and ethical performance. However, the length and complexity
    of ESG disclosures make them difficult to interpret and automate the analysis
    reliably. To support scalable and trustworthy analysis, this paper introduces
    ESG-Bench, a benchmark dataset for ESG report understanding and hallucination
    mitigation in large language models (LLMs). ESG-Bench contains human-annotated
    question-answer (QA) pairs grounded in real-world ESG report contexts, with fine-grained
    labels indicating whether model outputs are factually supported or hallucinated.
    Framing ESG report analysis as a QA task with verifiability constraints enables
    systematic evaluation of LLMs'' ability to extract and reason over ESG content
    and provides a new use case: mitigating hallucinations in socially sensitive,
    compliance-critical settings. We design task-specific Chain-of-Thought (CoT) prompting
    strategies and fine-tune multiple state-of-the-art LLMs on ESG-Bench using CoT-annotated
    rationales. Our experiments show that these CoT-based methods substantially outperform
    standard prompting and direct fine-tuning in reducing hallucinations, and that
    the gains transfer to existing QA benchmarks beyond the ESG domain.'
  published: '2026-03-13'
  pdf_url: http://arxiv.org/pdf/2603.13154
  arxiv_url: http://arxiv.org/abs/2603.13154
  key_findings: As corporate responsibility increasingly incorporates environmental,
    social, and governance (ESG) criteria, ESG reporting is becoming a legal requirement
    in many regions and a key channel for documenting sustainability practices and
    assessing firms' long-term and ethical performance. However, the length and complexity
    of ESG disclosures make them difficult to interpret and automate the analysis
    reliably. To support scalable and trustworthy analysis, this paper introduces
    ESG-Bench, a benchmark dataset for ESG report understanding and hallucination
    mitigation in large language models (LLMs).
- id: '2603.13134'
  title: 'When Right Meets Wrong: Bilateral Context Conditioning with Reward-Confidence
    Correction for GRPO'
  authors: Yu Li, Tian Lan, Zhengling Qi
  abstract: 'Group Relative Policy Optimization (GRPO) has emerged as an effective
    method for training reasoning models. While it computes advantages based on group
    mean, GRPO treats each output as an independent sample during the optimization
    and overlooks a vital structural signal: the natural contrast between correct
    and incorrect solutions within the same group, thus ignoring the rich, comparative
    data that could be leveraged by explicitly pitting successful reasoning traces
    against failed ones. To capitalize on this, we present a contrastive reformulation
    of GRPO, showing that the GRPO objective implicitly maximizes the margin between
    the policy ratios of correct and incorrect samples. Building on this insight,
    we propose Bilateral Context Conditioning (BICC), a mechanism that allows the
    model to cross-reference successful and failed reasoning traces during the optimization,
    enabling a direct information flow across samples. We further introduce Reward-Confidence
    Correction (RCC) to stabilize training by dynamically adjusts the advantage baseline
    in GRPO using reward-confidence covariance derived from the first-order approximation
    of the variance-minimizing estimator. Both mechanisms require no additional sampling
    or auxiliary models and can be adapted to all GRPO variants. Experiments on mathematical
    reasoning benchmarks demonstrate consistent improvements across comprehensive
    models and algorithms. Code is available at \href{https://github.com/Skylanding/BiCC}{https://github.com/Skylanding/BiCC}.'
  published: '2026-03-13'
  pdf_url: http://arxiv.org/pdf/2603.13134
  arxiv_url: http://arxiv.org/abs/2603.13134
  key_findings: 'Group Relative Policy Optimization (GRPO) has emerged as an effective
    method for training reasoning models. While it computes advantages based on group
    mean, GRPO treats each output as an independent sample during the optimization
    and overlooks a vital structural signal: the natural contrast between correct
    and incorrect solutions within the same group, thus ignoring the rich, comparative
    data that could be leveraged by explicitly pitting successful reasoning traces
    against failed ones. To capitalize on this, we present a contrastive reformulation
    of GRPO, showing that the GRPO objective implicitly maximizes the margin between
    the policy ratios of correct and incorrect samples.'
- id: '2603.13131'
  title: 'Steve-Evolving: Open-World Embodied Self-Evolution via Fine-Grained Diagnosis
    and Dual-Track Knowledge Distillation'
  authors: Zhengwei Xie, Zhisheng Chen, Ziyan Weng, Tingyu Wu, Chenglong Li, Vireo
    Zhang, Kun Wang
  abstract: 'Open-world embodied agents must solve long-horizon tasks where the main
    bottleneck is not single-step planning quality but how interaction experience
    is organized and evolved. To this end, we present Steve-Evolving, a non-parametric
    self-evolving framework that tightly couples fine-grained execution diagnosis
    with dual-track knowledge distillation in a closed loop. The method follows three
    phases: Experience Anchoring, Experience Distillation, and Knowledge-Driven Closed-Loop
    Control. In detail, Experience Anchoring solidifies each subgoal attempt into
    a structured experience tuple with a fixed schema (pre-state, action, diagnosis-result,
    and post-state) and organizes it in a three-tier experience space with multi-dimensional
    indices (e.g., condition signatures, spatial hashing, and semantic tags) plus
    rolling summarization for efficient and auditable recall. To ensure sufficient
    information density for attribution, the execution layer provides compositional
    diagnosis signals beyond binary outcomes, including state-difference summaries,
    enumerated failure causes, continuous indicators, and stagnation/loop detection.
    Moreover, successful trajectories of Experience Distillation are generalized into
    reusable skills with explicit preconditions and verification criteria, while failures
    are distilled into executable guardrails that capture root causes and forbid risky
    operations at both subgoal and task granularities. Besides, Knowledge-Driven Closed-Loop
    Control retrieved skills and guardrails are injected into an LLM planner, and
    diagnosis-triggered local replanning updates the active constraints online, forming
    a continual evolution process without any model parameter updates. Experiments
    on the long-horizon suite of Minecraft MCU demonstrate consistent improvements
    over static-retrieval baselines.'
  published: '2026-03-13'
  pdf_url: http://arxiv.org/pdf/2603.13131
  arxiv_url: http://arxiv.org/abs/2603.13131
  key_findings: 'Open-world embodied agents must solve long-horizon tasks where the
    main bottleneck is not single-step planning quality but how interaction experience
    is organized and evolved. To this end, we present Steve-Evolving, a non-parametric
    self-evolving framework that tightly couples fine-grained execution diagnosis
    with dual-track knowledge distillation in a closed loop. The method follows three
    phases: Experience Anchoring, Experience Distillation, and Knowledge-Driven Closed-Loop
    Control.'
- id: '2603.13126'
  title: Developing the PsyCogMetrics AI Lab to Evaluate Large Language Models and
    Advance Cognitive Science -- A Three-Cycle Action Design Science Study
  authors: Zhiye Jin, Yibai Li, K. D. Joshi,  Xuefei,  Deng,  Xiaobing,  Li
  abstract: This study presents the development of the PsyCogMetrics AI Lab (psycogmetrics.ai),
    an integrated, cloud-based platform that operationalizes psychometric and cognitive-science
    methodologies for Large Language Model (LLM) evaluation. Framed as a three-cycle
    Action Design Science study, the Relevance Cycle identifies key limitations in
    current evaluation methods and unfulfilled stakeholder needs. The Rigor Cycle
    draws on kernel theories such as Popperian falsifiability, Classical Test Theory,
    and Cognitive Load Theory to derive deductive design objectives. The Design Cycle
    operationalizes these objectives through nested Build-Intervene-Evaluate loops.
    The study contributes a novel IT artifact, a validated design for LLM evaluation,
    benefiting research at the intersection of AI, psychology, cognitive science,
    and the social and behavioral sciences.
  published: '2026-03-13'
  pdf_url: http://arxiv.org/pdf/2603.13126
  arxiv_url: http://arxiv.org/abs/2603.13126
  key_findings: This study presents the development of the PsyCogMetrics AI Lab (psycogmetrics.
    ai), an integrated, cloud-based platform that operationalizes psychometric and
    cognitive-science methodologies for Large Language Model (LLM) evaluation. Framed
    as a three-cycle Action Design Science study, the Relevance Cycle identifies key
    limitations in current evaluation methods and unfulfilled stakeholder needs.
- id: '2603.13119'
  title: Geometry-Guided Camera Motion Understanding in VideoLLMs
  authors: Haoan Feng, Sri Harsha Musunuri, Guan-Ming Su
  abstract: Camera motion is a fundamental geometric signal that shapes visual perception
    and cinematic style, yet current video-capable vision-language models (VideoLLMs)
    rarely represent it explicitly and often fail on fine-grained motion primitives.
    We address this gap with a framework of $\textbf{benchmarking}$, $\textbf{diagnosis}$,
    and $\textbf{injection}$. We curate $\textbf{CameraMotionDataset}$, a large-scale
    synthetic dataset with explicit camera control, formulate camera motion as constraint-aware
    multi-label recognition, and construct a VQA benchmark--$\textbf{CameraMotionVQA}$.
    Across diverse off-the-shelf VideoLLMs, we observe substantial errors in recognizing
    camera motion primitives. Probing experiments on a Qwen2.5-VL vision encoder suggest
    that camera motion cues are weakly represented, especially in deeper ViT blocks,
    helping explain the observed failure modes. To bridge this gap without costly
    training or fine-tuning, we propose a lightweight, model-agnostic pipeline that
    extracts geometric camera cues from 3D foundation models (3DFMs), predicts constrained
    motion primitives with a temporal classifier, and injects them into downstream
    VideoLLM inference via structured prompting. Experiments demonstrate improved
    motion recognition and more camera-aware model responses, highlighting geometry-driven
    cue extraction and structured prompting as practical steps toward a camera-aware
    VideoLLM and VLA system. The dataset and benchmark is publicly available at https://hf.co/datasets/fengyee/camera-motion-dataset-and-benchmark.
  published: '2026-03-13'
  pdf_url: http://arxiv.org/pdf/2603.13119
  arxiv_url: http://arxiv.org/abs/2603.13119
  key_findings: Camera motion is a fundamental geometric signal that shapes visual
    perception and cinematic style, yet current video-capable vision-language models
    (VideoLLMs) rarely represent it explicitly and often fail on fine-grained motion
    primitives. We address this gap with a framework of $\textbf{benchmarking}$, $\textbf{diagnosis}$,
    and $\textbf{injection}$. We curate $\textbf{CameraMotionDataset}$, a large-scale
    synthetic dataset with explicit camera control, formulate camera motion as constraint-aware
    multi-label recognition, and construct a VQA benchmark--$\textbf{CameraMotionVQA}$.
- id: '2603.13109'
  title: 'BoSS: A Best-of-Strategies Selector as an Oracle for Deep Active Learning'
  authors: Denis Huseljic, Paul Hahn, Marek Herde, Christoph Sandrock, Bernhard Sick
  abstract: Active learning (AL) aims to reduce annotation costs while maximizing
    model performance by iteratively selecting valuable instances. While foundation
    models have made it easier to identify these instances, existing selection strategies
    still lack robustness across different models, annotation budgets, and datasets.
    To highlight the potential weaknesses of existing AL strategies and provide a
    reference point for research, we explore oracle strategies, i.e., strategies that
    approximate the optimal selection by accessing ground-truth information unavailable
    in practical AL scenarios. Current oracle strategies, however, fail to scale effectively
    to large datasets and complex deep neural networks. To tackle these limitations,
    we introduce the Best-of-Strategy Selector (BoSS), a scalable oracle strategy
    designed for large-scale AL scenarios. BoSS constructs a set of candidate batches
    through an ensemble of selection strategies and then selects the batch yielding
    the highest performance gain. As an ensemble of selection strategies, BoSS can
    be easily extended with new state-of-the-art strategies as they emerge, ensuring
    it remains a reliable oracle strategy in the future. Our evaluation demonstrates
    that i) BoSS outperforms existing oracle strategies, ii) state-of-the-art AL strategies
    still fall noticeably short of oracle performance, especially in large-scale datasets
    with many classes, and iii) one possible solution to counteract the inconsistent
    performance of AL strategies might be to employ an ensemble-based approach for
    the selection.
  published: '2026-03-13'
  pdf_url: http://arxiv.org/pdf/2603.13109
  arxiv_url: http://arxiv.org/abs/2603.13109
  key_findings: Active learning (AL) aims to reduce annotation costs while maximizing
    model performance by iteratively selecting valuable instances. While foundation
    models have made it easier to identify these instances, existing selection strategies
    still lack robustness across different models, annotation budgets, and datasets.
