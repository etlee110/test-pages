- id: '2602.18401'
  title: Leakage and Second-Order Dynamics Improve Hippocampal RNN Replay
  authors: Josue Casco-Rodriguez, Nanda H. Krishna, Richard G. Baraniuk
  abstract: 'Biological neural networks (like the hippocampus) can internally generate
    "replay" resembling stimulus-driven activity. Recent computational models of replay
    use noisy recurrent neural networks (RNNs) trained to path-integrate. Replay in
    these networks has been described as Langevin sampling, but new modifiers of noisy
    RNN replay have surpassed this description. We re-examine noisy RNN replay as
    sampling to understand or improve it in three ways: (1) Under simple assumptions,
    we prove that the gradients replay activity should follow are time-varying and
    difficult to estimate, but readily motivate the use of hidden state leakage in
    RNNs for replay. (2) We confirm that hidden state adaptation (negative feedback)
    encourages exploration in replay, but show that it incurs non-Markov sampling
    that also slows replay. (3) We propose the first model of temporally compressed
    replay in noisy path-integrating RNNs through hidden state momentum, connect it
    to underdamped Langevin sampling, and show that, together with adaptation, it
    counters slowness while maintaining exploration. We verify our findings via path-integration
    of 2D triangular and T-maze paths and of high-dimensional paths of synthetic rat
    place cell activity.'
  published: '2026-02-20'
  pdf_url: http://arxiv.org/pdf/2602.18401
  arxiv_url: http://arxiv.org/abs/2602.18401
  key_findings: Biological neural networks (like the hippocampus) can internally generate
    "replay" resembling stimulus-driven activity. Recent computational models of replay
    use noisy recurrent neural networks (RNNs) trained to path-integrate. Replay in
    these networks has been described as Langevin sampling, but new modifiers of noisy
    RNN replay have surpassed this description.
- id: '2602.18386'
  title: 'Learning to Tune Pure Pursuit in Autonomous Racing: Joint Lookahead and
    Steering-Gain Control with PPO'
  authors: Mohamed Elgouhary, Amr S. El-Wakeel
  abstract: Pure Pursuit (PP) is widely used in autonomous racing for real-time path
    tracking due to its efficiency and geometric clarity, yet performance is highly
    sensitive to how key parameters-lookahead distance and steering gain-are chosen.
    Standard velocity-based schedules adjust these only approximately and often fail
    to transfer across tracks and speed profiles. We propose a reinforcement-learning
    (RL) approach that jointly chooses the lookahead Ld and a steering gain g online
    using Proximal Policy Optimization (PPO). The policy observes compact state features
    (speed and curvature taps) and outputs (Ld, g) at each control step. Trained in
    F1TENTH Gym and deployed in a ROS 2 stack, the policy drives PP directly (with
    light smoothing) and requires no per-map retuning. Across simulation and real-car
    tests, the proposed RL-PP controller that jointly selects (Ld, g) consistently
    outperforms fixed-lookahead PP, velocity-scheduled adaptive PP, and an RL lookahead-only
    variant, and it also exceeds a kinematic MPC raceline tracker under our evaluated
    settings in lap time, path-tracking accuracy, and steering smoothness, demonstrating
    that policy-guided parameter tuning can reliably improve classical geometry-based
    control.
  published: '2026-02-20'
  pdf_url: http://arxiv.org/pdf/2602.18386
  arxiv_url: http://arxiv.org/abs/2602.18386
  key_findings: Pure Pursuit (PP) is widely used in autonomous racing for real-time
    path tracking due to its efficiency and geometric clarity, yet performance is
    highly sensitive to how key parameters-lookahead distance and steering gain-are
    chosen. Standard velocity-based schedules adjust these only approximately and
    often fail to transfer across tracks and speed profiles. We propose a reinforcement-learning
    (RL) approach that jointly chooses the lookahead Ld and a steering gain g online
    using Proximal Policy Optimization (PPO).
- id: '2602.18384'
  title: 'FedZMG: Efficient Client-Side Optimization in Federated Learning'
  authors: Fotios Zantalis, Evangelos Zervas, Grigorios Koulouras
  abstract: Federated Learning (FL) enables distributed model training on edge devices
    while preserving data privacy. However, clients tend to have non-Independent and
    Identically Distributed (non-IID) data, which often leads to client-drift, and
    therefore diminishing convergence speed and model performance. While adaptive
    optimizers have been proposed to mitigate these effects, they frequently introduce
    computational complexity or communication overhead unsuitable for resource-constrained
    IoT environments. This paper introduces Federated Zero Mean Gradients (FedZMG),
    a novel, parameter-free, client-side optimization algorithm designed to tackle
    client-drift by structurally regularizing the optimization space. Advancing the
    idea of Gradient Centralization, FedZMG projects local gradients onto a zero-mean
    hyperplane, effectively neutralizing the "intensity" or "bias" shifts inherent
    in heterogeneous data distributions without requiring additional communication
    or hyperparameter tuning. A theoretical analysis is provided, proving that FedZMG
    reduces the effective gradient variance and guarantees tighter convergence bounds
    compared to standard FedAvg. Extensive empirical evaluations on EMNIST, CIFAR100,
    and Shakespeare datasets demonstrate that FedZMG achieves better convergence speed
    and final validation accuracy compared to the baseline FedAvg and the adaptive
    optimizer FedAdam, particularly in highly non-IID settings.
  published: '2026-02-20'
  pdf_url: http://arxiv.org/pdf/2602.18384
  arxiv_url: http://arxiv.org/abs/2602.18384
  key_findings: Federated Learning (FL) enables distributed model training on edge
    devices while preserving data privacy. However, clients tend to have non-Independent
    and Identically Distributed (non-IID) data, which often leads to client-drift,
    and therefore diminishing convergence speed and model performance. While adaptive
    optimizers have been proposed to mitigate these effects, they frequently introduce
    computational complexity or communication overhead unsuitable for resource-constrained
    IoT environments.
- id: '2602.18374'
  title: Zero-shot Interactive Perception
  authors: Venkatesh Sripada, Frank Guerin, Amir Ghalamzan
  abstract: 'Interactive perception (IP) enables robots to extract hidden information
    in their workspace and execute manipulation plans by physically interacting with
    objects and altering the state of the environment -- crucial for resolving occlusions
    and ambiguity in complex, partially observable scenarios. We present Zero-Shot
    IP (ZS-IP), a novel framework that couples multi-strategy manipulation (pushing
    and grasping) with a memory-driven Vision Language Model (VLM) to guide robotic
    interactions and resolve semantic queries. ZS-IP integrates three key components:
    (1) an Enhanced Observation (EO) module that augments the VLM''s visual perception
    with both conventional keypoints and our proposed pushlines -- a novel 2D visual
    augmentation tailored to pushing actions, (2) a memory-guided action module that
    reinforces semantic reasoning through context lookup, and (3) a robotic controller
    that executes pushing, pulling, or grasping based on VLM output. Unlike grid-based
    augmentations optimized for pick-and-place, pushlines capture affordances for
    contact-rich actions, substantially improving pushing performance. We evaluate
    ZS-IP on a 7-DOF Franka Panda arm across diverse scenes with varying occlusions
    and task complexities. Our experiments demonstrate that ZS-IP outperforms passive
    and viewpoint-based perception techniques such as Mark-Based Visual Prompting
    (MOKA), particularly in pushing tasks, while preserving the integrity of non-target
    elements.'
  published: '2026-02-20'
  pdf_url: http://arxiv.org/pdf/2602.18374
  arxiv_url: http://arxiv.org/abs/2602.18374
  key_findings: 'Interactive perception (IP) enables robots to extract hidden information
    in their workspace and execute manipulation plans by physically interacting with
    objects and altering the state of the environment -- crucial for resolving occlusions
    and ambiguity in complex, partially observable scenarios. We present Zero-Shot
    IP (ZS-IP), a novel framework that couples multi-strategy manipulation (pushing
    and grasping) with a memory-driven Vision Language Model (VLM) to guide robotic
    interactions and resolve semantic queries. ZS-IP integrates three key components:
    (1) an Enhanced Observation (EO) module that augments the VLM''s visual perception
    with both conventional keypoints and our proposed pushlines -- a novel 2D visual
    augmentation tailored to pushing actions, (2) a memory-guided action module that
    reinforces semantic reasoning through context lookup, and (3) a robotic controller
    that executes pushing, pulling, or grasping based on VLM output.'
- id: '2602.18372'
  title: '"How Do I ...?": Procedural Questions Predominate Student-LLM Chatbot Conversations'
  authors: Alexandra Neagu, Marcus Messer, Peter Johnson, Rhodri Nelson
  abstract: 'Providing scaffolding through educational chatbots built on Large Language
    Models (LLM) has potential risks and benefits that remain an open area of research.
    When students navigate impasses, they ask for help by formulating impasse-driven
    questions. Within interactions with LLM chatbots, such questions shape the user
    prompts and drive the pedagogical effectiveness of the chatbot''s response. This
    paper focuses on such student questions from two datasets of distinct learning
    contexts: formative self-study, and summative assessed coursework. We analysed
    6,113 messages from both learning contexts, using 11 different LLMs and three
    human raters to classify student questions using four existing schemas. On the
    feasibility of using LLMs as raters, results showed moderate-to-good inter-rater
    reliability, with higher consistency than human raters. The data showed that ''procedural''
    questions predominated in both learning contexts, but more so when students prepare
    for summative assessment. These results provide a basis on which to use LLMs for
    classification of student questions. However, we identify clear limitations in
    both the ability to classify with schemas and the value of doing so: schemas are
    limited and thus struggle to accommodate the semantic richness of composite prompts,
    offering only partial understanding the wider risks and benefits of chatbot integration.
    In the future, we recommend an analysis approach that captures the nuanced, multi-turn
    nature of conversation, for example, by applying methods from conversation analysis
    in discursive psychology.'
  published: '2026-02-20'
  pdf_url: http://arxiv.org/pdf/2602.18372
  arxiv_url: http://arxiv.org/abs/2602.18372
  key_findings: Providing scaffolding through educational chatbots built on Large
    Language Models (LLM) has potential risks and benefits that remain an open area
    of research. When students navigate impasses, they ask for help by formulating
    impasse-driven questions. Within interactions with LLM chatbots, such questions
    shape the user prompts and drive the pedagogical effectiveness of the chatbot's
    response.
- id: '2602.18351'
  title: Validating Political Position Predictions of Arguments
  authors: Jordan Robinson, Angus R. Williams, Katie Atkinson, Anthony G. Cohn
  abstract: 'Real-world knowledge representation often requires capturing subjective,
    continuous attributes -- such as political positions -- that conflict with pairwise
    validation, the widely accepted gold standard for human evaluation. We address
    this challenge through a dual-scale validation framework applied to political
    stance prediction in argumentative discourse, combining pointwise and pairwise
    human annotation. Using 22 language models, we construct a large-scale knowledge
    base of political position predictions for 23,228 arguments drawn from 30 debates
    that appeared on the UK politicial television programme \textit{Question Time}.
    Pointwise evaluation shows moderate human-model agreement (Krippendorff''s $α=0.578$),
    reflecting intrinsic subjectivity, while pairwise validation reveals substantially
    stronger alignment between human- and model-derived rankings ($α=0.86$ for the
    best model). This work contributes: (i) a practical validation methodology for
    subjective continuous knowledge that balances scalability with reliability; (ii)
    a validated structured argumentation knowledge base enabling graph-based reasoning
    and retrieval-augmented generation in political domains; and (iii) evidence that
    ordinal structure can be extracted from pointwise language models predictions
    from inherently subjective real-world discourse, advancing knowledge representation
    capabilities for domains where traditional symbolic or categorical approaches
    are insufficient.'
  published: '2026-02-20'
  pdf_url: http://arxiv.org/pdf/2602.18351
  arxiv_url: http://arxiv.org/abs/2602.18351
  key_findings: Real-world knowledge representation often requires capturing subjective,
    continuous attributes -- such as political positions -- that conflict with pairwise
    validation, the widely accepted gold standard for human evaluation. We address
    this challenge through a dual-scale validation framework applied to political
    stance prediction in argumentative discourse, combining pointwise and pairwise
    human annotation. Using 22 language models, we construct a large-scale knowledge
    base of political position predictions for 23,228 arguments drawn from 30 debates
    that appeared on the UK politicial television programme \textit{Question Time}.
- id: '2602.18346'
  title: 'Vichara: Appellate Judgment Prediction and Explanation for the Indian Judicial
    System'
  authors: Pavithra PM Nair, Preethu Rose Anish
  abstract: 'In jurisdictions like India, where courts face an extensive backlog of
    cases, artificial intelligence offers transformative potential for legal judgment
    prediction. A critical subset of this backlog comprises appellate cases, which
    are formal decisions issued by higher courts reviewing the rulings of lower courts.
    To this end, we present Vichara, a novel framework tailored to the Indian judicial
    system that predicts and explains appellate judgments. Vichara processes English-language
    appellate case proceeding documents and decomposes them into decision points.
    Decision points are discrete legal determinations that encapsulate the legal issue,
    deciding authority, outcome, reasoning, and temporal context. The structured representation
    isolates the core determinations and their context, enabling accurate predictions
    and interpretable explanations. Vichara''s explanations follow a structured format
    inspired by the IRAC (Issue-Rule-Application-Conclusion) framework and adapted
    for Indian legal reasoning. This enhances interpretability, allowing legal professionals
    to assess the soundness of predictions efficiently. We evaluate Vichara on two
    datasets, PredEx and the expert-annotated subset of the Indian Legal Documents
    Corpus (ILDC_expert), using four large language models: GPT-4o mini, Llama-3.1-8B,
    Mistral-7B, and Qwen2.5-7B. Vichara surpasses existing judgment prediction benchmarks
    on both datasets, with GPT-4o mini achieving the highest performance (F1: 81.5
    on PredEx, 80.3 on ILDC_expert), followed by Llama-3.1-8B. Human evaluation of
    the generated explanations across Clarity, Linking, and Usefulness metrics highlights
    GPT-4o mini''s superior interpretability.'
  published: '2026-02-20'
  pdf_url: http://arxiv.org/pdf/2602.18346
  arxiv_url: http://arxiv.org/abs/2602.18346
  key_findings: In jurisdictions like India, where courts face an extensive backlog
    of cases, artificial intelligence offers transformative potential for legal judgment
    prediction. A critical subset of this backlog comprises appellate cases, which
    are formal decisions issued by higher courts reviewing the rulings of lower courts.
    To this end, we present Vichara, a novel framework tailored to the Indian judicial
    system that predicts and explains appellate judgments.
- id: '2602.18319'
  title: 'Robo-Saber: Generating and Simulating Virtual Reality Players'
  authors: Nam Hee Kim, Jingjing May Liu, Jaakko Lehtinen, Perttu Hämäläinen, James
    F. O'Brien, Xue Bin Peng
  abstract: We present the first motion generation system for playtesting virtual
    reality (VR) games. Our player model generates VR headset and handheld controller
    movements from in-game object arrangements, guided by style exemplars and aligned
    to maximize simulated gameplay score. We train on the large BOXRR-23 dataset and
    apply our framework on the popular VR game Beat Saber. The resulting model Robo-Saber
    produces skilled gameplay and captures diverse player behaviors, mirroring the
    skill levels and movement patterns specified by input style exemplars. Robo-Saber
    demonstrates promise in synthesizing rich gameplay data for predictive applications
    and enabling a physics-based whole-body VR playtesting agent.
  published: '2026-02-20'
  pdf_url: http://arxiv.org/pdf/2602.18319
  arxiv_url: http://arxiv.org/abs/2602.18319
  key_findings: We present the first motion generation system for playtesting virtual
    reality (VR) games. Our player model generates VR headset and handheld controller
    movements from in-game object arrangements, guided by style exemplars and aligned
    to maximize simulated gameplay score. We train on the large BOXRR-23 dataset and
    apply our framework on the popular VR game Beat Saber.
- id: '2602.18308'
  title: JPmHC Dynamical Isometry via Orthogonal Hyper-Connections
  authors: Biswa Sengupta, Jinhua Wang, Leo Brunswic
  abstract: 'Recent advances in deep learning, exemplified by Hyper-Connections (HC),
    have expanded the residual connection paradigm by introducing wider residual streams
    and diverse connectivity patterns. While these innovations yield significant performance
    gains, they compromise the identity mapping property of residual connections,
    leading to training instability, limited scalability, and increased memory overhead.
    To address these challenges, we propose JPmHC (Jacobian-spectrum Preserving manifold-constrained
    Hyper-Connections), a framework that replaces identity skips with a trainable
    linear mixer acting on n parallel streams while explicitly controlling gradient
    conditioning. By constraining the mixer M on operator-norm-bounded manifolds (e.g.,
    bistochastic, Stiefel, Grassmann), JPmHC prevents gradient pathologies and enhances
    stability. JPmHC introduces three key contributions: (i) a free-probability analysis
    that predicts Jacobian spectra for structured skips, providing actionable design
    rules for mixer selection; (ii) memory-efficient implicit differentiation for
    fixed-point projections, reducing activation memory and synchronization overhead;
    and (iii) a Stiefel-constrained mixer via Cayley transforms, ensuring orthogonality
    without post-hoc normalization. Empirical evaluations on ARC-AGI demonstrate that
    JPmHC achieves faster convergence, higher accuracy, and lower computational cost
    compared to bistochastic baselines. As a flexible and scalable extension of HC,
    JPmHC advances spectrum-aware, stable, and efficient deep learning, offering insights
    into topological architecture design and foundational model evolution.'
  published: '2026-02-20'
  pdf_url: http://arxiv.org/pdf/2602.18308
  arxiv_url: http://arxiv.org/abs/2602.18308
  key_findings: Recent advances in deep learning, exemplified by Hyper-Connections
    (HC), have expanded the residual connection paradigm by introducing wider residual
    streams and diverse connectivity patterns. While these innovations yield significant
    performance gains, they compromise the identity mapping property of residual connections,
    leading to training instability, limited scalability, and increased memory overhead.
    To address these challenges, we propose JPmHC (Jacobian-spectrum Preserving manifold-constrained
    Hyper-Connections), a framework that replaces identity skips with a trainable
