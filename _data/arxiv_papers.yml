papers:
- id: '2602.23360'
  title: Model Agreement via Anchoring
  authors: Eric Eaton, Surbhi Goel, Marcel Hussing, Michael Kearns, Aaron Roth, Sikata
    Bela Sengupta, Jessica Sorrell
  abstract: 'Numerous lines of aim to control $\textit{model disagreement}$ -- the
    extent to which two machine learning models disagree in their predictions. We
    adopt a simple and standard notion of model disagreement in real-valued prediction
    problems, namely the expected squared difference in predictions between two models
    trained on independent samples, without any coordination of the training processes.
    We would like to be able to drive disagreement to zero with some natural parameter(s)
    of the training procedure using analyses that can be applied to existing training
    methodologies. We develop a simple general technique for proving bounds on independent
    model disagreement based on $\textit{anchoring}$ to the average of two models
    within the analysis. We then apply this technique to prove disagreement bounds
    for four commonly used machine learning algorithms: (1) stacked aggregation over
    an arbitrary model class (where disagreement is driven to 0 with the number of
    models $k$ being stacked) (2) gradient boosting (where disagreement is driven
    to 0 with the number of iterations $k$) (3) neural network training with architecture
    search (where disagreement is driven to 0 with the size $n$ of the architecture
    being optimized over) and (4) regression tree training over all regression trees
    of fixed depth (where disagreement is driven to 0 with the depth $d$ of the tree
    architecture). For clarity, we work out our initial bounds in the setting of one-dimensional
    regression with squared error loss -- but then show that all of our results generalize
    to multi-dimensional regression with any strongly convex loss.'
  published: '2026-02-26'
  pdf_url: http://arxiv.org/pdf/2602.23360
  arxiv_url: http://arxiv.org/abs/2602.23360
  key_findings: Numerous lines of aim to control $\textit{model disagreement}$ --
    the extent to which two machine learning models disagree in their predictions.
    We adopt a simple and standard notion of model disagreement in real-valued prediction
    problems, namely the expected squared difference in predictions between two models
    trained on independent samples, without any coordination of the training processes.
    We would like to be able to drive disagreement to zero with some natural parameter(s)
    of the training procedure using analyses that can be applied to existing training
    methodologies.
- id: '2602.23359'
  title: 'SeeThrough3D: Occlusion Aware 3D Control in Text-to-Image Generation'
  authors: Vaibhav Agrawal, Rishubh Parihar, Pradhaan Bhat, Ravi Kiran Sarvadevabhatla,
    R. Venkatesh Babu
  abstract: We identify occlusion reasoning as a fundamental yet overlooked aspect
    for 3D layout-conditioned generation. It is essential for synthesizing partially
    occluded objects with depth-consistent geometry and scale. While existing methods
    can generate realistic scenes that follow input layouts, they often fail to model
    precise inter-object occlusions. We propose SeeThrough3D, a model for 3D layout
    conditioned generation that explicitly models occlusions. We introduce an occlusion-aware
    3D scene representation (OSCR), where objects are depicted as translucent 3D boxes
    placed within a virtual environment and rendered from desired camera viewpoint.
    The transparency encodes hidden object regions, enabling the model to reason about
    occlusions, while the rendered viewpoint provides explicit camera control during
    generation. We condition a pretrained flow based text-to-image image generation
    model by introducing a set of visual tokens derived from our rendered 3D representation.
    Furthermore, we apply masked self-attention to accurately bind each object bounding
    box to its corresponding textual description, enabling accurate generation of
    multiple objects without object attribute mixing. To train the model, we construct
    a synthetic dataset with diverse multi-object scenes with strong inter-object
    occlusions. SeeThrough3D generalizes effectively to unseen object categories and
    enables precise 3D layout control with realistic occlusions and consistent camera
    control.
  published: '2026-02-26'
  pdf_url: http://arxiv.org/pdf/2602.23359
  arxiv_url: http://arxiv.org/abs/2602.23359
  key_findings: We identify occlusion reasoning as a fundamental yet overlooked aspect
    for 3D layout-conditioned generation. It is essential for synthesizing partially
    occluded objects with depth-consistent geometry and scale. While existing methods
    can generate realistic scenes that follow input layouts, they often fail to model
    precise inter-object occlusions.
- id: '2602.23353'
  title: 'SOTAlign: Semi-Supervised Alignment of Unimodal Vision and Language Models
    via Optimal Transport'
  authors: Simon Roschmann, Paul Krzakala, Sonia Mazelet, Quentin Bouniot, Zeynep
    Akata
  abstract: The Platonic Representation Hypothesis posits that neural networks trained
    on different modalities converge toward a shared statistical model of the world.
    Recent work exploits this convergence by aligning frozen pretrained vision and
    language models with lightweight alignment layers, but typically relies on contrastive
    losses and millions of paired samples. In this work, we ask whether meaningful
    alignment can be achieved with substantially less supervision. We introduce a
    semi-supervised setting in which pretrained unimodal encoders are aligned using
    a small number of image-text pairs together with large amounts of unpaired data.
    To address this challenge, we propose SOTAlign, a two-stage framework that first
    recovers a coarse shared geometry from limited paired data using a linear teacher,
    then refines the alignment on unpaired samples via an optimal-transport-based
    divergence that transfers relational structure without overconstraining the target
    space. Unlike existing semi-supervised methods, SOTAlign effectively leverages
    unpaired images and text, learning robust joint embeddings across datasets and
    encoder pairs, and significantly outperforming supervised and semi-supervised
    baselines.
  published: '2026-02-26'
  pdf_url: http://arxiv.org/pdf/2602.23353
  arxiv_url: http://arxiv.org/abs/2602.23353
  key_findings: The Platonic Representation Hypothesis posits that neural networks
    trained on different modalities converge toward a shared statistical model of
    the world. Recent work exploits this convergence by aligning frozen pretrained
    vision and language models with lightweight alignment layers, but typically relies
    on contrastive losses and millions of paired samples. In this work, we ask whether
    meaningful alignment can be achieved with substantially less supervision.
- id: '2602.23349'
  title: 'FlashOptim: Optimizers for Memory Efficient Training'
  authors: Jose Javier Gonzalez Ortiz, Abhay Gupta, Chris Renard, Davis Blalock
  abstract: Standard mixed-precision training of neural networks requires many bytes
    of accelerator memory for each model parameter. These bytes reflect not just the
    parameter itself, but also its gradient and one or more optimizer state variables.
    With each of these values typically requiring 4 bytes, training even a 7 billion
    parameter model can be impractical for researchers with less than 100GB of accelerator
    memory. We introduce FlashOptim, a suite of optimizations that reduces per-parameter
    memory by over 50% while preserving model quality and API compatibility. Our approach
    introduces two key techniques. First, we improve master weight splitting by finding
    and exploiting a tight bound on its quantization error. Second, we design companding
    functions that greatly reduce the error in 8-bit optimizer state quantization.
    Together with 16-bit gradients, these techniques reduce AdamW memory from 16 bytes
    to 7 bytes per parameter, or 5 bytes with gradient release. They also cut model
    checkpoint sizes by more than half. Experiments with FlashOptim applied to SGD,
    AdamW, and Lion show no measurable quality degradation on any task from a collection
    of standard vision and language benchmarks, including Llama-3.1-8B finetuning.
  published: '2026-02-26'
  pdf_url: http://arxiv.org/pdf/2602.23349
  arxiv_url: http://arxiv.org/abs/2602.23349
  key_findings: Standard mixed-precision training of neural networks requires many
    bytes of accelerator memory for each model parameter. These bytes reflect not
    just the parameter itself, but also its gradient and one or more optimizer state
    variables. With each of these values typically requiring 4 bytes, training even
    a 7 billion parameter model can be impractical for researchers with less than
    100GB of accelerator memory.
- id: '2602.23335'
  title: 'Understanding Usage and Engagement in AI-Powered Scientific Research Tools:
    The Asta Interaction Dataset'
  authors: Dany Haddad, Dan Bareket, Joseph Chee Chang, Jay DeYoung, Jena D. Hwang,
    Uri Katz, Mark Polak, Sangho Suh, Harshit Surana, Aryeh Tiktinsky, Shriya Atmakuri,
    Jonathan Bragg, Mike D'Arcy, Sergey Feldman, Amal Hassan-Ali, Rubén Lozano, Bodhisattwa
    Prasad Majumder, Charles McGrady, Amanpreet Singh, Brooke Vlahos, Yoav Goldberg,
    Doug Downey
  abstract: AI-powered scientific research tools are rapidly being integrated into
    research workflows, yet the field lacks a clear lens into how researchers use
    these systems in real-world settings. We present and analyze the Asta Interaction
    Dataset, a large-scale resource comprising over 200,000 user queries and interaction
    logs from two deployed tools (a literature discovery interface and a scientific
    question-answering interface) within an LLM-powered retrieval-augmented generation
    platform. Using this dataset, we characterize query patterns, engagement behaviors,
    and how usage evolves with experience. We find that users submit longer and more
    complex queries than in traditional search, and treat the system as a collaborative
    research partner, delegating tasks such as drafting content and identifying research
    gaps. Users treat generated responses as persistent artifacts, revisiting and
    navigating among outputs and cited evidence in non-linear ways. With experience,
    users issue more targeted queries and engage more deeply with supporting citations,
    although keyword-style queries persist even among experienced users. We release
    the anonymized dataset and analysis with a new query intent taxonomy to inform
    future designs of real-world AI research assistants and to support realistic evaluation.
  published: '2026-02-26'
  pdf_url: http://arxiv.org/pdf/2602.23335
  arxiv_url: http://arxiv.org/abs/2602.23335
  key_findings: AI-powered scientific research tools are rapidly being integrated
    into research workflows, yet the field lacks a clear lens into how researchers
    use these systems in real-world settings. We present and analyze the Asta Interaction
    Dataset, a large-scale resource comprising over 200,000 user queries and interaction
    logs from two deployed tools (a literature discovery interface and a scientific
    question-answering interface) within an LLM-powered retrieval-augmented generation
    platform. Using this dataset, we characterize query patterns, engagement behaviors,
    and how usage evolves with experience.
- id: '2602.23334'
  title: Bitwise Systolic Array Architecture for Runtime-Reconfigurable Multi-precision
    Quantized Multiplication on Hardware Accelerators
  authors: Yuhao Liu, Salim Ullah, Akash Kumar
  abstract: Neural network accelerators have been widely applied to edge devices for
    complex tasks like object tracking, image recognition, etc. Previous works have
    explored the quantization technologies in related lightweight accelerator designs
    to reduce hardware resource consumption. However, low precision leads to high
    accuracy loss in inference. Therefore, mixed-precision quantization becomes an
    alternative solution by applying different precision in different layers to trade
    off resource consumption and accuracy. Because regular designs for multiplication
    on hardware cannot support the precision reconfiguration for a multi-precision
    Quantized Neural Network (QNN) model in runtime, we propose a runtime reconfigurable
    multi-precision multi-channel bitwise systolic array design for QNN accelerators.
    We have implemented and evaluated our work on the Ultra96 FPGA platform. Results
    show that our work can achieve 1.3185 to 3.5671 times speedup in inferring mixed-precision
    models and has less critical path delay, supporting a higher clock frequency (250MHz).
  published: '2026-02-26'
  pdf_url: http://arxiv.org/pdf/2602.23334
  arxiv_url: http://arxiv.org/abs/2602.23334
  key_findings: Neural network accelerators have been widely applied to edge devices
    for complex tasks like object tracking, image recognition, etc. Previous works
    have explored the quantization technologies in related lightweight accelerator
    designs to reduce hardware resource consumption. However, low precision leads
    to high accuracy loss in inference.
- id: '2602.23331'
  title: Utilizing LLMs for Industrial Process Automation
  authors: Salim Fares
  abstract: A growing number of publications address the best practices to use Large
    Language Models (LLMs) for software engineering in recent years. However, most
    of this work focuses on widely-used general purpose programming languages like
    Python due to their widespread usage training data. The utility of LLMs for software
    within the industrial process automation domain, with highly-specialized languages
    that are typically only used in proprietary contexts, remains underexplored. This
    research aims to utilize and integrate LLMs in the industrial development process,
    solving real-life programming tasks (e.g., generating a movement routine for a
    robotic arm) and accelerating the development cycles of manufacturing systems.
  published: '2026-02-26'
  pdf_url: http://arxiv.org/pdf/2602.23331
  arxiv_url: http://arxiv.org/abs/2602.23331
  key_findings: A growing number of publications address the best practices to use
    Large Language Models (LLMs) for software engineering in recent years. However,
    most of this work focuses on widely-used general purpose programming languages
    like Python due to their widespread usage training data. The utility of LLMs for
    software within the industrial process automation domain, with highly-specialized
    languages that are typically only used in proprietary contexts, remains underexplored.
- id: '2602.23330'
  title: Toward Expert Investment Teams:A Multi-Agent LLM System with Fine-Grained
    Trading Tasks
  authors: Kunihiro Miyazaki, Takanobu Kawahara, Stephen Roberts, Stefan Zohren
  abstract: The advancement of large language models (LLMs) has accelerated the development
    of autonomous financial trading systems. While mainstream approaches deploy multi-agent
    systems mimicking analyst and manager roles, they often rely on abstract instructions
    that overlook the intricacies of real-world workflows, which can lead to degraded
    inference performance and less transparent decision-making. Therefore, we propose
    a multi-agent LLM trading framework that explicitly decomposes investment analysis
    into fine-grained tasks, rather than providing coarse-grained instructions. We
    evaluate the proposed framework using Japanese stock data, including prices, financial
    statements, news, and macro information, under a leakage-controlled backtesting
    setting. Experimental results show that fine-grained task decomposition significantly
    improves risk-adjusted returns compared to conventional coarse-grained designs.
    Crucially, further analysis of intermediate agent outputs suggests that alignment
    between analytical outputs and downstream decision preferences is a critical driver
    of system performance. Moreover, we conduct standard portfolio optimization, exploiting
    low correlation with the stock index and the variance of each system's output.
    This approach achieves superior performance. These findings contribute to the
    design of agent structure and task configuration when applying LLM agents to trading
    systems in practical settings.
  published: '2026-02-26'
  pdf_url: http://arxiv.org/pdf/2602.23330
  arxiv_url: http://arxiv.org/abs/2602.23330
  key_findings: The advancement of large language models (LLMs) has accelerated the
    development of autonomous financial trading systems. While mainstream approaches
    deploy multi-agent systems mimicking analyst and manager roles, they often rely
    on abstract instructions that overlook the intricacies of real-world workflows,
    which can lead to degraded inference performance and less transparent decision-making.
    Therefore, we propose a multi-agent LLM trading framework that explicitly decomposes
    investment analysis into fine-grained tasks, rather than providing coarse-grained
    instructions.
- id: '2602.23329'
  title: LLM Novice Uplift on Dual-Use, In Silico Biology Tasks
  authors: Chen Bo Calvin Zhang, Christina Q. Knight, Nicholas Kruus, Jason Hausenloy,
    Pedro Medeiros, Nathaniel Li, Aiden Kim, Yury Orlovskiy, Coleman Breen, Bryce
    Cai, Jasper Götting, Andrew Bo Liu, Samira Nedungadi, Paula Rodriguez, Yannis
    Yiming He, Mohamed Shaaban, Zifan Wang, Seth Donoughe, Julian Michael
  abstract: 'Large language models (LLMs) perform increasingly well on biology benchmarks,
    but it remains unclear whether they uplift novice users -- i.e., enable humans
    to perform better than with internet-only resources. This uncertainty is central
    to understanding both scientific acceleration and dual-use risk. We conducted
    a multi-model, multi-benchmark human uplift study comparing novices with LLM access
    versus internet-only access across eight biosecurity-relevant task sets. Participants
    worked on complex problems with ample time (up to 13 hours for the most involved
    tasks). We found that LLM access provided substantial uplift: novices with LLMs
    were 4.16 times more accurate than controls (95% CI [2.63, 6.87]). On four benchmarks
    with available expert baselines (internet-only), novices with LLMs outperformed
    experts on three of them. Perhaps surprisingly, standalone LLMs often exceeded
    LLM-assisted novices, indicating that users were not eliciting the strongest available
    contributions from the LLMs. Most participants (89.6%) reported little difficulty
    obtaining dual-use-relevant information despite safeguards. Overall, LLMs substantially
    uplift novices on biological tasks previously reserved for trained practitioners,
    underscoring the need for sustained, interactive uplift evaluations alongside
    traditional benchmarks.'
  published: '2026-02-26'
  pdf_url: http://arxiv.org/pdf/2602.23329
  arxiv_url: http://arxiv.org/abs/2602.23329
  key_findings: Large language models (LLMs) perform increasingly well on biology
    benchmarks, but it remains unclear whether they uplift novice users -- i. e. ,
    enable humans to perform better than with internet-only resources.
- id: '2602.23318'
  title: Generalized Rapid Action Value Estimation in Memory-Constrained Environments
  authors: Aloïs Rautureau, Tristan Cazenave, Éric Piette
  abstract: Generalized Rapid Action Value Estimation (GRAVE) has been shown to be
    a strong variant within the Monte-Carlo Tree Search (MCTS) family of algorithms
    for General Game Playing (GGP). However, its reliance on storing additional win/visit
    statistics at each node makes its use impractical in memory-constrained environments,
    thereby limiting its applicability in practice. In this paper, we introduce the
    GRAVE2, GRAVER and GRAVER2 algorithms, which extend GRAVE through two-level search,
    node recycling, and a combination of both techniques, respectively. We show that
    these enhancements enable a drastic reduction in the number of stored nodes while
    matching the playing strength of GRAVE.
  published: '2026-02-26'
  pdf_url: http://arxiv.org/pdf/2602.23318
  arxiv_url: http://arxiv.org/abs/2602.23318
  key_findings: Generalized Rapid Action Value Estimation (GRAVE) has been shown to
    be a strong variant within the Monte-Carlo Tree Search (MCTS) family of algorithms
    for General Game Playing (GGP). However, its reliance on storing additional win/visit
    statistics at each node makes its use impractical in memory-constrained environments,
    thereby limiting its applicability in practice. In this paper, we introduce the
    GRAVE2, GRAVER and GRAVER2 algorithms, which extend GRAVE through two-level search,
    node recycling, and a combination of both techniques, respectively.
