- id: '2602.21204'
  title: Test-Time Training with KV Binding Is Secretly Linear Attention
  authors: Junchen Liu, Sven Elflein, Or Litany, Zan Gojcic, Ruilong Li
  abstract: 'Test-time training (TTT) with KV binding as sequence modeling layer is
    commonly interpreted as a form of online meta-learning that memorizes a key-value
    mapping at test time. However, our analysis reveals multiple phenomena that contradict
    this memorization-based interpretation. Motivated by these findings, we revisit
    the formulation of TTT and show that a broad class of TTT architectures can be
    expressed as a form of learned linear attention operator. Beyond explaining previously
    puzzling model behaviors, this perspective yields multiple practical benefits:
    it enables principled architectural simplifications, admits fully parallel formulations
    that preserve performance while improving efficiency, and provides a systematic
    reduction of diverse TTT variants to a standard linear attention form. Overall,
    our results reframe TTT not as test-time memorization, but as learned linear attention
    with enhanced representational capacity.'
  published: '2026-02-24'
  pdf_url: http://arxiv.org/pdf/2602.21204
  arxiv_url: http://arxiv.org/abs/2602.21204
  key_findings: Test-time training (TTT) with KV binding as sequence modeling layer
    is commonly interpreted as a form of online meta-learning that memorizes a key-value
    mapping at test time. However, our analysis reveals multiple phenomena that contradict
    this memorization-based interpretation. Motivated by these findings, we revisit
    the formulation of TTT and show that a broad class of TTT architectures can be
    expressed as a form of learned linear attention operator.
- id: '2602.21201'
  title: Aletheia tackles FirstProof autonomously
  authors: Tony Feng, Junehyuk Jung, Sang-hyun Kim, Carlo Pagano, Sergei Gukov, Chiang-Chiang
    Tsai, David Woodruff, Adel Javanmard, Aryan Mokhtari, Dawsen Hwang, Yuri Chervonyi,
    Jonathan N. Lee, Garrett Bingham, Trieu H. Trinh, Vahab Mirrokni, Quoc V. Le,
    Thang Luong
  abstract: We report the performance of Aletheia (Feng et al., 2026b), a mathematics
    research agent powered by Gemini 3 Deep Think, on the inaugural FirstProof challenge.
    Within the allowed timeframe of the challenge, Aletheia autonomously solved 6
    problems (2, 5, 7, 8, 9, 10) out of 10 according to majority expert assessments;
    we note that experts were not unanimous on Problem 8 (only). For full transparency,
    we explain our interpretation of FirstProof and disclose details about our experiments
    as well as our evaluation. Raw prompts and outputs are available at https://github.com/google-deepmind/superhuman/tree/main/aletheia.
  published: '2026-02-24'
  pdf_url: http://arxiv.org/pdf/2602.21201
  arxiv_url: http://arxiv.org/abs/2602.21201
  key_findings: We report the performance of Aletheia (Feng et al. , 2026b), a mathematics
    research agent powered by Gemini 3 Deep Think, on the inaugural FirstProof challenge.
    Within the allowed timeframe of the challenge, Aletheia autonomously solved 6
    problems (2, 5, 7, 8, 9, 10) out of 10 according to majority expert assessments;
    we note that experts were not unanimous on Problem 8 (only).
- id: '2602.21198'
  title: 'Learning from Trials and Errors: Reflective Test-Time Planning for Embodied
    LLMs'
  authors: Yining Hong, Huang Huang, Manling Li, Li Fei-Fei, Jiajun Wu, Yejin Choi
  abstract: 'Embodied LLMs endow robots with high-level task reasoning, but they cannot
    reflect on what went wrong or why, turning deployment into a sequence of independent
    trials where mistakes repeat rather than accumulate into experience. Drawing upon
    human reflective practitioners, we introduce Reflective Test-Time Planning, which
    integrates two modes of reflection: \textit{reflection-in-action}, where the agent
    uses test-time scaling to generate and score multiple candidate actions using
    internal reflections before execution; and \textit{reflection-on-action}, which
    uses test-time training to update both its internal reflection model and its action
    policy based on external reflections after execution. We also include retrospective
    reflection, allowing the agent to re-evaluate earlier decisions and perform model
    updates with hindsight for proper long-horizon credit assignment. Experiments
    on our newly-designed Long-Horizon Household benchmark and MuJoCo Cupboard Fitting
    benchmark show significant gains over baseline models, with ablative studies validating
    the complementary roles of reflection-in-action and reflection-on-action. Qualitative
    analyses, including real-robot trials, highlight behavioral correction through
    reflection.'
  published: '2026-02-24'
  pdf_url: http://arxiv.org/pdf/2602.21198
  arxiv_url: http://arxiv.org/abs/2602.21198
  key_findings: 'Embodied LLMs endow robots with high-level task reasoning, but they
    cannot reflect on what went wrong or why, turning deployment into a sequence of
    independent trials where mistakes repeat rather than accumulate into experience.
    Drawing upon human reflective practitioners, we introduce Reflective Test-Time
    Planning, which integrates two modes of reflection: \textit{reflection-in-action},
    where the agent uses test-time scaling to generate and score multiple candidate
    actions using internal reflections before execution; and \textit{reflection-on-action},
    which uses test-time training to update both its internal reflection model and
    its action policy based on external reflections after execution. We also include
    retrospective reflection, allowing the agent to re-evaluate earlier decisions
    and perform model updates with hindsight for proper long-horizon credit assignment.'
- id: '2602.21189'
  title: 'Why Pass@k Optimization Can Degrade Pass@1: Prompt Interference in LLM Post-training'
  authors: Anas Barakat, Souradip Chakraborty, Khushbu Pahwa, Amrit Singh Bedi
  abstract: 'Pass@k is a widely used performance metric for verifiable large language
    model tasks, including mathematical reasoning, code generation, and short-answer
    reasoning. It defines success if any of $k$ independently sampled solutions passes
    a verifier. This multi-sample inference metric has motivated inference-aware fine-tuning
    methods that directly optimize pass@$k$. However, prior work reports a recurring
    trade-off: pass@k improves while pass@1 degrades under such methods. This trade-off
    is practically important because pass@1 often remains a hard operational constraint
    due to latency and cost budgets, imperfect verifier coverage, and the need for
    a reliable single-shot fallback. We study the origin of this trade-off and provide
    a theoretical characterization of when pass@k policy optimization can reduce pass@1
    through gradient conflict induced by prompt interference. We show that pass@$k$
    policy gradients can conflict with pass@1 gradients because pass@$k$ optimization
    implicitly reweights prompts toward low-success prompts; when these prompts are
    what we term negatively interfering, their upweighting can rotate the pass@k update
    direction away from the pass@1 direction. We illustrate our theoretical findings
    with large language model experiments on verifiable mathematical reasoning tasks.'
  published: '2026-02-24'
  pdf_url: http://arxiv.org/pdf/2602.21189
  arxiv_url: http://arxiv.org/abs/2602.21189
  key_findings: Pass@k is a widely used performance metric for verifiable large language
    model tasks, including mathematical reasoning, code generation, and short-answer
    reasoning. It defines success if any of $k$ independently sampled solutions passes
    a verifier. This multi-sample inference metric has motivated inference-aware fine-tuning
    methods that directly optimize pass@$k$.
- id: '2602.21178'
  title: 'XMorph: Explainable Brain Tumor Analysis Via LLM-Assisted Hybrid Deep Intelligence'
  authors: Sepehr Salem Ghahfarokhi, M. Moein Esfahani, Raj Sunderraman, Vince Calhoun,
    Mohammed Alser
  abstract: 'Deep learning has significantly advanced automated brain tumor diagnosis,
    yet clinical adoption remains limited by interpretability and computational constraints.
    Conventional models often act as opaque ''''black boxes'''' and fail to quantify
    the complex, irregular tumor boundaries that characterize malignant growth. To
    address these challenges, we present XMorph, an explainable and computationally
    efficient framework for fine-grained classification of three prominent brain tumor
    types: glioma, meningioma, and pituitary tumors. We propose an Information-Weighted
    Boundary Normalization (IWBN) mechanism that emphasizes diagnostically relevant
    boundary regions alongside nonlinear chaotic and clinically validated features,
    enabling a richer morphological representation of tumor growth. A dual-channel
    explainable AI module combines GradCAM++ visual cues with LLM-generated textual
    rationales, translating model reasoning into clinically interpretable insights.
    The proposed framework achieves a classification accuracy of 96.0%, demonstrating
    that explainability and high performance can co-exist in AI-based medical imaging
    systems. The source code and materials for XMorph are all publicly available at:
    https://github.com/ALSER-Lab/XMorph.'
  published: '2026-02-24'
  pdf_url: http://arxiv.org/pdf/2602.21178
  arxiv_url: http://arxiv.org/abs/2602.21178
  key_findings: 'Deep learning has significantly advanced automated brain tumor diagnosis,
    yet clinical adoption remains limited by interpretability and computational constraints.
    Conventional models often act as opaque ''''black boxes'''' and fail to quantify
    the complex, irregular tumor boundaries that characterize malignant growth. To
    address these challenges, we present XMorph, an explainable and computationally
    efficient framework for fine-grained classification of three prominent brain tumor
    types: glioma, meningioma, and pituitary tumors.'
- id: '2602.21174'
  title: Efficient Hierarchical Any-Angle Path Planning on Multi-Resolution 3D Grids
  authors: Victor Reijgwart, Cesar Cadena, Roland Siegwart, Lionel Ott
  abstract: Hierarchical, multi-resolution volumetric mapping approaches are widely
    used to represent large and complex environments as they can efficiently capture
    their occupancy and connectivity information. Yet widely used path planning methods
    such as sampling and trajectory optimization do not exploit this explicit connectivity
    information, and search-based methods such as A* suffer from scalability issues
    in large-scale high-resolution maps. In many applications, Euclidean shortest
    paths form the underpinning of the navigation system. For such applications, any-angle
    planning methods, which find optimal paths by connecting corners of obstacles
    with straight-line segments, provide a simple and efficient solution. In this
    paper, we present a method that has the optimality and completeness properties
    of any-angle planners while overcoming computational tractability issues common
    to search-based methods by exploiting multi-resolution representations. Extensive
    experiments on real and synthetic environments demonstrate the proposed approach's
    solution quality and speed, outperforming even sampling-based methods. The framework
    is open-sourced to allow the robotics and planning community to build on our research.
  published: '2026-02-24'
  pdf_url: http://arxiv.org/pdf/2602.21174
  arxiv_url: http://arxiv.org/abs/2602.21174
  key_findings: Hierarchical, multi-resolution volumetric mapping approaches are widely
    used to represent large and complex environments as they can efficiently capture
    their occupancy and connectivity information. Yet widely used path planning methods
    such as sampling and trajectory optimization do not exploit this explicit connectivity
    information, and search-based methods such as A* suffer from scalability issues
    in large-scale high-resolution maps. In many applications, Euclidean shortest
    paths form the underpinning of the navigation system.
- id: '2602.21172'
  title: 'NoRD: A Data-Efficient Vision-Language-Action Model that Drives without
    Reasoning'
  authors: Ishaan Rawal, Shubh Gupta, Yihan Hu, Wei Zhan
  abstract: 'Vision-Language-Action (VLA) models are advancing autonomous driving
    by replacing modular pipelines with unified end-to-end architectures. However,
    current VLAs face two expensive requirements: (1) massive dataset collection,
    and (2) dense reasoning annotations. In this work, we address both challenges
    with \modelname (\textbf{No} \textbf{R}easoning for \textbf{D}riving). Compared
    to existing VLAs, \modelname achieves competitive performance while being fine-tuned
    on $<$60\% of the data and no reasoning annotations, resulting in 3$\times$ fewer
    tokens. We identify that standard Group Relative Policy Optimization (GRPO) fails
    to yield significant improvements when applied to policies trained on such small,
    reasoning-free datasets. We show that this limitation stems from difficulty bias,
    which disproportionately penalizes reward signals from scenarios that produce
    high-variance rollouts within GRPO. \modelname overcomes this by incorporating
    Dr.~GRPO, a recent algorithm designed to mitigate difficulty bias in LLMs. As
    a result, \modelname achieves competitive performance on Waymo and NAVSIM with
    a fraction of the training data and no reasoning overhead, enabling more efficient
    autonomous systems.'
  published: '2026-02-24'
  pdf_url: http://arxiv.org/pdf/2602.21172
  arxiv_url: http://arxiv.org/abs/2602.21172
  key_findings: 'Vision-Language-Action (VLA) models are advancing autonomous driving
    by replacing modular pipelines with unified end-to-end architectures. However,
    current VLAs face two expensive requirements: (1) massive dataset collection,
    and (2) dense reasoning annotations. In this work, we address both challenges
    with \modelname (\textbf{No} \textbf{R}easoning for \textbf{D}riving).'
- id: '2602.21165'
  title: 'PVminer: A Domain-Specific Tool to Detect the Patient Voice in Patient Generated
    Data'
  authors: Samah Fodeh, Linhai Ma, Yan Wang, Srivani Talakokkul, Ganesh Puthiaraju,
    Afshan Khan, Ashley Hagaman, Sarah Lowe, Aimee Roundtree
  abstract: Patient-generated text such as secure messages, surveys, and interviews
    contains rich expressions of the patient voice (PV), reflecting communicative
    behaviors and social determinants of health (SDoH). Traditional qualitative coding
    frameworks are labor intensive and do not scale to large volumes of patient-authored
    messages across health systems. Existing machine learning (ML) and natural language
    processing (NLP) approaches provide partial solutions but often treat patient-centered
    communication (PCC) and SDoH as separate tasks or rely on models not well suited
    to patient-facing language. We introduce PVminer, a domain-adapted NLP framework
    for structuring patient voice in secure patient-provider communication. PVminer
    formulates PV detection as a multi-label, multi-class prediction task integrating
    patient-specific BERT encoders (PV-BERT-base and PV-BERT-large), unsupervised
    topic modeling for thematic augmentation (PV-Topic-BERT), and fine-tuned classifiers
    for Code, Subcode, and Combo-level labels. Topic representations are incorporated
    during fine-tuning and inference to enrich semantic inputs. PVminer achieves strong
    performance across hierarchical tasks and outperforms biomedical and clinical
    pre-trained baselines, achieving F1 scores of 82.25% (Code), 80.14% (Subcode),
    and up to 77.87% (Combo). An ablation study further shows that author identity
    and topic-based augmentation each contribute meaningful gains. Pre-trained models,
    source code, and documentation will be publicly released, with annotated datasets
    available upon request for research use.
  published: '2026-02-24'
  pdf_url: http://arxiv.org/pdf/2602.21165
  arxiv_url: http://arxiv.org/abs/2602.21165
  key_findings: Patient-generated text such as secure messages, surveys, and interviews
    contains rich expressions of the patient voice (PV), reflecting communicative
    behaviors and social determinants of health (SDoH). Traditional qualitative coding
    frameworks are labor intensive and do not scale to large volumes of patient-authored
    messages across health systems. Existing machine learning (ML) and natural language
    processing (NLP) approaches provide partial solutions but often treat patient-centered
    communication (PCC) and SDoH as separate tasks or rely on models not well suited
    to patient-facing language.
- id: '2602.21154'
  title: 'CG-DMER: Hybrid Contrastive-Generative Framework for Disentangled Multimodal
    ECG Representation Learning'
  authors: Ziwei Niu, Hao Sun, Shujun Bian, Xihong Yang, Lanfen Lin, Yuxin Liu, Yueming
    Jin
  abstract: 'Accurate interpretation of electrocardiogram (ECG) signals is crucial
    for diagnosing cardiovascular diseases. Recent multimodal approaches that integrate
    ECGs with accompanying clinical reports show strong potential, but they still
    face two main concerns from a modality perspective: (1) intra-modality: existing
    models process ECGs in a lead-agnostic manner, overlooking spatial-temporal dependencies
    across leads, which restricts their effectiveness in modeling fine-grained diagnostic
    patterns; (2) inter-modality: existing methods directly align ECG signals with
    clinical reports, introducing modality-specific biases due to the free-text nature
    of the reports. In light of these two issues, we propose CG-DMER, a contrastive-generative
    framework for disentangled multimodal ECG representation learning, powered by
    two key designs: (1) Spatial-temporal masked modeling is designed to better capture
    fine-grained temporal dynamics and inter-lead spatial dependencies by applying
    masking across both spatial and temporal dimensions and reconstructing the missing
    information. (2) A representation disentanglement and alignment strategy is designed
    to mitigate unnecessary noise and modality-specific biases by introducing modality-specific
    and modality-shared encoders, ensuring a clearer separation between modality-invariant
    and modality-specific representations. Experiments on three public datasets demonstrate
    that CG-DMER achieves state-of-the-art performance across diverse downstream tasks.'
  published: '2026-02-24'
  pdf_url: http://arxiv.org/pdf/2602.21154
  arxiv_url: http://arxiv.org/abs/2602.21154
  key_findings: 'Accurate interpretation of electrocardiogram (ECG) signals is crucial
    for diagnosing cardiovascular diseases. Recent multimodal approaches that integrate
    ECGs with accompanying clinical reports show strong potential, but they still
    face two main concerns from a modality perspective: (1) intra-modality: existing
    models process ECGs in a lead-agnostic manner, overlooking spatial-temporal dependencies
    across leads, which restricts their effectiveness in modeling fine-grained diagnostic
    patterns; (2) inter-modality: existing methods directly align ECG signals with
    clinical reports, introducing modality-specific biases due to the free-text nature
    of the reports. In light of these two issues, we propose CG-DMER, a contrastive-generative
    framework for disentangled multimodal ECG representation learning, powered by
    two key designs: (1) Spatial-temporal masked modeling is designed to better capture
    fine-grained temporal dynamics and inter-lead spatial dependencies by applying
    masking across both spatial and temporal dimensions and reconstructing the missing
    information.'
- id: '2602.21143'
  title: A Benchmark for Deep Information Synthesis
  authors: Debjit Paul, Daniel Murphy, Milan Gritta, Ronald Cardenas, Victor Prokhorov,
    Lena Sophia Bolliger, Aysim Toker, Roy Miles, Andreea-Maria Oncescu, Jasivan Alex
    Sivakumar, Philipp Borchert, Ismail Elezi, Meiru Zhang, Ka Yiu Lee, Guchun Zhang,
    Jun Wang, Gerasimos Lampouras
  abstract: Large language model (LLM)-based agents are increasingly used to solve
    complex tasks involving tool use, such as web browsing, code execution, and data
    analysis. However, current evaluation benchmarks do not adequately assess their
    ability to solve real-world tasks that require synthesizing information from multiple
    sources and inferring insights beyond simple fact retrieval. To address this,
    we introduce DEEPSYNTH, a novel benchmark designed to evaluate agents on realistic,
    time-consuming problems that combine information gathering, synthesis, and structured
    reasoning to produce insights. DEEPSYNTH contains 120 tasks collected across 7
    domains and data sources covering 67 countries. DEEPSYNTH is constructed using
    a multi-stage data collection pipeline that requires annotators to collect official
    data sources, create hypotheses, perform manual analysis, and design tasks with
    verifiable answers. When evaluated on DEEPSYNTH, 11 state-of-the-art LLMs and
    deep research agents achieve a maximum F1 score of 8.97 and 17.5 on the LLM-judge
    metric, underscoring the difficulty of the benchmark. Our analysis reveals that
    current agents struggle with hallucinations and reasoning over large information
    spaces, highlighting DEEPSYNTH as a crucial benchmark for guiding future research.
  published: '2026-02-24'
  pdf_url: http://arxiv.org/pdf/2602.21143
  arxiv_url: http://arxiv.org/abs/2602.21143
  key_findings: Large language model (LLM)-based agents are increasingly used to solve
    complex tasks involving tool use, such as web browsing, code execution, and data
    analysis. However, current evaluation benchmarks do not adequately assess their
    ability to solve real-world tasks that require synthesizing information from multiple
    sources and inferring insights beyond simple fact retrieval. To address this,
    we introduce DEEPSYNTH, a novel benchmark designed to evaluate agents on realistic,
    time-consuming problems that combine information gathering, synthesis, and structured
    reasoning to produce insights.
