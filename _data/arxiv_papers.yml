- id: '2602.20159'
  title: A Very Big Video Reasoning Suite
  authors: Maijunxian Wang, Ruisi Wang, Juyi Lin, Ran Ji, Thaddäus Wiedemer, Qingying
    Gao, Dezhi Luo, Yaoyao Qian, Lianyu Huang, Zelong Hong, Jiahui Ge, Qianli Ma,
    Hang He, Yifan Zhou, Lingzi Guo, Lantao Mei, Jiachen Li, Hanwen Xing, Tianqi Zhao,
    Fengyuan Yu, Weihang Xiao, Yizheng Jiao, Jianheng Hou, Danyang Zhang, Pengcheng
    Xu, Boyang Zhong, Zehong Zhao, Gaoyun Fang, John Kitaoka, Yile Xu, Hua Xu, Kenton
    Blacutt, Tin Nguyen, Siyuan Song, Haoran Sun, Shaoyue Wen, Linyang He, Runming
    Wang, Yanzhi Wang, Mengyue Yang, Ziqiao Ma, Raphaël Millière, Freda Shi, Nuno
    Vasconcelos, Daniel Khashabi, Alan Yuille, Yilun Du, Ziming Liu, Bo Li, Dahua
    Lin, Ziwei Liu, Vikash Kumar, Yijiang Li, Lei Yang, Zhongang Cai, Hokin Deng
  abstract: Rapid progress in video models has largely focused on visual quality,
    leaving their reasoning capabilities underexplored. Video reasoning grounds intelligence
    in spatiotemporally consistent visual environments that go beyond what text can
    naturally capture, enabling intuitive reasoning over spatiotemporal structure
    such as continuity, interaction, and causality. However, systematically studying
    video reasoning and its scaling behavior is hindered by the lack of large-scale
    training data. To address this gap, we introduce the Very Big Video Reasoning
    (VBVR) Dataset, an unprecedentedly large-scale resource spanning 200 curated reasoning
    tasks following a principled taxonomy and over one million video clips, approximately
    three orders of magnitude larger than existing datasets. We further present VBVR-Bench,
    a verifiable evaluation framework that moves beyond model-based judging by incorporating
    rule-based, human-aligned scorers, enabling reproducible and interpretable diagnosis
    of video reasoning capabilities. Leveraging the VBVR suite, we conduct one of
    the first large-scale scaling studies of video reasoning and observe early signs
    of emergent generalization to unseen reasoning tasks. Together, VBVR lays a foundation
    for the next stage of research in generalizable video reasoning. The data, benchmark
    toolkit, and models are publicly available at https://video-reason.com/ .
  published: '2026-02-23'
  pdf_url: http://arxiv.org/pdf/2602.20159
  arxiv_url: http://arxiv.org/abs/2602.20159
  key_findings: Rapid progress in video models has largely focused on visual quality,
    leaving their reasoning capabilities underexplored. Video reasoning grounds intelligence
    in spatiotemporally consistent visual environments that go beyond what text can
    naturally capture, enabling intuitive reasoning over spatiotemporal structure
    such as continuity, interaction, and causality. However, systematically studying
    video reasoning and its scaling behavior is hindered by the lack of large-scale
    training data.
- id: '2602.20152'
  title: 'Behavior Learning (BL): Learning Hierarchical Optimization Structures from
    Data'
  authors: Zhenyao Ma, Yue Liang, Dongxu Li
  abstract: 'Inspired by behavioral science, we propose Behavior Learning (BL), a
    novel general-purpose machine learning framework that learns interpretable and
    identifiable optimization structures from data, ranging from single optimization
    problems to hierarchical compositions. It unifies predictive performance, intrinsic
    interpretability, and identifiability, with broad applicability to scientific
    domains involving optimization. BL parameterizes a compositional utility function
    built from intrinsically interpretable modular blocks, which induces a data distribution
    for prediction and generation. Each block represents and can be written in symbolic
    form as a utility maximization problem (UMP), a foundational paradigm in behavioral
    science and a universal framework of optimization. BL supports architectures ranging
    from a single UMP to hierarchical compositions, the latter modeling hierarchical
    optimization structures. Its smooth and monotone variant (IBL) guarantees identifiability.
    Theoretically, we establish the universal approximation property of BL, and analyze
    the M-estimation properties of IBL. Empirically, BL demonstrates strong predictive
    performance, intrinsic interpretability and scalability to high-dimensional data.
    Code: https://github.com/MoonYLiang/Behavior-Learning ; install via pip install
    blnetwork.'
  published: '2026-02-23'
  pdf_url: http://arxiv.org/pdf/2602.20152
  arxiv_url: http://arxiv.org/abs/2602.20152
  key_findings: Inspired by behavioral science, we propose Behavior Learning (BL),
    a novel general-purpose machine learning framework that learns interpretable and
    identifiable optimization structures from data, ranging from single optimization
    problems to hierarchical compositions. It unifies predictive performance, intrinsic
    interpretability, and identifiability, with broad applicability to scientific
    domains involving optimization. BL parameterizes a compositional utility function
    built from intrinsically interpretable modular blocks, which induces a data distribution
    for prediction and generation.
- id: '2602.20144'
  title: Agentic AI for Scalable and Robust Optical Systems Control
  authors: Zehao Wang, Mingzhe Han, Wei Cheng, Yue-Kai Huang, Philip Ji, Denton Wu,
    Mahdi Safari, Flemming Holtorf, Kenaish AlQubaisi, Norbert M. Linke, Danyang Zhuo,
    Yiran Chen, Ting Wang, Dirk Englund, Tingjun Chen
  abstract: We present AgentOptics, an agentic AI framework for high-fidelity, autonomous
    optical system control built on the Model Context Protocol (MCP). AgentOptics
    interprets natural language tasks and executes protocol-compliant actions on heterogeneous
    optical devices through a structured tool abstraction layer. We implement 64 standardized
    MCP tools across 8 representative optical devices and construct a 410-task benchmark
    to evaluate request understanding, role-aware responses, multi-step coordination,
    robustness to linguistic variation, and error handling. We assess two deployment
    configurations--commercial online LLMs and locally hosted open-source LLMs--and
    compare them with LLM-based code generation baselines. AgentOptics achieves 87.7%--99.0%
    average task success rates, significantly outperforming code-generation approaches,
    which reach up to 50% success. We further demonstrate broader applicability through
    five case studies extending beyond device-level control to system orchestration,
    monitoring, and closed-loop optimization. These include DWDM link provisioning
    and coordinated monitoring of coherent 400 GbE and analog radio-over-fiber (ARoF)
    channels; autonomous characterization and bias optimization of a wideband ARoF
    link carrying 5G fronthaul traffic; multi-span channel provisioning with launch
    power optimization; closed-loop fiber polarization stabilization; and distributed
    acoustic sensing (DAS)-based fiber monitoring with LLM-assisted event detection.
    These results establish AgentOptics as a scalable, robust paradigm for autonomous
    control and orchestration of heterogeneous optical systems.
  published: '2026-02-23'
  pdf_url: http://arxiv.org/pdf/2602.20144
  arxiv_url: http://arxiv.org/abs/2602.20144
  key_findings: We present AgentOptics, an agentic AI framework for high-fidelity,
    autonomous optical system control built on the Model Context Protocol (MCP). AgentOptics
    interprets natural language tasks and executes protocol-compliant actions on heterogeneous
    optical devices through a structured tool abstraction layer. We implement 64 standardized
    MCP tools across 8 representative optical devices and construct a 410-task benchmark
    to evaluate request understanding, role-aware responses, multi-step coordination,
    robustness to linguistic variation, and error handling.
- id: '2602.20141'
  title: Recurrent Structural Policy Gradient for Partially Observable Mean Field
    Games
  authors: Clarisse Wibault, Johannes Forkel, Sebastian Towers, Tiphaine Wibault,
    Juan Duque, George Whittle, Andreas Schaab, Yucheng Yang, Chiyuan Wang, Michael
    Osborne, Benjamin Moll, Jakob Foerster
  abstract: 'Mean Field Games (MFGs) provide a principled framework for modeling interactions
    in large population models: at scale, population dynamics become deterministic,
    with uncertainty entering only through aggregate shocks, or common noise. However,
    algorithmic progress has been limited since model-free methods are too high variance
    and exact methods scale poorly. Recent Hybrid Structural Methods (HSMs) use Monte
    Carlo rollouts for the common noise in combination with exact estimation of the
    expected return, conditioned on those samples. However, HSMs have not been scaled
    to Partially Observable settings. We propose Recurrent Structural Policy Gradient
    (RSPG), the first history-aware HSM for settings involving public information.
    We also introduce MFAX, our JAX-based framework for MFGs. By leveraging known
    transition dynamics, RSPG achieves state-of-the-art performance as well as an
    order-of-magnitude faster convergence and solves, for the first time, a macroeconomics
    MFG with heterogeneous agents, common noise and history-aware policies. MFAX is
    publicly available at: https://github.com/CWibault/mfax.'
  published: '2026-02-23'
  pdf_url: http://arxiv.org/pdf/2602.20141
  arxiv_url: http://arxiv.org/abs/2602.20141
  key_findings: 'Mean Field Games (MFGs) provide a principled framework for modeling
    interactions in large population models: at scale, population dynamics become
    deterministic, with uncertainty entering only through aggregate shocks, or common
    noise. However, algorithmic progress has been limited since model-free methods
    are too high variance and exact methods scale poorly. Recent Hybrid Structural
    Methods (HSMs) use Monte Carlo rollouts for the common noise in combination with
    exact estimation of the expected return, conditioned on those samples.'
- id: '2602.20135'
  title: 'KNIGHT: Knowledge Graph-Driven Multiple-Choice Question Generation with
    Adaptive Hardness Calibration'
  authors: Mohammad Amanlou, Erfan Shafiee Moghaddam, Yasaman Amou Jafari, Mahdi Noori,
    Farhan Farsi, Behnam Bahrak
  abstract: 'With the rise of large language models (LLMs), they have become instrumental
    in applications such as Retrieval-Augmented Generation (RAG). Yet evaluating these
    systems remains bottlenecked by the time and cost of building specialized assessment
    datasets. We introduce KNIGHT, an LLM-based, knowledge-graph-driven framework
    for generating multiple-choice question (MCQ) datasets from external sources.
    KNIGHT constructs a topic-specific knowledge graph, a structured and parsimonious
    summary of entities and relations, that can be reused to generate instructor-controlled
    difficulty levels, including multi-hop questions, without repeatedly re-feeding
    the full source text. This knowledge graph acts as a compressed, reusable state,
    making question generation a cheap read over the graph. We instantiate KNIGHT
    on Wikipedia/Wikidata while keeping the framework domain- and ontology-agnostic.
    As a case study, KNIGHT produces six MCQ datasets in History, Biology, and Mathematics.
    We evaluate quality on five criteria: fluency, unambiguity (single correct answer),
    topic relevance, option uniqueness, and answerability given the provided sources
    (as a proxy for hallucination). Results show that KNIGHT enables token- and cost-efficient
    generation from a reusable graph representation, achieves high quality across
    these criteria, and yields model rankings aligned with MMLU-style benchmarks,
    while supporting topic-specific and difficulty-controlled evaluation.'
  published: '2026-02-23'
  pdf_url: http://arxiv.org/pdf/2602.20135
  arxiv_url: http://arxiv.org/abs/2602.20135
  key_findings: With the rise of large language models (LLMs), they have become instrumental
    in applications such as Retrieval-Augmented Generation (RAG). Yet evaluating these
    systems remains bottlenecked by the time and cost of building specialized assessment
    datasets. We introduce KNIGHT, an LLM-based, knowledge-graph-driven framework
    for generating multiple-choice question (MCQ) datasets from external sources.
- id: '2602.20134'
  title: Modeling Epidemiological Dynamics Under Adversarial Data and User Deception
  authors: Yiqi Su, Christo Kurisummoottil Thomas, Walid Saad, Bud Mishra, Naren Ramakrishnan
  abstract: Epidemiological models increasingly rely on self-reported behavioral data
    such as vaccination status, mask usage, and social distancing adherence to forecast
    disease transmission and assess the impact of non-pharmaceutical interventions
    (NPIs). While such data provide valuable real-time insights, they are often subject
    to strategic misreporting, driven by individual incentives to avoid penalties,
    access benefits, or express distrust in public health authorities. To account
    for such human behavior, in this paper, we introduce a game-theoretic framework
    that models the interaction between the population and a public health authority
    as a signaling game. Individuals (senders) choose how to report their behaviors,
    while the public health authority (receiver) updates their epidemiological model(s)
    based on potentially distorted signals. Focusing on deception around masking and
    vaccination, we characterize analytically game equilibrium outcomes and evaluate
    the degree to which deception can be tolerated while maintaining epidemic control
    through policy interventions. Our results show that separating equilibria-with
    minimal deception-drive infections to near zero over time. Remarkably, even under
    pervasive dishonesty in pooling equilibria, well-designed sender and receiver
    strategies can still maintain effective epidemic control. This work advances the
    understanding of adversarial data in epidemiology and offers tools for designing
    more robust public health models in the presence of strategic user behavior.
  published: '2026-02-23'
  pdf_url: http://arxiv.org/pdf/2602.20134
  arxiv_url: http://arxiv.org/abs/2602.20134
  key_findings: Epidemiological models increasingly rely on self-reported behavioral
    data such as vaccination status, mask usage, and social distancing adherence to
    forecast disease transmission and assess the impact of non-pharmaceutical interventions
    (NPIs). While such data provide valuable real-time insights, they are often subject
    to strategic misreporting, driven by individual incentives to avoid penalties,
    access benefits, or express distrust in public health authorities. To account
    for such human behavior, in this paper, we introduce a game-theoretic framework
    that models the interaction between the population and a public health authority
    as a signaling game.
- id: '2602.20133'
  title: 'AdaEvolve: Adaptive LLM Driven Zeroth-Order Optimization'
  authors: Mert Cemri, Shubham Agrawal, Akshat Gupta, Shu Liu, Audrey Cheng, Qiuyang
    Mang, Ashwin Naren, Lutfi Eren Erdogan, Koushik Sen, Matei Zaharia, Alex Dimakis,
    Ion Stoica
  abstract: 'The paradigm of automated program generation is shifting from one-shot
    generation to inference-time search, where Large Language Models (LLMs) function
    as semantic mutation operators within evolutionary loops. While effective, these
    systems are currently governed by static schedules that fail to account for the
    non-stationary dynamics of the search process. This rigidity results in substantial
    computational waste, as resources are indiscriminately allocated to stagnating
    populations while promising frontiers remain under-exploited. We introduce AdaEvolve,
    a framework that reformulates LLM-driven evolution as a hierarchical adaptive
    optimization problem. AdaEvolve uses an "accumulated improvement signal" to unify
    decisions across three levels: Local Adaptation, which dynamically modulates the
    exploration intensity within a population of solution candidates; Global Adaptation,
    which routes the global resource budget via bandit-based scheduling across different
    solution candidate populations; and Meta-Guidance which generates novel solution
    tactics based on the previously generated solutions and their corresponding improvements
    when the progress stalls. We demonstrate that AdaEvolve consistently outperforms
    the open-sourced baselines across 185 different open-ended optimization problems
    including combinatorial, systems optimization and algorithm design problems.'
  published: '2026-02-23'
  pdf_url: http://arxiv.org/pdf/2602.20133
  arxiv_url: http://arxiv.org/abs/2602.20133
  key_findings: The paradigm of automated program generation is shifting from one-shot
    generation to inference-time search, where Large Language Models (LLMs) function
    as semantic mutation operators within evolutionary loops. While effective, these
    systems are currently governed by static schedules that fail to account for the
    non-stationary dynamics of the search process. This rigidity results in substantial
    computational waste, as resources are indiscriminately allocated to stagnating
    populations while promising frontiers remain under-exploited.
- id: '2602.20130'
  title: 'To Reason or Not to: Selective Chain-of-Thought in Medical Question Answering'
  authors: Zaifu Zhan, Min Zeng, Shuang Zhou, Yiran Song, Xiaoyi Chen, Yu Hou, Yifan
    Wu, Yang Ruan, Rui Zhang
  abstract: 'Objective: To improve the efficiency of medical question answering (MedQA)
    with large language models (LLMs) by avoiding unnecessary reasoning while maintaining
    accuracy. Methods: We propose Selective Chain-of-Thought (Selective CoT), an inference-time
    strategy that first predicts whether a question requires reasoning and generates
    a rationale only when needed. Two open-source LLMs (Llama-3.1-8B and Qwen-2.5-7B)
    were evaluated on four biomedical QA benchmarks-HeadQA, MedQA-USMLE, MedMCQA,
    and PubMedQA. Metrics included accuracy, total generated tokens, and inference
    time. Results: Selective CoT reduced inference time by 13-45% and token usage
    by 8-47% with minimal accuracy loss ($\leq$4\%). In some model-task pairs, it
    achieved both higher accuracy and greater efficiency than standard CoT. Compared
    with fixed-length CoT, Selective CoT reached similar or superior accuracy at substantially
    lower computational cost. Discussion: Selective CoT dynamically balances reasoning
    depth and efficiency by invoking explicit reasoning only when beneficial, reducing
    redundancy on recall-type questions while preserving interpretability. Conclusion:
    Selective CoT provides a simple, model-agnostic, and cost-effective approach for
    medical QA, aligning reasoning effort with question complexity to enhance real-world
    deployability of LLM-based clinical systems.'
  published: '2026-02-23'
  pdf_url: http://arxiv.org/pdf/2602.20130
  arxiv_url: http://arxiv.org/abs/2602.20130
  key_findings: 'Objective: To improve the efficiency of medical question answering
    (MedQA) with large language models (LLMs) by avoiding unnecessary reasoning while
    maintaining accuracy. Methods: We propose Selective Chain-of-Thought (Selective
    CoT), an inference-time strategy that first predicts whether a question requires
    reasoning and generates a rationale only when needed. Two open-source LLMs (Llama-3.'
- id: '2602.20122'
  title: 'NanoKnow: How to Know What Your Language Model Knows'
  authors: Lingwei Gu, Nour Jedidi, Jimmy Lin
  abstract: 'How do large language models (LLMs) know what they know? Answering this
    question has been difficult because pre-training data is often a "black box" --
    unknown or inaccessible. The recent release of nanochat -- a family of small LLMs
    with fully open pre-training data -- addresses this as it provides a transparent
    view into where a model''s parametric knowledge comes from. Towards the goal of
    understanding how knowledge is encoded by LLMs, we release NanoKnow, a benchmark
    dataset that partitions questions from Natural Questions and SQuAD into splits
    based on whether their answers are present in nanochat''s pre-training corpus.
    Using these splits, we can now properly disentangle the sources of knowledge that
    LLMs rely on when producing an output. To demonstrate NanoKnow''s utility, we
    conduct experiments using eight nanochat checkpoints. Our findings show: (1) closed-book
    accuracy is strongly influenced by answer frequency in the pre-training data,
    (2) providing external evidence can mitigate this frequency dependence, (3) even
    with external evidence, models are more accurate when answers were seen during
    pre-training, demonstrating that parametric and external knowledge are complementary,
    and (4) non-relevant information is harmful, with accuracy decreasing based on
    both the position and the number of non-relevant contexts. We release all NanoKnow
    artifacts at https://github.com/castorini/NanoKnow.'
  published: '2026-02-23'
  pdf_url: http://arxiv.org/pdf/2602.20122
  arxiv_url: http://arxiv.org/abs/2602.20122
  key_findings: How do large language models (LLMs) know what they know. Answering
    this question has been difficult because pre-training data is often a "black box"
    -- unknown or inaccessible. The recent release of nanochat -- a family of small
    LLMs with fully open pre-training data -- addresses this as it provides a transparent
    view into where a model's parametric knowledge comes from.
- id: '2602.20119'
  title: 'NovaPlan: Zero-Shot Long-Horizon Manipulation via Closed-Loop Video Language
    Planning'
  authors: Jiahui Fu, Junyu Nan, Lingfeng Sun, Hongyu Li, Jianing Qian, Jennifer L.
    Barry, Kris Kitani, George Konidaris
  abstract: 'Solving long-horizon tasks requires robots to integrate high-level semantic
    reasoning with low-level physical interaction. While vision-language models (VLMs)
    and video generation models can decompose tasks and imagine outcomes, they often
    lack the physical grounding necessary for real-world execution. We introduce NovaPlan,
    a hierarchical framework that unifies closed-loop VLM and video planning with
    geometrically grounded robot execution for zero-shot long-horizon manipulation.
    At the high level, a VLM planner decomposes tasks into sub-goals and monitors
    robot execution in a closed loop, enabling the system to recover from single-step
    failures through autonomous re-planning. To compute low-level robot actions, we
    extract and utilize both task-relevant object keypoints and human hand poses as
    kinematic priors from the generated videos, and employ a switching mechanism to
    choose the better one as a reference for robot actions, maintaining stable execution
    even under heavy occlusion or depth inaccuracy. We demonstrate the effectiveness
    of NovaPlan on three long-horizon tasks and the Functional Manipulation Benchmark
    (FMB). Our results show that NovaPlan can perform complex assembly tasks and exhibit
    dexterous error recovery behaviors without any prior demonstrations or training.
    Project page: https://nova-plan.github.io/'
  published: '2026-02-23'
  pdf_url: http://arxiv.org/pdf/2602.20119
  arxiv_url: http://arxiv.org/abs/2602.20119
  key_findings: Solving long-horizon tasks requires robots to integrate high-level
    semantic reasoning with low-level physical interaction. While vision-language
    models (VLMs) and video generation models can decompose tasks and imagine outcomes,
    they often lack the physical grounding necessary for real-world execution. We
    introduce NovaPlan, a hierarchical framework that unifies closed-loop VLM and
    video planning with geometrically grounded robot execution for zero-shot long-horizon
    manipulation.
