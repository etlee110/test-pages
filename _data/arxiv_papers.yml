papers:
- id: '2603.06522'
  title: Artificial Intelligence for Detecting Fetal Orofacial Clefts and Advancing
    Medical Education
  authors: Yuanji Zhang, Yuhao Huang, Haoran Dou, Xiliang Zhu, Chen Ling, Zhong Yang,
    Lianying Liang, Jiuping Li, Siying Liang, Rui Li, Yan Cao, Yuhan Zhang, Jiewei
    Lai, Yongsong Zhou, Hongyu Zheng, Xinru Gao, Cheng Yu, Liling Shi, Mengqin Yuan,
    Honglong Li, Xiaoqiong Huang, Chaoyu Chen, Jialin Zhang, Wenxiong Pan, Alejandro
    F. Frangi, Guangzhi He, Xin Yang, Yi Xiong, Linliang Yin, Xuedong Deng, Dong Ni
  abstract: Orofacial clefts are among the most common congenital craniofacial abnormalities,
    yet accurate prenatal detection remains challenging due to the scarcity of experienced
    specialists and the relative rarity of the condition. Early and reliable diagnosis
    is essential to enable timely clinical intervention and reduce associated morbidity.
    Here we show that an artificial intelligence system, trained on over 45,139 ultrasound
    images from 9,215 fetuses across 22 hospitals, can diagnose fetal orofacial clefts
    with sensitivity and specificity exceeding 93% and 95% respectively, matching
    the performance of senior radiologists and substantially outperforming junior
    radiologists. When used as a medical copilot, the system raises junior radiologists'
    sensitivity by more than 6%. Beyond direct diagnostic assistance, the system also
    accelerates the development of clinical expertise. A pilot study involving 24
    radiologists and trainees demonstrated that the model can improve the expertise
    development for rare conditions. This dual-purpose approach offers a scalable
    solution for improving both diagnostic accuracy and specialist training in settings
    where experienced radiologists are scarce.
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06522
  arxiv_url: http://arxiv.org/abs/2603.06522
  key_findings: Orofacial clefts are among the most common congenital craniofacial
    abnormalities, yet accurate prenatal detection remains challenging due to the
    scarcity of experienced specialists and the relative rarity of the condition.
    Early and reliable diagnosis is essential to enable timely clinical intervention
    and reduce associated morbidity. Here we show that an artificial intelligence
    system, trained on over 45,139 ultrasound images from 9,215 fetuses across 22
    hospitals, can diagnose fetal orofacial clefts with sensitivity and specificity
    exceeding 93% and 95% respectively, matching the performance of senior radiologists
    and substantially outperforming junior radiologists.
- id: '2603.06495'
  title: 'COLD-Steer: Steering Large Language Models via In-Context One-step Learning
    Dynamics'
  authors: Kartik Sharma, Rakshit S. Trivedi
  abstract: 'Activation steering methods enable inference-time control of large language
    model (LLM) behavior without retraining, but current approaches face a fundamental
    trade-off: sample-efficient methods suboptimally capture steering signals from
    labeled examples, while methods that better extract these signals require hundreds
    to thousands of examples. We introduce COLD-Steer, a training-free framework that
    steers LLM activations by approximating the representational changes that would
    result from gradient descent on in-context examples. Our key insight is that the
    effect of fine-tuning on a small set of examples can be efficiently approximated
    at inference time without actual parameter updates. We formalize this through
    two complementary approaches: (i) a unit kernel approximation method that updates
    the activations directly using gradients with respect to them, normalized across
    examples, and (ii) a finite-difference approximation requiring only two forward
    passes regardless of example count. Experiments across a variety of steering tasks
    and benchmarks demonstrate that COLD-Steer achieves upto 95% steering effectiveness
    while using 50 times fewer samples compared to the best baseline. COLD-Steer facilitates
    accommodating diverse perspectives without extensive demonstration data, which
    we validate through our experiments on pluralistic alignment tasks. Our framework
    opens new possibilities for adaptive, context-aware model control that can flexibly
    address varying loss-driven human preferences through principled approximation
    of learning dynamics rather than specialized training procedures.'
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06495
  arxiv_url: http://arxiv.org/abs/2603.06495
  key_findings: 'Activation steering methods enable inference-time control of large
    language model (LLM) behavior without retraining, but current approaches face
    a fundamental trade-off: sample-efficient methods suboptimally capture steering
    signals from labeled examples, while methods that better extract these signals
    require hundreds to thousands of examples. We introduce COLD-Steer, a training-free
    framework that steers LLM activations by approximating the representational changes
    that would result from gradient descent on in-context examples. Our key insight
    is that the effect of fine-tuning on a small set of examples can be efficiently
    approximated at inference time without actual parameter updates.'
- id: '2603.06492'
  title: 'NOBLE: Accelerating Transformers with Nonlinear Low-Rank Branches'
  authors: Ethan Smith
  abstract: 'We introduce NOBLE (Nonlinear lOw-rank Branch for Linear Enhancement),
    an architectural augmentation that adds nonlinear low-rank branches to transformer
    linear layers. Unlike LoRA and other parameter-efficient fine-tuning (PEFT) methods,
    NOBLE is designed for pretraining from scratch. The branch is a permanent part
    of the architecture as opposed to an adapter for finetuning on top of frozen weights.
    The branch computes σ(xWdown)Wup where σ is a learnable nonlinearity. We evaluate
    several activation functions and find that CosNet, a two-layer cosine nonlinearity
    with learnable frequency and phase with a linear projection in between them in
    the bottleneck space, performs best. NOBLE achieves substantial improvements with
    minimal overhead: up to 1.47x step speedup to reach baseline eval loss (up to
    32% fewer training steps), with as low as 4% additional parameters and 7% step
    time overhead, resulting in up to 1.22x net wallclock speedup. Experiments on
    LLMs (250M and 1.5B parameters), BERT, VQGAN, and ViT consistently show improved
    training efficiency. We identify one caveat: Mixup/CutMix augmentation interferes
    with NOBLE''s benefits in Imagenet classification along with other stochastic
    augmentations, but when disabled, ViT also improves. This discrepancy is possibly
    explained by regularization techniques that encourage smoother fits to the target
    function while NOBLE may specialize more in sharper aspects of the target function.'
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06492
  arxiv_url: http://arxiv.org/abs/2603.06492
  key_findings: We introduce NOBLE (Nonlinear lOw-rank Branch for Linear Enhancement),
    an architectural augmentation that adds nonlinear low-rank branches to transformer
    linear layers. Unlike LoRA and other parameter-efficient fine-tuning (PEFT) methods,
    NOBLE is designed for pretraining from scratch. The branch is a permanent part
    of the architecture as opposed to an adapter for finetuning on top of frozen weights.
- id: '2603.06485'
  title: 'PONTE: Personalized Orchestration for Natural Language Trustworthy Explanations'
  authors: Vittoria Vineis, Matteo Silvestri, Lorenzo Antonelli, Filippo Betello,
    Gabriele Tolomei
  abstract: 'Explainable Artificial Intelligence (XAI) seeks to enhance the transparency
    and accountability of machine learning systems, yet most methods follow a one-size-fits-all
    paradigm that neglects user differences in expertise, goals, and cognitive needs.
    Although Large Language Models can translate technical explanations into natural
    language, they introduce challenges related to faithfulness and hallucinations.
    To address these challenges, we present PONTE (Personalized Orchestration for
    Natural language Trustworthy Explanations), a human-in-the-loop framework for
    adaptive and reliable XAI narratives. PONTE models personalization as a closed-loop
    validation and adaptation process rather than prompt engineering. It combines:
    (i) a low-dimensional preference model capturing stylistic requirements; (ii)
    a preference-conditioned generator grounded in structured XAI artifacts; and (iii)
    verification modules enforcing numerical faithfulness, informational completeness,
    and stylistic alignment, optionally supported by retrieval-grounded argumentation.
    User feedback iteratively updates the preference state, enabling quick personalization.
    Automatic and human evaluations across healthcare and finance domains show that
    the verification-refinement loop substantially improves completeness and stylistic
    alignment over validation-free generation. Human studies further confirm strong
    agreement between intended preference vectors and perceived style, robustness
    to generation stochasticity, and consistently positive quality assessments.'
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06485
  arxiv_url: http://arxiv.org/abs/2603.06485
  key_findings: Explainable Artificial Intelligence (XAI) seeks to enhance the transparency
    and accountability of machine learning systems, yet most methods follow a one-size-fits-all
    paradigm that neglects user differences in expertise, goals, and cognitive needs.
    Although Large Language Models can translate technical explanations into natural
    language, they introduce challenges related to faithfulness and hallucinations.
    To address these challenges, we present PONTE (Personalized Orchestration for
    Natural language Trustworthy Explanations), a human-in-the-loop framework for
    adaptive and reliable XAI narratives.
- id: '2603.06459'
  title: Do Foundation Models Know Geometry? Probing Frozen Features for Continuous
    Physical Measurement
  authors: Yakov Pyotr Shkolnikov
  abstract: 'Vision-language models encode continuous geometry that their text pathway
    fails to express: a 6,000-parameter linear probe extracts hand joint angles at
    6.1 degrees MAE from frozen features, while the best text output achieves only
    20.0 degrees -- a 3.3x bottleneck. LoRA fine-tuning (r=16, 2,000 images) narrows
    this gap to 6.5 degrees, providing evidence for a pathway-training deficit rather
    than a representational one. Training objective determines accuracy more than
    architecture: five encoders spanning self-supervised, contrastive, and hybrid
    paradigms converge to statistically equivalent accuracy (R^2 approximately 0.55,
    TOST-equivalent at delta=0.03) despite sharing as little as CKA=0.41 representational
    similarity -- functional convergence without representational convergence. Autoregressive
    generation damages geometric fidelity, but the damage originates in the generation
    process, not in language alignment: Qwen2.5-VL''s LLM layers actually improve
    probe accuracy over its raw vision encoder. Layer-wise analysis reveals a universal
    mid-network accuracy peak across all architectures, with attention heads in layers
    18-22 carrying disproportionate geometric signal. These findings enable a single
    frozen backbone to function as a multi-task geometric sensor through lightweight
    probes, without fine-tuning or text generation.'
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06459
  arxiv_url: http://arxiv.org/abs/2603.06459
  key_findings: 'Vision-language models encode continuous geometry that their text
    pathway fails to express: a 6,000-parameter linear probe extracts hand joint angles
    at 6. 1 degrees MAE from frozen features, while the best text output achieves
    only 20. 0 degrees -- a 3.'
- id: '2603.06444'
  title: Prosodic Boundary-Aware Streaming Generation for LLM-Based TTS with Streaming
    Text Input
  authors: Changsong Liu, Tianrui Wang, Ye Ni, Yizhou Peng, Eng Siong Chng
  abstract: 'Streaming TTS that receives streaming text is essential for interactive
    systems, yet this scheme faces two major challenges: unnatural prosody due to
    missing lookahead and long-form collapse due to unbounded context. We propose
    a prosodic-boundary-aware post-training strategy, adapting a pretrained LLM-based
    TTS model using weakly time-aligned data. Specifically, the model is adapted to
    learn early stopping at specified content boundaries when provided with limited
    future text. During inference, a sliding-window prompt carries forward previous
    text and speech tokens, ensuring bounded context and seamless concatenation. Evaluations
    show our method outperforms CosyVoice-Style interleaved baseline in both short
    and long-form scenarios. In long-text synthesis, especially, it achieves a 66.2%
    absolute reduction in word error rate (from 71.0% to 4.8%) and increases speaker
    and emotion similarity by 16.1% and 1.5% relatively, offering a robust solution
    for streaming TTS with incremental text.'
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06444
  arxiv_url: http://arxiv.org/abs/2603.06444
  key_findings: 'Streaming TTS that receives streaming text is essential for interactive
    systems, yet this scheme faces two major challenges: unnatural prosody due to
    missing lookahead and long-form collapse due to unbounded context. We propose
    a prosodic-boundary-aware post-training strategy, adapting a pretrained LLM-based
    TTS model using weakly time-aligned data. Specifically, the model is adapted to
    learn early stopping at specified content boundaries when provided with limited
    future text.'
- id: '2603.06428'
  title: Abductive Reasoning with Syllogistic Forms in Large Language Models
  authors: Hirohiko Abe, Risako Ando, Takanobu Morishita Kentaro Ozeki, Koji Mineshima,
    Mitsuhiro Okada
  abstract: Research in AI using Large-Language Models (LLMs) is rapidly evolving,
    and the comparison of their performance with human reasoning has become a key
    concern. Prior studies have indicated that LLMs and humans share similar biases,
    such as dismissing logically valid inferences that contradict common beliefs.
    However, criticizing LLMs for these biases might be unfair, considering our reasoning
    not only involves formal deduction but also abduction, which draws tentative conclusions
    from limited information. Abduction can be regarded as the inverse form of syllogism
    in its basic structure, that is, a process of drawing a minor premise from a major
    premise and conclusion. This paper explores the accuracy of LLMs in abductive
    reasoning by converting a syllogistic dataset into one suitable for abduction.
    It aims to investigate whether the state-of-the-art LLMs exhibit biases in abduction
    and to identify potential areas for improvement, emphasizing the importance of
    contextualized reasoning beyond formal deduction. This investigation is vital
    for advancing the understanding and application of LLMs in complex reasoning tasks,
    offering insights into bridging the gap between machine and human cognition.
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06428
  arxiv_url: http://arxiv.org/abs/2603.06428
  key_findings: Research in AI using Large-Language Models (LLMs) is rapidly evolving,
    and the comparison of their performance with human reasoning has become a key
    concern. Prior studies have indicated that LLMs and humans share similar biases,
    such as dismissing logically valid inferences that contradict common beliefs.
    However, criticizing LLMs for these biases might be unfair, considering our reasoning
    not only involves formal deduction but also abduction, which draws tentative conclusions
    from limited information.
- id: '2603.06426'
  title: 'CLoPA: Continual Low Parameter Adaptation of Interactive Segmentation for
    Medical Image Annotation'
  authors: Parhom Esmaeili, Chayanin Tangwiriyasakul, Eli Gibson, Sebastien Ourselin,
    M. Jorge Cardoso
  abstract: Interactive segmentation enables clinicians to guide annotation, but existing
    zero-shot models like nnInteractive fail to consistently reach expert-level performance
    across diverse medical imaging tasks. Because annotation campaigns produce a growing
    stream of task-specific labelled data, online adaptation of the segmentation model
    is a natural complement to zero-shot inference. We propose CLoPA, a continual
    adaptation strategy that tunes a small fraction of nnInteractive's parameters
    on the annotation cache, triggered by lightweight episode scheduling. CLoPA requires
    no new parameters or changes to the inference pipeline, and operates entirely
    within the existing annotation workflow. Across eight Medical Segmentation Decathlon
    tasks spanning diverse anatomical targets and imaging characteristics, CLoPA rapidly
    elevates performance to expert-level, even for tasks where nnInteractive previously
    failed, with the majority of gains realised after a single training episode. We
    show that the benefits of tuning different parameter groups depends on task characteristics
    and data regimes. Also, that for targets with complex geometries (e.g., hepatic
    vessels), instance normalisation and low-level feature tuning saturates, suggesting
    a need for deeper feature-representation alignment in the most challenging scenarios.
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06426
  arxiv_url: http://arxiv.org/abs/2603.06426
  key_findings: Interactive segmentation enables clinicians to guide annotation, but
    existing zero-shot models like nnInteractive fail to consistently reach expert-level
    performance across diverse medical imaging tasks. Because annotation campaigns
    produce a growing stream of task-specific labelled data, online adaptation of
    the segmentation model is a natural complement to zero-shot inference. We propose
    CLoPA, a continual adaptation strategy that tunes a small fraction of nnInteractive's
    parameters on the annotation cache, triggered by lightweight episode scheduling.
- id: '2603.06413'
  title: A Reference Architecture of Reinforcement Learning Frameworks
  authors: Xiaoran Liu, Istvan David
  abstract: The surge in reinforcement learning (RL) applications gave rise to diverse
    supporting technology, such as RL frameworks. However, the architectural patterns
    of these frameworks are inconsistent across implementations and there exists no
    reference architecture (RA) to form a common basis of comparison, evaluation,
    and integration. To address this gap, we propose an RA of RL frameworks. Through
    a grounded theory approach, we analyze 18 state-of-the-practice RL frameworks
    and, by that, we identify recurring architectural components and their relationships,
    and codify them in an RA. To demonstrate our RA, we reconstruct characteristic
    RL patterns. Finally, we identify architectural trends, e.g., commonly used components,
    and outline paths to improving RL frameworks.
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06413
  arxiv_url: http://arxiv.org/abs/2603.06413
  key_findings: The surge in reinforcement learning (RL) applications gave rise to
    diverse supporting technology, such as RL frameworks. However, the architectural
    patterns of these frameworks are inconsistent across implementations and there
    exists no reference architecture (RA) to form a common basis of comparison, evaluation,
    and integration. To address this gap, we propose an RA of RL frameworks.
- id: '2603.06408'
  title: Physical Simulator In-the-Loop Video Generation
  authors: Lin Geng Foo, Mark He Huang, Alexandros Lattas, Stylianos Moschoglou, Thabo
    Beeler, Christian Theobalt
  abstract: 'Recent advances in diffusion-based video generation have achieved remarkable
    visual realism but still struggle to obey basic physical laws such as gravity,
    inertia, and collision. Generated objects often move inconsistently across frames,
    exhibit implausible dynamics, or violate physical constraints, limiting the realism
    and reliability of AI-generated videos. We address this gap by introducing Physical
    Simulator In-the-loop Video Generation (PSIVG), a novel framework that integrates
    a physical simulator into the video diffusion process. Starting from a template
    video generated by a pre-trained diffusion model, PSIVG reconstructs the 4D scene
    and foreground object meshes, initializes them within a physical simulator, and
    generates physically consistent trajectories. These simulated trajectories are
    then used to guide the video generator toward spatio-temporally physically coherent
    motion. To further improve texture consistency during object movement, we propose
    a Test-Time Texture Consistency Optimization (TTCO) technique that adapts text
    and feature embeddings based on pixel correspondences from the simulator. Comprehensive
    experiments demonstrate that PSIVG produces videos that better adhere to real-world
    physics while preserving visual quality and diversity. Project Page: https://vcai.mpi-inf.mpg.de/projects/PSIVG/'
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06408
  arxiv_url: http://arxiv.org/abs/2603.06408
  key_findings: Recent advances in diffusion-based video generation have achieved
    remarkable visual realism but still struggle to obey basic physical laws such
    as gravity, inertia, and collision. Generated objects often move inconsistently
    across frames, exhibit implausible dynamics, or violate physical constraints,
    limiting the realism and reliability of AI-generated videos. We address this gap
    by introducing Physical Simulator In-the-loop Video Generation (PSIVG), a novel
    framework that integrates a physical simulator into the video diffusion process.
