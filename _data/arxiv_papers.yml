- id: '2603.06576'
  title: 'BEVLM: Distilling Semantic Knowledge from LLMs into Bird''s-Eye View Representations'
  authors: Thomas Monninger, Shaoyuan Xie, Qi Alfred Chen, Sihao Ding
  abstract: The integration of Large Language Models (LLMs) into autonomous driving
    has attracted growing interest for their strong reasoning and semantic understanding
    abilities, which are essential for handling complex decision-making and long-tail
    scenarios. However, existing methods typically feed LLMs with tokens from multi-view
    and multi-frame images independently, leading to redundant computation and limited
    spatial consistency. This separation in visual processing hinders accurate 3D
    spatial reasoning and fails to maintain geometric coherence across views. On the
    other hand, Bird's-Eye View (BEV) representations learned from geometrically annotated
    tasks (e.g., object detection) provide spatial structure but lack the semantic
    richness of foundation vision encoders. To bridge this gap, we propose BEVLM,
    a framework that connects a spatially consistent and semantically distilled BEV
    representation with LLMs. Through extensive experiments, we show that BEVLM enables
    LLMs to reason more effectively in cross-view driving scenes, improving accuracy
    by 46%, by leveraging BEV features as unified inputs. Furthermore, by distilling
    semantic knowledge from LLMs into BEV representations, BEVLM significantly improves
    closed-loop end-to-end driving performance by 29% in safety-critical scenarios.
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06576
  arxiv_url: http://arxiv.org/abs/2603.06576
  key_findings: The integration of Large Language Models (LLMs) into autonomous driving
    has attracted growing interest for their strong reasoning and semantic understanding
    abilities, which are essential for handling complex decision-making and long-tail
    scenarios. However, existing methods typically feed LLMs with tokens from multi-view
    and multi-frame images independently, leading to redundant computation and limited
    spatial consistency. This separation in visual processing hinders accurate 3D
    spatial reasoning and fails to maintain geometric coherence across views.
- id: '2603.06573'
  title: 'Fly360: Omnidirectional Obstacle Avoidance within Drone View'
  authors: Xiangkai Zhang, Dizhe Zhang, WenZhuo Cao, Zhaoliang Wan, Yingjie Niu, Lu
    Qi, Xu Yang, Zhiyong Liu
  abstract: Obstacle avoidance in unmanned aerial vehicles (UAVs), as a fundamental
    capability, has gained increasing attention with the growing focus on spatial
    intelligence. However, current obstacle-avoidance methods mainly depend on limited
    field-of-view sensors and are ill-suited for UAV scenarios which require full-spatial
    awareness when the movement direction differs from the UAV's heading. This limitation
    motivates us to explore omnidirectional obstacle avoidance for panoramic drones
    with full-view perception. We first study an under explored problem setting in
    which a UAV must generate collision-free motion in environments with obstacles
    from arbitrary directions, and then construct a benchmark that consists of three
    representative flight tasks. Based on such settings, we propose Fly360, a two-stage
    perception-decision pipeline with a fixed random-yaw training strategy. At the
    perception stage, panoramic RGB observations are input and converted into depth
    maps as a robust intermediate representation. For the policy network, it is lightweight
    and used to output body-frame velocity commands from depth inputs. Extensive simulation
    and real-world experiments demonstrate that Fly360 achieves stable omnidirectional
    obstacle avoidance and outperforms forward-view baselines across all tasks. Our
    model is available at https://zxkai.github.io/fly360/
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06573
  arxiv_url: http://arxiv.org/abs/2603.06573
  key_findings: Obstacle avoidance in unmanned aerial vehicles (UAVs), as a fundamental
    capability, has gained increasing attention with the growing focus on spatial
    intelligence. However, current obstacle-avoidance methods mainly depend on limited
    field-of-view sensors and are ill-suited for UAV scenarios which require full-spatial
    awareness when the movement direction differs from the UAV's heading. This limitation
    motivates us to explore omnidirectional obstacle avoidance for panoramic drones
    with full-view perception.
- id: '2603.06570'
  title: 'SUREON: A Benchmark and Vision-Language-Model for Surgical Reasoning'
  authors: Alejandra Perez, Anita Rau, Lee White, Busisiwe Mlambo, Chinedu Nwoye,
    Muhammad Abdullah Jamal, Omid Mohareri
  abstract: 'Surgeons don''t just see -- they interpret. When an expert observes a
    surgical scene, they understand not only what instrument is being used, but why
    it was chosen, what risk it poses, and what comes next. Current surgical AI cannot
    answer such questions, largely because training data that explicitly encodes surgical
    reasoning is immensely difficult to annotate at scale. Yet surgical video lectures
    already contain exactly this -- explanations of intent, rationale, and anticipation,
    narrated by experts for the purpose of teaching. Though inherently noisy and unstructured,
    these narrations encode the reasoning that surgical AI currently lacks. We introduce
    SUREON, a large-scale video QA dataset that systematically harvests this training
    signal from surgical academic videos. SUREON defines 12 question categories covering
    safety assessment, decision rationale, and forecasting, and uses a multi-agent
    pipeline to extract and structure supervision at scale. Across 134.7K clips and
    170 procedure types, SUREON yields 206.8k QA pairs and an expert-validated benchmark
    of 354 examples. To evaluate the extent to which this supervision translates to
    surgical reasoning ability, we introduce two models: SureonVLM, a vision-language
    model adapted through supervised fine-tuning, and SureonVLM-R1, a reasoning model
    trained with Group Relative Policy Optimization. Both models can answer complex
    questions about surgery and substantially outperform larger general-domain models,
    exceeding 84% accuracy on the SUREON benchmark while outperforming general-domain
    models on standard surgical perception tasks. Qualitative analysis of SureonVLM-R1
    reveals explicit reasoning behavior, such as inferring operative intent from visual
    context.'
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06570
  arxiv_url: http://arxiv.org/abs/2603.06570
  key_findings: Surgeons don't just see -- they interpret. When an expert observes
    a surgical scene, they understand not only what instrument is being used, but
    why it was chosen, what risk it poses, and what comes next. Current surgical AI
    cannot answer such questions, largely because training data that explicitly encodes
    surgical reasoning is immensely difficult to annotate at scale.
- id: '2603.06565'
  title: Boosting deep Reinforcement Learning using pretraining with Logical Options
  authors: Zihan Ye, Phil Chau, Raban Emunds, Jannis Blüml, Cedric Derstroff, Quentin
    Delfosse, Oleg Arenz, Kristian Kersting
  abstract: Deep reinforcement learning agents are often misaligned, as they over-exploit
    early reward signals. Recently, several symbolic approaches have addressed these
    challenges by encoding sparse objectives along with aligned plans. However, purely
    symbolic architectures are complex to scale and difficult to apply to continuous
    settings. Hence, we propose a hybrid approach, inspired by humans' ability to
    acquire new skills. We use a two-stage framework that injects symbolic structure
    into neural-based reinforcement learning agents without sacrificing the expressivity
    of deep policies. Our method, called Hybrid Hierarchical RL (H^2RL), introduces
    a logical option-based pretraining strategy to steer the learning policy away
    from short-term reward loops and toward goal-directed behavior while allowing
    the final policy to be refined via standard environment interaction. Empirically,
    we show that this approach consistently improves long-horizon decision-making
    and yields agents that outperform strong neural, symbolic, and neuro-symbolic
    baselines.
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06565
  arxiv_url: http://arxiv.org/abs/2603.06565
  key_findings: Deep reinforcement learning agents are often misaligned, as they over-exploit
    early reward signals. Recently, several symbolic approaches have addressed these
    challenges by encoding sparse objectives along with aligned plans. However, purely
    symbolic architectures are complex to scale and difficult to apply to continuous
    settings.
- id: '2603.06545'
  title: 'LiveSense: A Real-Time Wi-Fi Sensing Platform for Range-Doppler on COTS
    Laptop'
  authors: Jessica Sanson, Rahul C. Shah, Maximilian Pinaroc, Cagri Tanriover, Valerio
    Frascolla
  abstract: We present LiveSense - a cross-platform that transforms a commercial off-the-shelf
    (COTS) Wi-Fi Network Interface Card (NIC) on a laptop into a centimeter-level
    Range-Doppler sensor while preserving simultaneous communication capability. The
    laptops are equipped with COTS Intel AX211 (Wi-Fi 6E) or Intel BE201 (Wi-Fi 7)
    NICs. LiveSense can (i) Extract fully-synchronized channel state information (CSI)
    at >= 40 Hz, (ii) Perform time-phase alignment and self-interference cancellation
    on-device, and (iii) Provide a real-time stream of range, Doppler, subcarrier
    magnitude/phase and annotated video frames to a Python/Qt Graphical User Interface
    (GUI). The demo will showcase the ability to detect (i) Distance and radial velocity
    of attendees within a few meters of the device, (ii) Micro-motion (respiration),
    and (iii) Hand-gesture ranging. To the best of our knowledge, this is the first-ever
    demo to obtain accurate range information of targets from commercial Wi-Fi, despite
    the limited 160 MHz bandwidth.
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06545
  arxiv_url: http://arxiv.org/abs/2603.06545
  key_findings: We present LiveSense - a cross-platform that transforms a commercial
    off-the-shelf (COTS) Wi-Fi Network Interface Card (NIC) on a laptop into a centimeter-level
    Range-Doppler sensor while preserving simultaneous communication capability. The
    laptops are equipped with COTS Intel AX211 (Wi-Fi 6E) or Intel BE201 (Wi-Fi 7)
    NICs. LiveSense can (i) Extract fully-synchronized channel state information (CSI)
    at >= 40 Hz, (ii) Perform time-phase alignment and self-interference cancellation
    on-device, and (iii) Provide a real-time stream of range, Doppler, subcarrier
    magnitude/phase and annotated video frames to a Python/Qt Graphical User Interface
    (GUI).
- id: '2603.06542'
  title: 'RAMoEA-QA: Hierarchical Specialization for Robust Respiratory Audio Question
    Answering'
  authors: Gaia A. Bertolino, Yuwei Zhang, Tong Xia, Domenico Talia, Cecilia Mascolo
  abstract: 'Conversational generative AI is rapidly entering healthcare, where general-purpose
    models must integrate heterogeneous patient signals and support diverse interaction
    styles while producing clinically meaningful outputs. In respiratory care, non-invasive
    audio, such as recordings captured via mobile microphones, enables scalable screening
    and longitudinal monitoring, but the heterogeneity challenge is particularly acute:
    recordings vary widely across devices, environments, and acquisition protocols,
    and questions span multiple intents and question formats. Existing biomedical
    audio-language QA systems are typically monolithic, without any specialization
    mechanisms for tackling diverse respiratory corpora and query intents. They are
    also only validated in limited settings, leaving it unclear how reliably they
    handle the shifts encountered in real-world settings. To address these limitations,
    we introduce RAMoEA-QA, a hierarchically routed generative model for respiratory
    audio question answering that unifies multiple question types and supports both
    discrete and continuous targets within a single multimodal system. RAMoEA-QA applies
    two-stage conditional specialization: an Audio Mixture-of-Experts routes each
    recording to a suitable pre-trained audio encoder, and a Language Mixture-of-Adapters
    selects a LoRA adapter on a shared frozen LLM to match the query intent and answer
    format. By specializing both acoustic representations and generation behaviour
    per example, RAMoEA-QA consistently outperforms strong baselines and routing ablations
    with minimal parameter overhead, improving in-domain test accuracy to 0.72 (vs.
    0.61 and 0.67 for state-of-the-art baselines) and exhibiting the strongest generalization
    for diagnosis under domain, modality, and task shifts.'
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06542
  arxiv_url: http://arxiv.org/abs/2603.06542
  key_findings: 'Conversational generative AI is rapidly entering healthcare, where
    general-purpose models must integrate heterogeneous patient signals and support
    diverse interaction styles while producing clinically meaningful outputs. In respiratory
    care, non-invasive audio, such as recordings captured via mobile microphones,
    enables scalable screening and longitudinal monitoring, but the heterogeneity
    challenge is particularly acute: recordings vary widely across devices, environments,
    and acquisition protocols, and questions span multiple intents and question formats.
    Existing biomedical audio-language QA systems are typically monolithic, without
    any specialization mechanisms for tackling diverse respiratory corpora and query
    intents.'
- id: '2603.06522'
  title: Artificial Intelligence for Detecting Fetal Orofacial Clefts and Advancing
    Medical Education
  authors: Yuanji Zhang, Yuhao Huang, Haoran Dou, Xiliang Zhu, Chen Ling, Zhong Yang,
    Lianying Liang, Jiuping Li, Siying Liang, Rui Li, Yan Cao, Yuhan Zhang, Jiewei
    Lai, Yongsong Zhou, Hongyu Zheng, Xinru Gao, Cheng Yu, Liling Shi, Mengqin Yuan,
    Honglong Li, Xiaoqiong Huang, Chaoyu Chen, Jialin Zhang, Wenxiong Pan, Alejandro
    F. Frangi, Guangzhi He, Xin Yang, Yi Xiong, Linliang Yin, Xuedong Deng, Dong Ni
  abstract: Orofacial clefts are among the most common congenital craniofacial abnormalities,
    yet accurate prenatal detection remains challenging due to the scarcity of experienced
    specialists and the relative rarity of the condition. Early and reliable diagnosis
    is essential to enable timely clinical intervention and reduce associated morbidity.
    Here we show that an artificial intelligence system, trained on over 45,139 ultrasound
    images from 9,215 fetuses across 22 hospitals, can diagnose fetal orofacial clefts
    with sensitivity and specificity exceeding 93% and 95% respectively, matching
    the performance of senior radiologists and substantially outperforming junior
    radiologists. When used as a medical copilot, the system raises junior radiologists'
    sensitivity by more than 6%. Beyond direct diagnostic assistance, the system also
    accelerates the development of clinical expertise. A pilot study involving 24
    radiologists and trainees demonstrated that the model can improve the expertise
    development for rare conditions. This dual-purpose approach offers a scalable
    solution for improving both diagnostic accuracy and specialist training in settings
    where experienced radiologists are scarce.
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06522
  arxiv_url: http://arxiv.org/abs/2603.06522
  key_findings: Orofacial clefts are among the most common congenital craniofacial
    abnormalities, yet accurate prenatal detection remains challenging due to the
    scarcity of experienced specialists and the relative rarity of the condition.
    Early and reliable diagnosis is essential to enable timely clinical intervention
    and reduce associated morbidity. Here we show that an artificial intelligence
    system, trained on over 45,139 ultrasound images from 9,215 fetuses across 22
    hospitals, can diagnose fetal orofacial clefts with sensitivity and specificity
    exceeding 93% and 95% respectively, matching the performance of senior radiologists
    and substantially outperforming junior radiologists.
- id: '2603.06495'
  title: 'COLD-Steer: Steering Large Language Models via In-Context One-step Learning
    Dynamics'
  authors: Kartik Sharma, Rakshit S. Trivedi
  abstract: 'Activation steering methods enable inference-time control of large language
    model (LLM) behavior without retraining, but current approaches face a fundamental
    trade-off: sample-efficient methods suboptimally capture steering signals from
    labeled examples, while methods that better extract these signals require hundreds
    to thousands of examples. We introduce COLD-Steer, a training-free framework that
    steers LLM activations by approximating the representational changes that would
    result from gradient descent on in-context examples. Our key insight is that the
    effect of fine-tuning on a small set of examples can be efficiently approximated
    at inference time without actual parameter updates. We formalize this through
    two complementary approaches: (i) a unit kernel approximation method that updates
    the activations directly using gradients with respect to them, normalized across
    examples, and (ii) a finite-difference approximation requiring only two forward
    passes regardless of example count. Experiments across a variety of steering tasks
    and benchmarks demonstrate that COLD-Steer achieves upto 95% steering effectiveness
    while using 50 times fewer samples compared to the best baseline. COLD-Steer facilitates
    accommodating diverse perspectives without extensive demonstration data, which
    we validate through our experiments on pluralistic alignment tasks. Our framework
    opens new possibilities for adaptive, context-aware model control that can flexibly
    address varying loss-driven human preferences through principled approximation
    of learning dynamics rather than specialized training procedures.'
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06495
  arxiv_url: http://arxiv.org/abs/2603.06495
  key_findings: 'Activation steering methods enable inference-time control of large
    language model (LLM) behavior without retraining, but current approaches face
    a fundamental trade-off: sample-efficient methods suboptimally capture steering
    signals from labeled examples, while methods that better extract these signals
    require hundreds to thousands of examples. We introduce COLD-Steer, a training-free
    framework that steers LLM activations by approximating the representational changes
    that would result from gradient descent on in-context examples. Our key insight
    is that the effect of fine-tuning on a small set of examples can be efficiently
    approximated at inference time without actual parameter updates.'
- id: '2603.06492'
  title: 'NOBLE: Accelerating Transformers with Nonlinear Low-Rank Branches'
  authors: Ethan Smith
  abstract: 'We introduce NOBLE (Nonlinear lOw-rank Branch for Linear Enhancement),
    an architectural augmentation that adds nonlinear low-rank branches to transformer
    linear layers. Unlike LoRA and other parameter-efficient fine-tuning (PEFT) methods,
    NOBLE is designed for pretraining from scratch. The branch is a permanent part
    of the architecture as opposed to an adapter for finetuning on top of frozen weights.
    The branch computes σ(xWdown)Wup where σ is a learnable nonlinearity. We evaluate
    several activation functions and find that CosNet, a two-layer cosine nonlinearity
    with learnable frequency and phase with a linear projection in between them in
    the bottleneck space, performs best. NOBLE achieves substantial improvements with
    minimal overhead: up to 1.47x step speedup to reach baseline eval loss (up to
    32% fewer training steps), with as low as 4% additional parameters and 7% step
    time overhead, resulting in up to 1.22x net wallclock speedup. Experiments on
    LLMs (250M and 1.5B parameters), BERT, VQGAN, and ViT consistently show improved
    training efficiency. We identify one caveat: Mixup/CutMix augmentation interferes
    with NOBLE''s benefits in Imagenet classification along with other stochastic
    augmentations, but when disabled, ViT also improves. This discrepancy is possibly
    explained by regularization techniques that encourage smoother fits to the target
    function while NOBLE may specialize more in sharper aspects of the target function.'
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06492
  arxiv_url: http://arxiv.org/abs/2603.06492
  key_findings: We introduce NOBLE (Nonlinear lOw-rank Branch for Linear Enhancement),
    an architectural augmentation that adds nonlinear low-rank branches to transformer
    linear layers. Unlike LoRA and other parameter-efficient fine-tuning (PEFT) methods,
    NOBLE is designed for pretraining from scratch. The branch is a permanent part
    of the architecture as opposed to an adapter for finetuning on top of frozen weights.
- id: '2603.06485'
  title: 'PONTE: Personalized Orchestration for Natural Language Trustworthy Explanations'
  authors: Vittoria Vineis, Matteo Silvestri, Lorenzo Antonelli, Filippo Betello,
    Gabriele Tolomei
  abstract: 'Explainable Artificial Intelligence (XAI) seeks to enhance the transparency
    and accountability of machine learning systems, yet most methods follow a one-size-fits-all
    paradigm that neglects user differences in expertise, goals, and cognitive needs.
    Although Large Language Models can translate technical explanations into natural
    language, they introduce challenges related to faithfulness and hallucinations.
    To address these challenges, we present PONTE (Personalized Orchestration for
    Natural language Trustworthy Explanations), a human-in-the-loop framework for
    adaptive and reliable XAI narratives. PONTE models personalization as a closed-loop
    validation and adaptation process rather than prompt engineering. It combines:
    (i) a low-dimensional preference model capturing stylistic requirements; (ii)
    a preference-conditioned generator grounded in structured XAI artifacts; and (iii)
    verification modules enforcing numerical faithfulness, informational completeness,
    and stylistic alignment, optionally supported by retrieval-grounded argumentation.
    User feedback iteratively updates the preference state, enabling quick personalization.
    Automatic and human evaluations across healthcare and finance domains show that
    the verification-refinement loop substantially improves completeness and stylistic
    alignment over validation-free generation. Human studies further confirm strong
    agreement between intended preference vectors and perceived style, robustness
    to generation stochasticity, and consistently positive quality assessments.'
  published: '2026-03-06'
  pdf_url: http://arxiv.org/pdf/2603.06485
  arxiv_url: http://arxiv.org/abs/2603.06485
  key_findings: Explainable Artificial Intelligence (XAI) seeks to enhance the transparency
    and accountability of machine learning systems, yet most methods follow a one-size-fits-all
    paradigm that neglects user differences in expertise, goals, and cognitive needs.
    Although Large Language Models can translate technical explanations into natural
    language, they introduce challenges related to faithfulness and hallucinations.
    To address these challenges, we present PONTE (Personalized Orchestration for
    Natural language Trustworthy Explanations), a human-in-the-loop framework for
    adaptive and reliable XAI narratives.
