- id: '2603.12261'
  title: 'The Latent Color Subspace: Emergent Order in High-Dimensional Chaos'
  authors: Mateusz Pach, Jessica Bader, Quentin Bouniot, Serge Belongie, Zeynep Akata
  abstract: Text-to-image generation models have advanced rapidly, yet achieving fine-grained
    control over generated images remains difficult, largely due to limited understanding
    of how semantic information is encoded. We develop an interpretation of the color
    representation in the Variational Autoencoder latent space of FLUX.1 [Dev], revealing
    a structure reflecting Hue, Saturation, and Lightness. We verify our Latent Color
    Subspace (LCS) interpretation by demonstrating that it can both predict and explicitly
    control color, introducing a fully training-free method in FLUX based solely on
    closed-form latent-space manipulation. Code is available at https://github.com/ExplainableML/LCS.
  published: '2026-03-12'
  pdf_url: http://arxiv.org/pdf/2603.12261
  arxiv_url: http://arxiv.org/abs/2603.12261
  key_findings: Text-to-image generation models have advanced rapidly, yet achieving
    fine-grained control over generated images remains difficult, largely due to limited
    understanding of how semantic information is encoded. We develop an interpretation
    of the color representation in the Variational Autoencoder latent space of FLUX.
    1 [Dev], revealing a structure reflecting Hue, Saturation, and Lightness.
- id: '2603.12249'
  title: 'SciMDR: Benchmarking and Advancing Scientific Multimodal Document Reasoning'
  authors: Ziyu Chen, Yilun Zhao, Chengye Wang, Rilyn Han, Manasi Patwardhan, Arman
    Cohan
  abstract: 'Constructing scientific multimodal document reasoning datasets for foundation
    model training involves an inherent trade-off among scale, faithfulness, and realism.
    To address this challenge, we introduce the synthesize-and-reground framework,
    a two-stage pipeline comprising: (1) Claim-Centric QA Synthesis, which generates
    faithful, isolated QA pairs and reasoning on focused segments, and (2) Document-Scale
    Regrounding, which programmatically re-embeds these pairs into full-document tasks
    to ensure realistic complexity. Using this framework, we construct SciMDR, a large-scale
    training dataset for cross-modal comprehension, comprising 300K QA pairs with
    explicit reasoning chains across 20K scientific papers. We further construct SciMDR-Eval,
    an expert-annotated benchmark to evaluate multimodal comprehension within full-length
    scientific workflows. Experiments demonstrate that models fine-tuned on SciMDR
    achieve significant improvements across multiple scientific QA benchmarks, particularly
    in those tasks requiring complex document-level reasoning.'
  published: '2026-03-12'
  pdf_url: http://arxiv.org/pdf/2603.12249
  arxiv_url: http://arxiv.org/abs/2603.12249
  key_findings: 'Constructing scientific multimodal document reasoning datasets for
    foundation model training involves an inherent trade-off among scale, faithfulness,
    and realism. To address this challenge, we introduce the synthesize-and-reground
    framework, a two-stage pipeline comprising: (1) Claim-Centric QA Synthesis, which
    generates faithful, isolated QA pairs and reasoning on focused segments, and (2)
    Document-Scale Regrounding, which programmatically re-embeds these pairs into
    full-document tasks to ensure realistic complexity. Using this framework, we construct
    SciMDR, a large-scale training dataset for cross-modal comprehension, comprising
    300K QA pairs with explicit reasoning chains across 20K scientific papers.'
- id: '2603.12246'
  title: Examining Reasoning LLMs-as-Judges in Non-Verifiable LLM Post-Training
  authors: Yixin Liu, Yue Yu, DiJia Su, Sid Wang, Xuewei Wang, Song Jiang, Bo Liu,
    Arman Cohan, Yuandong Tian, Zhengxing Chen
  abstract: 'Reasoning LLMs-as-Judges, which can benefit from inference-time scaling,
    provide a promising path for extending the success of reasoning models to non-verifiable
    domains where the output correctness/quality cannot be directly checked. However,
    while reasoning judges have shown better performance on static evaluation benchmarks,
    their effectiveness in actual policy training has not been systematically examined.
    Therefore, we conduct a rigorous study to investigate the actual impact of non-reasoning
    and reasoning judges in reinforcement-learning-based LLM alignment. Our controlled
    synthetic setting, where a "gold-standard" judge (gpt-oss-120b) provides preference
    annotations to train smaller judges, reveals key differences between non-reasoning
    and reasoning judges: non-reasoning judges lead to reward hacking easily, while
    reasoning judges can lead to policies that achieve strong performance when evaluated
    by the gold-standard judge. Interestingly, we find that the reasoning-judge-trained
    policies achieve such strong performance by learning to generate highly effective
    adversarial outputs that can also score well on popular benchmarks such as Arena-Hard
    by deceiving other LLM-judges. Combined with our further analysis, our study highlights
    both important findings and room for improvements for applying (reasoning) LLM-judges
    in non-verifiable LLM post-training.'
  published: '2026-03-12'
  pdf_url: http://arxiv.org/pdf/2603.12246
  arxiv_url: http://arxiv.org/abs/2603.12246
  key_findings: Reasoning LLMs-as-Judges, which can benefit from inference-time scaling,
    provide a promising path for extending the success of reasoning models to non-verifiable
    domains where the output correctness/quality cannot be directly checked. However,
    while reasoning judges have shown better performance on static evaluation benchmarks,
    their effectiveness in actual policy training has not been systematically examined.
    Therefore, we conduct a rigorous study to investigate the actual impact of non-reasoning
    and reasoning judges in reinforcement-learning-based LLM alignment.
- id: '2603.12244'
  title: Separable neural architectures as a primitive for unified predictive and
    generative intelligence
  authors: Reza T. Batley, Apurba Sarker, Rajib Mostakim, Andrew Klichine, Sourav
    Saha
  abstract: 'Intelligent systems across physics, language and perception often exhibit
    factorisable structure, yet are typically modelled by monolithic neural architectures
    that do not explicitly exploit this structure. The separable neural architecture
    (SNA) addresses this by formalising a representational class that unifies additive,
    quadratic and tensor-decomposed neural models. By constraining interaction order
    and tensor rank, SNAs impose a structural inductive bias that factorises high-dimensional
    mappings into low-arity components. Separability need not be a property of the
    system itself: it often emerges in the coordinates or representations through
    which the system is expressed. Crucially, this coordinate-aware formulation reveals
    a structural analogy between chaotic spatiotemporal dynamics and linguistic autoregression.
    By treating continuous physical states as smooth, separable embeddings, SNAs enable
    distributional modelling of chaotic systems. This approach mitigates the nonphysical
    drift characteristics of deterministic operators whilst remaining applicable to
    discrete sequences. The compositional versatility of this approach is demonstrated
    across four domains: autonomous waypoint navigation via reinforcement learning,
    inverse generation of multifunctional microstructures, distributional modelling
    of turbulent flow and neural language modelling. These results establish the separable
    neural architecture as a domain-agnostic primitive for predictive and generative
    intelligence, capable of unifying both deterministic and distributional representations.'
  published: '2026-03-12'
  pdf_url: http://arxiv.org/pdf/2603.12244
  arxiv_url: http://arxiv.org/abs/2603.12244
  key_findings: Intelligent systems across physics, language and perception often
    exhibit factorisable structure, yet are typically modelled by monolithic neural
    architectures that do not explicitly exploit this structure. The separable neural
    architecture (SNA) addresses this by formalising a representational class that
    unifies additive, quadratic and tensor-decomposed neural models. By constraining
    interaction order and tensor rank, SNAs impose a structural inductive bias that
    factorises high-dimensional mappings into low-arity components.
- id: '2603.12232'
  title: Incremental Neural Network Verification via Learned Conflicts
  authors: Raya Elsaleh, Liam Davis, Haoze Wu, Guy Katz
  abstract: 'Neural network verification is often used as a core component within
    larger analysis procedures, which generate sequences of closely related verification
    queries over the same network. In existing neural network verifiers, each query
    is typically solved independently, and information learned during previous runs
    is discarded, leading to repeated exploration of the same infeasible regions of
    the search space. In this work, we aim to expedite verification by reducing this
    redundancy. We propose an incremental verification technique that reuses learned
    conflicts across related verification queries. The technique can be added on top
    of any branch-and-bound-based neural network verifier. During verification, the
    verifier records conflicts corresponding to learned infeasible combinations of
    activation phases, and retains them across runs. We formalize a refinement relation
    between verification queries and show that conflicts learned for a query remain
    valid under refinement, enabling sound conflict inheritance. Inherited conflicts
    are handled using a SAT solver to perform consistency checks and propagation,
    allowing infeasible subproblems to be detected and pruned early during search.
    We implement the proposed technique in the Marabou verifier and evaluate it on
    three verification tasks: local robustness radius determination, verification
    with input splitting, and minimal sufficient feature set extraction. Our experiments
    show that incremental conflict reuse reduces verification effort and yields speedups
    of up to $1.9\times$ over a non-incremental baseline.'
  published: '2026-03-12'
  pdf_url: http://arxiv.org/pdf/2603.12232
  arxiv_url: http://arxiv.org/abs/2603.12232
  key_findings: Neural network verification is often used as a core component within
    larger analysis procedures, which generate sequences of closely related verification
    queries over the same network. In existing neural network verifiers, each query
    is typically solved independently, and information learned during previous runs
    is discarded, leading to repeated exploration of the same infeasible regions of
    the search space. In this work, we aim to expedite verification by reducing this
    redundancy.
- id: '2603.12230'
  title: Security Considerations for Artificial Intelligence Agents
  authors: Ninghui Li, Kaiyuan Zhang, Kyle Polley, Jerry Ma
  abstract: 'This article, a lightly adapted version of Perplexity''s response to
    NIST/CAISI Request for Information 2025-0035, details our observations and recommendations
    concerning the security of frontier AI agents. These insights are informed by
    Perplexity''s experience operating general-purpose agentic systems used by millions
    of users and thousands of enterprises in both controlled and open-world environments.
    Agent architectures change core assumptions around code-data separation, authority
    boundaries, and execution predictability, creating new confidentiality, integrity,
    and availability failure modes. We map principal attack surfaces across tools,
    connectors, hosting boundaries, and multi-agent coordination, with particular
    emphasis on indirect prompt injection, confused-deputy behavior, and cascading
    failures in long-running workflows. We then assess current defenses as a layered
    stack: input-level and model-level mitigations, sandboxed execution, and deterministic
    policy enforcement for high-consequence actions. Finally, we identify standards
    and research gaps, including adaptive security benchmarks, policy models for delegation
    and privilege control, and guidance for secure multi-agent system design aligned
    with NIST risk management principles.'
  published: '2026-03-12'
  pdf_url: http://arxiv.org/pdf/2603.12230
  arxiv_url: http://arxiv.org/abs/2603.12230
  key_findings: This article, a lightly adapted version of Perplexity's response to
    NIST/CAISI Request for Information 2025-0035, details our observations and recommendations
    concerning the security of frontier AI agents. These insights are informed by
    Perplexity's experience operating general-purpose agentic systems used by millions
    of users and thousands of enterprises in both controlled and open-world environments.
    Agent architectures change core assumptions around code-data separation, authority
    boundaries, and execution predictability, creating new confidentiality, integrity,
    and availability failure modes.
- id: '2603.12228'
  title: 'Neural Thickets: Diverse Task Experts Are Dense Around Pretrained Weights'
  authors: Yulu Gan, Phillip Isola
  abstract: Pretraining produces a learned parameter vector that is typically treated
    as a starting point for further iterative adaptation. In this work, we instead
    view the outcome of pretraining as a distribution over parameter vectors, whose
    support already contains task-specific experts. We show that in small models such
    expert solutions occupy a negligible fraction of the volume of this distribution,
    making their discovery reliant on structured optimization methods such as gradient
    descent. In contrast, in large, well-pretrained models the density of task-experts
    increases dramatically, so that diverse, task-improving specialists populate a
    substantial fraction of the neighborhood around the pretrained weights. Motivated
    by this perspective, we explore a simple, fully parallel post-training method
    that samples $N$ parameter perturbations at random, selects the top $K$, and ensembles
    predictions via majority vote. Despite its simplicity, this approach is competitive
    with standard post-training methods such as PPO, GRPO, and ES for contemporary
    large-scale models.
  published: '2026-03-12'
  pdf_url: http://arxiv.org/pdf/2603.12228
  arxiv_url: http://arxiv.org/abs/2603.12228
  key_findings: Pretraining produces a learned parameter vector that is typically
    treated as a starting point for further iterative adaptation. In this work, we
    instead view the outcome of pretraining as a distribution over parameter vectors,
    whose support already contains task-specific experts. We show that in small models
    such expert solutions occupy a negligible fraction of the volume of this distribution,
    making their discovery reliant on structured optimization methods such as gradient
    descent.
- id: '2603.12226'
  title: Sparking Scientific Creativity via LLM-Driven Interdisciplinary Inspiration
  authors: Priyanka Kargupta, Shuhaib Mehri, Dilek Hakkani-Tur, Jiawei Han
  abstract: 'Despite interdisciplinary research leading to larger and longer-term
    impact, most work remains confined to single-domain academic silos. Recent AI-based
    approaches to scientific discovery show promise for interdisciplinary research,
    but many prioritize rapidly designing experiments and solutions, bypassing the
    exploratory, collaborative reasoning processes that drive creative interdisciplinary
    breakthroughs. As a result, prior efforts largely prioritize automating scientific
    discovery rather than augmenting the reasoning processes that underlie scientific
    disruption. We present Idea-Catalyst, a novel framework that systematically identifies
    interdisciplinary insights to support creative reasoning in both humans and large
    language models. Starting from an abstract research goal, Idea-Catalyst is designed
    to assist the brainstorming stage, explicitly avoiding premature anchoring on
    specific solutions. The framework embodies key metacognitive features of interdisciplinary
    reasoning: (a) defining and assessing research goals, (b) awareness of a domain''s
    opportunities and unresolved challenges, and (c) strategic exploration of interdisciplinary
    ideas based on impact potential. Concretely, Idea-Catalyst decomposes an abstract
    goal (e.g., improving human-AI collaboration) into core target-domain research
    questions that guide the analysis of progress and open challenges within that
    domain. These challenges are reformulated as domain-agnostic conceptual problems,
    enabling retrieval from external disciplines (e.g., Psychology, Sociology) that
    address analogous issues. By synthesizing and recontextualizing insights from
    these domains back into the target domain, Idea-Catalyst ranks source domains
    by their interdisciplinary potential. Empirically, this targeted integration improves
    average novelty by 21% and insightfulness by 16%, while remaining grounded in
    the original research problem.'
  published: '2026-03-12'
  pdf_url: http://arxiv.org/pdf/2603.12226
  arxiv_url: http://arxiv.org/abs/2603.12226
  key_findings: Despite interdisciplinary research leading to larger and longer-term
    impact, most work remains confined to single-domain academic silos. Recent AI-based
    approaches to scientific discovery show promise for interdisciplinary research,
    but many prioritize rapidly designing experiments and solutions, bypassing the
    exploratory, collaborative reasoning processes that drive creative interdisciplinary
    breakthroughs. As a result, prior efforts largely prioritize automating scientific
    discovery rather than augmenting the reasoning processes that underlie scientific
    disruption.
- id: '2603.12224'
  title: Portfolio of Solving Strategies in CEGAR-based Object Packing and Scheduling
    for Sequential 3D Printing
  authors: Pavel Surynek
  abstract: Computing power that used to be available only in supercomputers decades
    ago especially their parallelism is currently available in standard personal computer
    CPUs even in CPUs for mobile telephones. We show how to effectively utilize the
    computing power of modern multi-core personal computer CPU to solve the complex
    combinatorial problem of object arrangement and scheduling for sequential 3D printing.
    We achieved this by parallelizing the existing CEGAR-SEQ algorithm that solves
    the sequential object arrangement and scheduling by expressing it as a linear
    arithmetic formula which is then solved by a technique inspired by counterexample
    guided abstraction refinement (CEGAR). The original CEGAR-SEQ algorithm uses an
    object arrangement strategy that places objects towards the center of the printing
    plate. We propose alternative object arrangement strategies such as placing objects
    towards a corner of the printing plate and scheduling objects according to their
    height. Our parallelization is done at the high-level where we execute the CEGAR-SEQ
    algorithm in parallel with a portfolio of object arrangement strategies, an algorithm
    is called Porfolio-CEGAR-SEQ. Our experimental evaluation indicates that Porfolio-CEGAR-SEQ
    outperforms the original CEGAR-SEQ. When a batch of objects for multiple printing
    plates is scheduled, Portfolio-CEGAR-SEQ often uses fewer printing plates than
    CEGAR-SEQ.
  published: '2026-03-12'
  pdf_url: http://arxiv.org/pdf/2603.12224
  arxiv_url: http://arxiv.org/abs/2603.12224
  key_findings: Computing power that used to be available only in supercomputers decades
    ago especially their parallelism is currently available in standard personal computer
    CPUs even in CPUs for mobile telephones. We show how to effectively utilize the
    computing power of modern multi-core personal computer CPU to solve the complex
    combinatorial problem of object arrangement and scheduling for sequential 3D printing.
    We achieved this by parallelizing the existing CEGAR-SEQ algorithm that solves
    the sequential object arrangement and scheduling by expressing it as a linear
    arithmetic formula which is then solved by a technique inspired by counterexample
    guided abstraction refinement (CEGAR).
- id: '2603.12215'
  title: 'RDNet: Region Proportion-Aware Dynamic Adaptive Salient Object Detection
    Network in Optical Remote Sensing Images'
  authors: Bin Wan, Runmin Cong, Xiaofei Zhou, Hao Fang, Yaoqi Sun, Sam Kwong
  abstract: 'Salient object detection (SOD) in remote sensing images faces significant
    challenges due to large variations in object sizes, the computational cost of
    self-attention mechanisms, and the limitations of CNN-based extractors in capturing
    global context and long-range dependencies. Existing methods that rely on fixed
    convolution kernels often struggle to adapt to diverse object scales, leading
    to detail loss or irrelevant feature aggregation. To address these issues, this
    work aims to enhance robustness to scale variations and achieve precise object
    localization. We propose the Region Proportion-Aware Dynamic Adaptive Salient
    Object Detection Network (RDNet), which replaces the CNN backbone with the SwinTransformer
    for global context modeling and introduces three key modules: (1) the Dynamic
    Adaptive Detail-aware (DAD) module, which applies varied convolution kernels guided
    by object region proportions; (2) the Frequency-matching Context Enhancement (FCE)
    module, which enriches contextual information through wavelet interactions and
    attention; and (3) the Region Proportion-aware Localization (RPL) module, which
    employs cross-attention to highlight semantic details and integrates a Proportion
    Guidance (PG) block to assist the DAD module. By combining these modules, RDNet
    achieves robustness against scale variations and accurate localization, delivering
    superior detection performance compared with state-of-the-art methods.'
  published: '2026-03-12'
  pdf_url: http://arxiv.org/pdf/2603.12215
  arxiv_url: http://arxiv.org/abs/2603.12215
  key_findings: Salient object detection (SOD) in remote sensing images faces significant
    challenges due to large variations in object sizes, the computational cost of
    self-attention mechanisms, and the limitations of CNN-based extractors in capturing
    global context and long-range dependencies. Existing methods that rely on fixed
    convolution kernels often struggle to adapt to diverse object scales, leading
    to detail loss or irrelevant feature aggregation. To address these issues, this
    work aims to enhance robustness to scale variations and achieve precise object
    localization.
