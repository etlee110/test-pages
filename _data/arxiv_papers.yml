- id: '2603.08679'
  title: A New Lower Bound for the Random Offerer Mechanism in Bilateral Trade using
    AI-Guided Evolutionary Search
  authors: Yang Cai, Vineet Gupta, Zun Li, Aranyak Mehta
  abstract: 'The celebrated Myerson--Satterthwaite theorem shows that in bilateral
    trade, no mechanism can be simultaneously fully efficient, Bayesian incentive
    compatible (BIC), and budget balanced (BB). This naturally raises the question
    of how closely the gains from trade (GFT) achievable by a BIC and BB mechanism
    can approximate the first-best (fully efficient) benchmark. The optimal BIC and
    BB mechanism is typically complex and highly distribution-dependent, making it
    difficult to characterize directly. Consequently, much of the literature analyzes
    simpler mechanisms such as the Random-Offerer (RO) mechanism and establishes constant-factor
    guarantees relative to the first-best GFT. An important open question concerns
    the worst-case performance of the RO mechanism relative to first-best (FB) efficiency.
    While it was originally hypothesized that the approximation ratio $\frac{\text{GFT}_{\text{FB}}}{\text{GFT}_{\text{RO}}}$
    is bounded by $2$, recent work provided counterexamples to this conjecture: Cai
    et al. proved that the ratio can be strictly larger than $2$, and Babaioff et
    al. exhibited an explicit example with ratio approximately $2.02$. In this work,
    we employ AlphaEvolve, an AI-guided evolutionary search framework, to explore
    the space of value distributions. We identify a new worst-case instance that yields
    an improved lower bound of $\frac{\text{GFT}_{\text{FB}}}{\text{GFT}_{\text{RO}}}
    \ge \textbf{2.0749}$. This establishes a new lower bound on the worst-case performance
    of the Random-Offerer mechanism, demonstrating a wider efficiency gap than previously
    known.'
  published: '2026-03-09'
  pdf_url: http://arxiv.org/pdf/2603.08679
  arxiv_url: http://arxiv.org/abs/2603.08679
  key_findings: The celebrated Myerson--Satterthwaite theorem shows that in bilateral
    trade, no mechanism can be simultaneously fully efficient, Bayesian incentive
    compatible (BIC), and budget balanced (BB). This naturally raises the question
    of how closely the gains from trade (GFT) achievable by a BIC and BB mechanism
    can approximate the first-best (fully efficient) benchmark. The optimal BIC and
    BB mechanism is typically complex and highly distribution-dependent, making it
    difficult to characterize directly.
- id: '2603.08655'
  title: 'OfficeQA Pro: An Enterprise Benchmark for End-to-End Grounded Reasoning'
  authors: Krista Opsahl-Ong, Arnav Singhvi, Jasmine Collins, Ivan Zhou, Cindy Wang,
    Ashutosh Baheti, Owen Oertell, Jacob Portes, Sam Havens, Erich Elsen, Michael
    Bendersky, Matei Zaharia, Xing Chen
  abstract: We introduce OfficeQA Pro, a benchmark for evaluating AI agents on grounded,
    multi-document reasoning over a large and heterogeneous document corpus. The corpus
    consists of U.S. Treasury Bulletins spanning nearly 100 years, comprising 89,000
    pages and over 26 million numerical values. OfficeQA Pro consists of 133 questions
    that require precise document parsing, retrieval, and analytical reasoning across
    both unstructured text and tabular data. Frontier LLMs including Claude Opus 4.6,
    GPT-5.4, and Gemini 3.1 Pro Preview achieve less than 5% accuracy on OfficeQA
    Pro when relying on parametric knowledge, and less than 12% with additional access
    to the web. When provided directly with the document corpus, frontier agents still
    struggle on over half of questions, scoring 34.1% on average. We find that providing
    agents with a structured document representation produced by Databricks' ai_parse_document
    yields a 16.1% average relative performance gain across agents. We conduct additional
    ablations to study the effects of model selection, table representation, retrieval
    strategy, and test-time scaling on performance. Despite these improvements, significant
    headroom remains before agents can be considered reliable at enterprise-grade
    grounded reasoning.
