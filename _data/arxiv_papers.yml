- id: '2603.04356'
  title: 'RoboCasa365: A Large-Scale Simulation Framework for Training and Benchmarking
    Generalist Robots'
  authors: Soroush Nasiriany, Sepehr Nasiriany, Abhiram Maddukuri, Yuke Zhu
  abstract: Recent advances in robot learning have accelerated progress toward generalist
    robots that can perform everyday tasks in human environments. Yet it remains difficult
    to gauge how close we are to this vision. The field lacks a reproducible, large-scale
    benchmark for systematic evaluation. To fill this gap, we present RoboCasa365,
    a comprehensive simulation benchmark for household mobile manipulation. Built
    on the RoboCasa platform, RoboCasa365 introduces 365 everyday tasks across 2,500
    diverse kitchen environments, with over 600 hours of human demonstration data
    and over 1600 hours of synthetically generated demonstration data -- making it
    one of the most diverse and large-scale resources for studying generalist policies.
    RoboCasa365 is designed to support systematic evaluations for different problem
    settings, including multi-task learning, robot foundation model training, and
    lifelong learning. We conduct extensive experiments on this benchmark with state-of-the-art
    methods and analyze the impacts of task diversity, dataset scale, and environment
    variation on generalization. Our results provide new insights into what factors
    most strongly affect the performance of generalist robots and inform strategies
    for future progress in the field.
  published: '2026-03-04'
  pdf_url: http://arxiv.org/pdf/2603.04356
  arxiv_url: http://arxiv.org/abs/2603.04356
  key_findings: Recent advances in robot learning have accelerated progress toward
    generalist robots that can perform everyday tasks in human environments. Yet it
    remains difficult to gauge how close we are to this vision. The field lacks a
    reproducible, large-scale benchmark for systematic evaluation.
- id: '2603.04355'
  title: Efficient Refusal Ablation in LLM through Optimal Transport
  authors: Geraldin Nanfack, Eugene Belilovsky, Elvis Dohmatob
  abstract: Safety-aligned language models refuse harmful requests through learned
    refusal behaviors encoded in their internal representations. Recent activation-based
    jailbreaking methods circumvent these safety mechanisms by applying orthogonal
    projections to remove refusal directions, but these approaches treat refusal as
    a one-dimensional phenomenon and ignore the rich distributional structure of model
    activations. We introduce a principled framework based on optimal transport theory
    that transforms the entire distribution of harmful activations to match harmless
    ones. By combining PCA with closed-form Gaussian optimal transport, we achieve
    efficient computation in high-dimensional representation spaces while preserving
    essential geometric structure. Across six models (Llama-2, Llama-3.1, Qwen-2.5;
    7B-32B parameters), our method achieves up to 11% higher attack success rates
    than state-of-the-art baselines while maintaining comparable perplexity, demonstrating
    superior preservation of model capabilities. Critically, we discover that layer-selective
    intervention (applying optimal transport to 1-2 carefully chosen layers at approximately
    40-60% network depth) substantially outperforms full-network interventions, revealing
    that refusal mechanisms may be localized rather than distributed. Our analysis
    provides new insights into the geometric structure of safety representations and
    suggests that current alignment methods may be vulnerable to distributional attacks
    beyond simple direction removal.
  published: '2026-03-04'
  pdf_url: http://arxiv.org/pdf/2603.04355
  arxiv_url: http://arxiv.org/abs/2603.04355
  key_findings: Safety-aligned language models refuse harmful requests through learned
    refusal behaviors encoded in their internal representations. Recent activation-based
    jailbreaking methods circumvent these safety mechanisms by applying orthogonal
    projections to remove refusal directions, but these approaches treat refusal as
    a one-dimensional phenomenon and ignore the rich distributional structure of model
    activations. We introduce a principled framework based on optimal transport theory
    that transforms the entire distribution of harmful activations to match harmless
    ones.
- id: '2603.04348'
  title: 'RANGER: Sparsely-Gated Mixture-of-Experts with Adaptive Retrieval Re-ranking
    for Pathology Report Generation'
  authors: Yixin Chen, Ziyu Su, Hikmat Khan, Muhammad Khalid Khan Niazi
  abstract: Pathology report generation remains a relatively under-explored downstream
    task, primarily due to the gigapixel scale and complex morphological heterogeneity
    of Whole Slide Images (WSIs). Existing pathology report generation frameworks
    typically employ transformer architectures, relying on a homogeneous decoder architecture
    and static knowledge retrieval integration. Such architectures limit generative
    specialization and may introduce noisy external guidance during the report generation
    process. To address these limitations, we propose RANGER, a sparsely-gated Mixture-of-Experts
    (MoE) framework with adaptive retrieval re-ranking for pathology report generation.
    Specifically, we integrate a sparsely gated MoE into the decoder, along with noisy
    top-$k$ routing and load-balancing regularization, to enable dynamic expert specialization
    across various diagnostic patterns. Additionally, we introduce an adaptive retrieval
    re-ranking module that selectively refines retrieved memory from a knowledge base
    before integration, reducing noise and improving semantic alignment based on visual
    feature representations. We perform extensive experiments on the PathText-BRCA
    dataset and demonstrate consistent improvements over existing approaches across
    standard natural language generation metrics. Our full RANGER model achieves optimal
    performance on PathText dataset, reaching BLEU-1 to BLEU-4 scores of 0.4598, 0.3044,
    0.2036, and 0.1435, respectively, with METEOR of 0.1883, and ROUGE-L of 0.3038,
    validating the effectiveness of dynamic expert routing and adaptive knowledge
    refinement for semantically grounded pathology report generation.
  published: '2026-03-04'
  pdf_url: http://arxiv.org/pdf/2603.04348
  arxiv_url: http://arxiv.org/abs/2603.04348
  key_findings: Pathology report generation remains a relatively under-explored downstream
    task, primarily due to the gigapixel scale and complex morphological heterogeneity
    of Whole Slide Images (WSIs). Existing pathology report generation frameworks
    typically employ transformer architectures, relying on a homogeneous decoder architecture
    and static knowledge retrieval integration. Such architectures limit generative
    specialization and may introduce noisy external guidance during the report generation
    process.
