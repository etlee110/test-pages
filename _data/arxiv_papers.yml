- id: '2603.01748'
  title: Discrete World Models via Regularization
  authors: Davide Bizzaro, Luciano Serafini
  abstract: 'World models aim to capture the states and dynamics of an environment
    in a compact latent space. Moreover, using Boolean state representations is particularly
    useful for search heuristics and symbolic reasoning and planning. Existing approaches
    keep latents informative via decoder-based reconstruction, or instead via contrastive
    or reward signals. In this work, we introduce Discrete World Models via Regularization
    (DWMR): a reconstruction-free and contrastive-free method for unsupervised Boolean
    world-model learning. In particular, we introduce a novel world-modeling loss
    that couples latent prediction with specialized regularizers. Such regularizers
    maximize the entropy and independence of the representation bits through variance,
    correlation, and coskewness penalties, while simultaneously enforcing a locality
    prior for sparse action changes. To enable effective optimization, we also introduce
    a novel training scheme improving robustness to discrete roll-outs. Experiments
    on two benchmarks with underlying combinatorial structure show that DWMR learns
    more accurate representations and transitions than reconstruction-based alternatives.
    Finally, DWMR can also be paired with an auxiliary reconstruction decoder, and
    this combination yields additional gains.'
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.01748
  arxiv_url: http://arxiv.org/abs/2603.01748
  key_findings: World models aim to capture the states and dynamics of an environment
    in a compact latent space. Moreover, using Boolean state representations is particularly
    useful for search heuristics and symbolic reasoning and planning. Existing approaches
    keep latents informative via decoder-based reconstruction, or instead via contrastive
    or reward signals.
- id: '2603.01746'
  title: An Analysis of Multi-Task Architectures for the Hierarchic Multi-Label Problem
    of Vehicle Model and Make Classification
  authors: Alexandru Manole, Laura Diosan
  abstract: 'Most information in our world is organized hierarchically; however, many
    Deep Learning approaches do not leverage this semantically rich structure. Research
    suggests that human learning benefits from exploiting the hierarchical structure
    of information, and intelligent models could similarly take advantage of this
    through multi-task learning. In this work, we analyze the advantages and limitations
    of multi-task learning in a hierarchical multi-label classification problem: car
    make and model classification. Considering both parallel and cascaded multi-task
    architectures, we evaluate their impact on different Deep Learning classifiers
    (CNNs, Transformers) while varying key factors such as dropout rate and loss weighting
    to gain deeper insight into the effectiveness of this approach. The tests are
    conducted on two established benchmarks: StanfordCars and CompCars. We observe
    the effectiveness of the multi-task paradigm on both datasets, improving the performance
    of the investigated CNN in almost all scenarios. Furthermore, the approach yields
    significant improvements on the CompCars dataset for both types of models.'
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.01746
  arxiv_url: http://arxiv.org/abs/2603.01746
  key_findings: 'Most information in our world is organized hierarchically; however,
    many Deep Learning approaches do not leverage this semantically rich structure.
    Research suggests that human learning benefits from exploiting the hierarchical
    structure of information, and intelligent models could similarly take advantage
    of this through multi-task learning. In this work, we analyze the advantages and
    limitations of multi-task learning in a hierarchical multi-label classification
    problem: car make and model classification.'
- id: '2603.01741'
  title: Rethinking Policy Diversity in Ensemble Policy Gradient in Large-Scale Reinforcement
    Learning
  authors: Naoki Shitanda, Motoki Omura, Tatsuya Harada, Takayuki Osa
  abstract: Scaling reinforcement learning to tens of thousands of parallel environments
    requires overcoming the limited exploration capacity of a single policy. Ensemble-based
    policy gradient methods, which employ multiple policies to collect diverse samples,
    have recently been proposed to promote exploration. However, merely broadening
    the exploration space does not always enhance learning capability, since excessive
    exploration can reduce exploration quality or compromise training stability. In
    this work, we theoretically analyze the impact of inter-policy diversity on learning
    efficiency in policy ensembles, and propose Coupled Policy Optimization which
    regulates diversity through KL constraints between policies. The proposed method
    enables effective exploration and outperforms strong baselines such as SAPG, PBT,
    and PPO across multiple tasks, including challenging dexterous manipulation, in
    terms of both sample efficiency and final performance. Furthermore, analysis of
    policy diversity and effective sample size during training reveals that follower
    policies naturally distribute around the leader, demonstrating the emergence of
    structured and efficient exploratory behavior. Our results indicate that diverse
    exploration under appropriate regulation is key to achieving stable and sample-efficient
    learning in ensemble policy gradient methods. Project page at https://naoki04.github.io/paper-cpo/
    .
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.01741
  arxiv_url: http://arxiv.org/abs/2603.01741
  key_findings: Scaling reinforcement learning to tens of thousands of parallel environments
    requires overcoming the limited exploration capacity of a single policy. Ensemble-based
    policy gradient methods, which employ multiple policies to collect diverse samples,
    have recently been proposed to promote exploration. However, merely broadening
    the exploration space does not always enhance learning capability, since excessive
    exploration can reduce exploration quality or compromise training stability.
- id: '2603.01739'
  title: 'CA-AFP: Cluster-Aware Adaptive Federated Pruning'
  authors: Om Govind Jha, Harsh Shukla, Haroon R. Lone
  abstract: 'Federated Learning (FL) faces major challenges in real-world deployments
    due to statistical heterogeneity across clients and system heterogeneity arising
    from resource-constrained devices. While clustering-based approaches mitigate
    statistical heterogeneity and pruning techniques improve memory and communication
    efficiency, these strategies are typically studied in isolation. We propose CA-AFP,
    a unified framework that jointly addresses both challenges by performing cluster-specific
    model pruning. In CA-AFP, clients are first grouped into clusters, and a separate
    model for each cluster is adaptively pruned during training. The framework introduces
    two key innovations: (1) a cluster-aware importance scoring mechanism that combines
    weight magnitude, intra-cluster coherence, and gradient consistency to identify
    parameters for pruning, and (2) an iterative pruning schedule that progressively
    removes parameters while enabling model self-healing through weight regrowth.
    We evaluate CA-AFP on two widely used human activity recognition benchmarks, UCI
    HAR and WISDM, under natural user-based federated partitions. Experimental results
    demonstrate that CA-AFP achieves a favorable balance between predictive accuracy,
    inter-client fairness, and communication efficiency. Compared to pruning-based
    baselines, CA-AFP consistently improves accuracy and lower performance disparity
    across clients with limited fine-tuning, while requiring substantially less communication
    than dense clustering-based methods. It also shows robustness to different Non-IID
    levels of data. Finally, ablation studies analyze the impact of clustering, pruning
    schedules and scoring mechanism offering practical insights into the design of
    efficient and adaptive FL systems.'
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.01739
  arxiv_url: http://arxiv.org/abs/2603.01739
  key_findings: Federated Learning (FL) faces major challenges in real-world deployments
    due to statistical heterogeneity across clients and system heterogeneity arising
    from resource-constrained devices. While clustering-based approaches mitigate
    statistical heterogeneity and pruning techniques improve memory and communication
    efficiency, these strategies are typically studied in isolation. We propose CA-AFP,
    a unified framework that jointly addresses both challenges by performing cluster-specific
    model pruning.
- id: '2603.01731'
  title: Solving Inverse PDE Problems using Minimization Methods and AI
  authors: Noura Helwani, Sophie Moufawad, Georges Sakr
  abstract: Many physical and engineering systems require solving direct problems
    to predict behavior and inverse problems to determine unknown parameters from
    measurement. In this work, we study both aspects for systems governed by differential
    equations, contrasting well-established numerical methods with new AI-based techniques,
    specifically Physics-Informed Neural Networks (PINNs). We first analyze the logistic
    differential equation, using its closed-form solution to verify numerical schemes
    and validate PINN performance. We then address the Porous Medium Equation (PME),
    a nonlinear partial differential equation with no general closed-form solution,
    building strong solvers of the direct problem and testing techniques for parameter
    estimation in the inverse problem. Our results suggest that PINNs can closely
    estimate solutions at competitive computational cost, and thus propose an effective
    tool for solving both direct and inverse problems for complex systems.
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.01731
  arxiv_url: http://arxiv.org/abs/2603.01731
  key_findings: Many physical and engineering systems require solving direct problems
    to predict behavior and inverse problems to determine unknown parameters from
    measurement. In this work, we study both aspects for systems governed by differential
    equations, contrasting well-established numerical methods with new AI-based techniques,
    specifically Physics-Informed Neural Networks (PINNs). We first analyze the logistic
    differential equation, using its closed-form solution to verify numerical schemes
    and validate PINN performance.
- id: '2603.01724'
  title: 'GMP: A Benchmark for Content Moderation under Co-occurring Violations and
    Dynamic Rules'
  authors: Houde Dong, Yifei She, Kai Ye, Liangcai Su, Chenxiong Qian, Jie Hao
  abstract: 'Online content moderation is essential for maintaining a healthy digital
    environment, and reliance on AI for this task continues to grow. Consider a user
    comment using national stereotypes to insult a politician. This example illustrates
    two critical challenges in real-world scenarios: (1) Co-occurring Violations,
    where a single post violates multiple policies (e.g., prejudice and personal attacks);
    (2) Dynamic rules of moderation, where determination of a violation depends on
    platform-specific guidelines that evolve across contexts . The intersection of
    co-occurring harms and dynamically changing rules highlights a core limitation
    of current AI systems: although large language models (LLMs) are adept at following
    fixed guidelines, their judgment capabilities degrade when policies are unstable
    or context-dependent . In practice, such shortcomings lead to inconsistent moderation:
    either erroneously restricting legitimate expression or allowing harmful content
    to remain online . This raises a critical question for evaluation: Does high performance
    on existing static benchmarks truly guarantee robust generalization of AI judgment
    to real-world scenarios involving co-occurring violations and dynamically changing
    rules?'
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.01724
