- id: '2603.09972'
  title: 'From Data Statistics to Feature Geometry: How Correlations Shape Superposition'
  authors: Lucas Prieto, Edward Stevinson, Melih Barsbey, Tolga Birdal, Pedro A. M.
    Mediano
  abstract: A central idea in mechanistic interpretability is that neural networks
    represent more features than they have dimensions, arranging them in superposition
    to form an over-complete basis. This framing has been influential, motivating
    dictionary learning approaches such as sparse autoencoders. However, superposition
    has mostly been studied in idealized settings where features are sparse and uncorrelated.
    In these settings, superposition is typically understood as introducing interference
    that must be minimized geometrically and filtered out by non-linearities such
    as ReLUs, yielding local structures like regular polytopes. We show that this
    account is incomplete for realistic data by introducing Bag-of-Words Superposition
    (BOWS), a controlled setting to encode binary bag-of-words representations of
    internet text in superposition. Using BOWS, we find that when features are correlated,
    interference can be constructive rather than just noise to be filtered out. This
    is achieved by arranging features according to their co-activation patterns, making
    interference between active features constructive, while still using ReLUs to
    avoid false positives. We show that this kind of arrangement is more prevalent
    in models trained with weight decay and naturally gives rise to semantic clusters
    and cyclical structures which have been observed in real language models yet were
    not explained by the standard picture of superposition. Code for this paper can
    be found at https://github.com/LucasPrietoAl/correlations-feature-geometry.
  published: '2026-03-10'
  pdf_url: http://arxiv.org/pdf/2603.09972
  arxiv_url: http://arxiv.org/abs/2603.09972
  key_findings: A central idea in mechanistic interpretability is that neural networks
    represent more features than they have dimensions, arranging them in superposition
    to form an over-complete basis. This framing has been influential, motivating
    dictionary learning approaches such as sparse autoencoders. However, superposition
    has mostly been studied in idealized settings where features are sparse and uncorrelated.
- id: '2603.09964'
  title: Understanding the Use of a Large Language Model-Powered Guide to Make Virtual
    Reality Accessible for Blind and Low Vision People
  authors: Jazmin Collins, Sharon Y Lin, Tianqi Liu, Andrea Stevenson Won, Shiri Azenkot
  abstract: As social virtual reality (VR) grows more popular, addressing accessibility
    for blind and low vision (BLV) users is increasingly critical. Researchers have
    proposed an AI "sighted guide" to help users navigate VR and answer their questions,
    but it has not been studied with users. To address this gap, we developed a large
    language model (LLM)-powered guide and studied its use with 16 BLV participants
    in virtual environments with confederates posing as other users. We found that
    when alone, participants treated the guide as a tool, but treated it companionably
    around others, giving it nicknames, rationalizing its mistakes with its appearance,
    and encouraging confederate-guide interaction. Our work furthers understanding
    of guides as a versatile method for VR accessibility and presents design recommendations
    for future guides.
  published: '2026-03-10'
  pdf_url: http://arxiv.org/pdf/2603.09964
  arxiv_url: http://arxiv.org/abs/2603.09964
  key_findings: As social virtual reality (VR) grows more popular, addressing accessibility
    for blind and low vision (BLV) users is increasingly critical. Researchers have
    proposed an AI "sighted guide" to help users navigate VR and answer their questions,
    but it has not been studied with users. To address this gap, we developed a large
    language model (LLM)-powered guide and studied its use with 16 BLV participants
    in virtual environments with confederates posing as other users.
- id: '2603.09963'
  title: Emotional Modulation in Swarm Decision Dynamics
  authors: David Freire-Obregón
  abstract: 'Collective decision-making in biological and human groups often emerges
    from simple interaction rules that amplify minor differences into consensus. The
    bee equation, developed initially to describe nest-site selection in honeybee
    swarms, captures this dynamic through recruitment and inhibition processes. Here,
    we extend the bee equation into an agent-based model in which emotional valence
    (positive-negative) and arousal (low-high) act as modulators of interaction rates,
    effectively altering the recruitment and cross-inhibition parameters. Agents display
    simulated facial expressions mapped from their valence-arousal states, allowing
    the study of emotional contagion in consensus formation. Three scenarios are explored:
    (1) the joint effect of valence and arousal on consensus outcomes and speed, (2)
    the role of arousal in breaking ties when valence is matched, and (3) the "snowball
    effect" in which consensus accelerates after surpassing intermediate support thresholds.
    Results show that emotional modulation can bias decision outcomes and alter convergence
    times by shifting effective recruitment and inhibition rates. At the same time,
    intrinsic non-linear amplification can produce decisive wins even in fully symmetric
    emotional conditions. These findings link classical swarm decision theory with
    affective and social modelling, highlighting how both emotional asymmetries and
    structural tipping points shape collective outcomes. The proposed framework offers
    a flexible tool for studying the emotional dimensions of collective choice in
    both natural and artificial systems.'
  published: '2026-03-10'
  pdf_url: http://arxiv.org/pdf/2603.09963
  arxiv_url: http://arxiv.org/abs/2603.09963
  key_findings: Collective decision-making in biological and human groups often emerges
    from simple interaction rules that amplify minor differences into consensus. The
    bee equation, developed initially to describe nest-site selection in honeybee
    swarms, captures this dynamic through recruitment and inhibition processes. Here,
    we extend the bee equation into an agent-based model in which emotional valence
    (positive-negative) and arousal (low-high) act as modulators of interaction rates,
    effectively altering the recruitment and cross-inhibition parameters.
- id: '2603.09961'
  title: 'BEACON: Language-Conditioned Navigation Affordance Prediction under Occlusion'
  authors: Xinyu Gao, Gang Chen, Javier Alonso-Mora
  abstract: 'Language-conditioned local navigation requires a robot to infer a nearby
    traversable target location from its current observation and an open-vocabulary,
    relational instruction. Existing vision-language spatial grounding methods usually
    rely on vision-language models (VLMs) to reason in image space, producing 2D predictions
    tied to visible pixels. As a result, they struggle to infer target locations in
    occluded regions, typically caused by furniture or moving humans. To address this
    issue, we propose BEACON, which predicts an ego-centric Bird''s-Eye View (BEV)
    affordance heatmap over a bounded local region including occluded areas. Given
    an instruction and surround-view RGB-D observations from four directions around
    the robot, BEACON predicts the BEV heatmap by injecting spatial cues into a VLM
    and fusing the VLM''s output with depth-derived BEV features. Using an occlusion-aware
    dataset built in the Habitat simulator, we conduct detailed experimental analysis
    to validate both our BEV space formulation and the design choices of each module.
    Our method improves the accuracy averaged across geodesic thresholds by 22.74
    percentage points over the state-of-the-art image-space baseline on the validation
    subset with occluded target locations. Our project page is: https://xin-yu-gao.github.io/beacon.'
  published: '2026-03-10'
  pdf_url: http://arxiv.org/pdf/2603.09961
  arxiv_url: http://arxiv.org/abs/2603.09961
  key_findings: Language-conditioned local navigation requires a robot to infer a
    nearby traversable target location from its current observation and an open-vocabulary,
    relational instruction. Existing vision-language spatial grounding methods usually
    rely on vision-language models (VLMs) to reason in image space, producing 2D predictions
    tied to visible pixels. As a result, they struggle to infer target locations in
    occluded regions, typically caused by furniture or moving humans.
- id: '2603.09957'
  title: 'Think Before You Lie: How Reasoning Improves Honesty'
  authors: Ann Yuan, Asma Ghandeharioun, Carter Blum, Alicia Machado, Jessica Hoffmann,
    Daphne Ippolito, Martin Wattenberg, Lucas Dixon, Katja Filippova
  abstract: 'While existing evaluations of large language models (LLMs) measure deception
    rates, the underlying conditions that give rise to deceptive behavior are poorly
    understood. We investigate this question using a novel dataset of realistic moral
    trade-offs where honesty incurs variable costs. Contrary to humans, who tend to
    become less honest given time to deliberate (Capraro, 2017; Capraro et al., 2019),
    we find that reasoning consistently increases honesty across scales and for several
    LLM families. This effect is not only a function of the reasoning content, as
    reasoning traces are often poor predictors of final behaviors. Rather, we show
    that the underlying geometry of the representational space itself contributes
    to the effect. Namely, we observe that deceptive regions within this space are
    metastable: deceptive answers are more easily destabilized by input paraphrasing,
    output resampling, and activation noise than honest ones. We interpret the effect
    of reasoning in this vein: generating deliberative tokens as part of moral reasoning
    entails the traversal of a biased representational space, ultimately nudging the
    model toward its more stable, honest defaults.'
  published: '2026-03-10'
  pdf_url: http://arxiv.org/pdf/2603.09957
  arxiv_url: http://arxiv.org/abs/2603.09957
  key_findings: While existing evaluations of large language models (LLMs) measure
    deception rates, the underlying conditions that give rise to deceptive behavior
