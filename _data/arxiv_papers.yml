- id: '2603.13100'
  title: 'Evaluating VLMs'' Spatial Reasoning Over Robot Motion: A Step Towards Robot
    Planning with Motion Preferences'
  authors: Wenxi Wu, Jingjing Zhang, Martim Brandão
  abstract: Understanding user instructions and object spatial relations in surrounding
    environments is crucial for intelligent robot systems to assist humans in various
    tasks. The natural language and spatial reasoning capabilities of Vision-Language
    Models (VLMs) have the potential to enhance the generalization of robot planners
    on new tasks, objects, and motion specifications. While foundation models have
    been applied to task planning, it is still unclear the degree to which they have
    the capability of spatial reasoning required to enforce user preferences or constraints
    on motion, such as desired distances from objects, topological properties, or
    motion style preferences. In this paper, we evaluate the capability of four state-of-the-art
    VLMs at spatial reasoning over robot motion, using four different querying methods.
    Our results show that, with the highest-performing querying method, Qwen2.5-VL
    achieves 71.4% accuracy zero-shot and 75% on a smaller model after fine-tuning,
    and GPT-4o leads to lower performance. We evaluate two types of motion preferences
    (object-proximity and path-style), and we also analyze the trade-off between accuracy
    and computation cost in number of tokens. This work shows some promise in the
    potential of VLM integration with robot motion planning pipelines.
  published: '2026-03-13'
  pdf_url: http://arxiv.org/pdf/2603.13100
  arxiv_url: http://arxiv.org/abs/2603.13100
  key_findings: Understanding user instructions and object spatial relations in surrounding
    environments is crucial for intelligent robot systems to assist humans in various
    tasks. The natural language and spatial reasoning capabilities of Vision-Language
    Models (VLMs) have the potential to enhance the generalization of robot planners
    on new tasks, objects, and motion specifications. While foundation models have
    been applied to task planning, it is still unclear the degree to which they have
    the capability of spatial reasoning required to enforce user preferences or constraints
    on motion, such as desired distances from objects, topological properties, or
    motion style preferences.
- id: '2603.13099'
  title: 'Beyond Final Answers: CRYSTAL Benchmark for Transparent Multimodal Reasoning
    Evaluation'
  authors: Wayner Barrios, SouYoung Jin
  abstract: 'We introduce **CRYSTAL** (*__C__lear __R__easoning via __Y__ielded __S__teps,
    __T__raceability and __L__ogic*), a diagnostic benchmark with 6,372 instances
    that evaluates multimodal reasoning through verifiable intermediate steps. We
    propose two complementary metrics: *Match F1*, which scores step-level precision
    and recall via semantic similarity matching, and *Ordered Match F1*, which further
    penalizes disordered reasoning chains. References are constructed through a Delphi-inspired
    pipeline where four independent MLLMs generate trajectories, aggregated via semantic
    clustering and validated through human quality gates. Evaluation of 20 MLLMs,
    including commercial frontier systems not used during benchmark construction,
    reveals systematic failures invisible to accuracy: universal cherry-picking (precision
    far exceeds recall), non-monotonic scaling trade-offs, and disordered reasoning
    where no competitive model preserves more than 60% of matched steps in correct
    order. Beyond evaluation, we propose the **Causal Process Reward (CPR)**, a multiplicative
    reward that couples answer correctness with step-level alignment, and **CPR-Curriculum**,
    which progressively increases reasoning difficulty during training. CPR-Curriculum
    achieves +32% Match F1 via GRPO where additive reward strategies fail, improving
    reasoning without manual step annotation.'
  published: '2026-03-13'
  pdf_url: http://arxiv.org/pdf/2603.13099
  arxiv_url: http://arxiv.org/abs/2603.13099
  key_findings: 'We introduce **CRYSTAL** (*__C__lear __R__easoning via __Y__ielded
    __S__teps, __T__raceability and __L__ogic*), a diagnostic benchmark with 6,372
    instances that evaluates multimodal reasoning through verifiable intermediate
    steps. We propose two complementary metrics: *Match F1*, which scores step-level
    precision and recall via semantic similarity matching, and *Ordered Match F1*,
    which further penalizes disordered reasoning chains. References are constructed
    through a Delphi-inspired pipeline where four independent MLLMs generate trajectories,
    aggregated via semantic clustering and validated through human quality gates.'
- id: '2603.13083'
  title: Human-in-the-Loop LLM Grading for Handwritten Mathematics Assessments
  authors: Arne Vanhoyweghen, Vincent Holst, Melika Mobini, Lukas Van de Voorde, Tibo
    Vanleke, Bert Verbruggen, Brecht Verbeken, Andres Algaba, Sam Verboven, Marie-Anne
    Guerry, Filip Van Droogenbroeck, Vincent Ginis
  abstract: Providing timely and individualised feedback on handwritten student work
    is highly beneficial for learning but difficult to achieve at scale. This challenge
    has become more pressing as generative AI undermines the reliability of take-home
    assessments, shifting emphasis toward supervised, in-class evaluation. We present
    a scalable, end-to-end workflow for LLM-assisted grading of short, pen-and-paper
    assessments. The workflow spans (1) constructing solution keys, (2) developing
    detailed rubric-style grading keys used to guide the LLM, and (3) a grading procedure
    that combines automated scanning and anonymisation, multi-pass LLM scoring, automated
    consistency checks, and mandatory human verification. We deploy the system in
    two undergraduate mathematics courses using six low-stakes in-class tests. Empirically,
    LLM assistance reduces grading time by approximately 23% while achieving agreement
    comparable to, and in several cases tighter than, fully manual grading. Occasional
    model errors occur but are effectively contained by the hybrid design. Overall,
    our results show that carefully embedded human-in-the-loop LLM grading can substantially
    reduce workload while maintaining fairness and accuracy.
  published: '2026-03-13'
  pdf_url: http://arxiv.org/pdf/2603.13083
  arxiv_url: http://arxiv.org/abs/2603.13083
  key_findings: Providing timely and individualised feedback on handwritten student
    work is highly beneficial for learning but difficult to achieve at scale. This
    challenge has become more pressing as generative AI undermines the reliability
    of take-home assessments, shifting emphasis toward supervised, in-class evaluation.
    We present a scalable, end-to-end workflow for LLM-assisted grading of short,
    pen-and-paper assessments.
- id: '2603.13068'
  title: 'GeoChemAD: Benchmarking Unsupervised Geochemical Anomaly Detection for Mineral
    Exploration'
  authors: Yihao Ding, Yiran Zhang, Chris Gonzalez, Eun-Jung Holden, Wei Liu
  abstract: 'Geochemical anomaly detection plays a critical role in mineral exploration
    as deviations from regional geochemical baselines may indicate mineralization.
    Existing studies suffer from two key limitations: (1) single region scenarios
    which limit model generalizability; (2) proprietary datasets, which makes result
    reproduction unattainable. In this work, we introduce \textbf{GeoChemAD}, an open-source
    benchmark dataset compiled from government-led geological surveys, covering multiple
    regions, sampling sources, and target elements. The dataset comprises eight subsets
    representing diverse spatial scales and sampling conditions. To establish strong
    baselines, we reproduce and benchmark a range of unsupervised anomaly detection
    methods, including statistical models, generative and transformer-based approaches.
    Furthermore, we propose \textbf{GeoChemFormer}, a transformer-based framework
    that leverages self-supervised pretraining to learn target-element-aware geochemical
    representations for spatial samples. Extensive experiments demonstrate that GeoChemFormer
    consistently achieves superior and robust performance across all eight subsets,
    outperforming existing unsupervised methods in both anomaly detection accuracy
    and generalization capability. The proposed dataset and framework provide a foundation
    for reproducible research and future development in this direction.'
  published: '2026-03-13'
  pdf_url: http://arxiv.org/pdf/2603.13068
  arxiv_url: http://arxiv.org/abs/2603.13068
  key_findings: 'Geochemical anomaly detection plays a critical role in mineral exploration
    as deviations from regional geochemical baselines may indicate mineralization.
    Existing studies suffer from two key limitations: (1) single region scenarios
    which limit model generalizability; (2) proprietary datasets, which makes result
    reproduction unattainable. In this work, we introduce \textbf{GeoChemAD}, an open-source
    benchmark dataset compiled from government-led geological surveys, covering multiple
    regions, sampling sources, and target elements.'
