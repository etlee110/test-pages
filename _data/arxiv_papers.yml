- id: '2603.03278'
  title: 'Tether: Autonomous Functional Play with Correspondence-Driven Trajectory
    Warping'
  authors: William Liang, Sam Wang, Hung-Ju Wang, Osbert Bastani, Yecheng Jason Ma,
    Dinesh Jayaraman
  abstract: The ability to conduct and learn from interaction and experience is a
    central challenge in robotics, offering a scalable alternative to labor-intensive
    human demonstrations. However, realizing such "play" requires (1) a policy robust
    to diverse, potentially out-of-distribution environment states, and (2) a procedure
    that continuously produces useful robot experience. To address these challenges,
    we introduce Tether, a method for autonomous functional play involving structured,
    task-directed interactions. First, we design a novel open-loop policy that warps
    actions from a small set of source demonstrations (<=10) by anchoring them to
    semantic keypoint correspondences in the target scene. We show that this design
    is extremely data-efficient and robust even under significant spatial and semantic
    variations. Second, we deploy this policy for autonomous functional play in the
    real world via a continuous cycle of task selection, execution, evaluation, and
    improvement, guided by the visual understanding capabilities of vision-language
    models. This procedure generates diverse, high-quality datasets with minimal human
    intervention. In a household-like multi-object setup, our method is the first
    to perform many hours of autonomous multi-task play in the real world starting
    from only a handful of demonstrations. This produces a stream of data that consistently
    improves the performance of closed-loop imitation policies over time, ultimately
    yielding over 1000 expert-level trajectories and training policies competitive
    with those learned from human-collected demonstrations.
  published: '2026-03-03'
  pdf_url: http://arxiv.org/pdf/2603.03278
  arxiv_url: http://arxiv.org/abs/2603.03278
  key_findings: The ability to conduct and learn from interaction and experience is
    a central challenge in robotics, offering a scalable alternative to labor-intensive
    human demonstrations. However, realizing such "play" requires (1) a policy robust
    to diverse, potentially out-of-distribution environment states, and (2) a procedure
    that continuously produces useful robot experience. To address these challenges,
    we introduce Tether, a method for autonomous functional play involving structured,
    task-directed interactions.
- id: '2603.03258'
  title: 'Inherited Goal Drift: Contextual Pressure Can Undermine Agentic Goals'
  authors: Achyutha Menon, Magnus Saebo, Tyler Crosse, Spencer Gibson, Eyon Jang,
    Diogo Cruz
  abstract: 'The accelerating adoption of language models (LMs) as agents for deployment
    in long-context tasks motivates a thorough understanding of goal drift: agents''
    tendency to deviate from an original objective. While prior-generation language
    model agents have been shown to be susceptible to drift, the extent to which drift
    affects more recent models remains unclear. In this work, we provide an updated
    characterization of the extent and causes of goal drift. We investigate drift
    in state-of-the-art models within a simulated stock-trading environment (Arike
    et al., 2025). These models are largely shown to be robust even when subjected
    to adversarial pressure. We show, however, that this robustness is brittle: across
    multiple settings, the same models often inherit drift when conditioned on prefilled
    trajectories from weaker agents. The extent of conditioning-induced drift varies
    significantly by model family, with only GPT-5.1 maintaining consistent resilience
    among tested models. We find that drift behavior is inconsistent between prompt
    variations and correlates poorly with instruction hierarchy following behavior,
    with strong hierarchy following failing to reliably predict resistance to drift.
    Finally, we run analogous experiments in a new emergency room triage environment
    to show preliminary evidence for the transferability of our results across qualitatively
    different settings. Our findings underscore the continued vulnerability of modern
    LM agents to contextual pressures and the need for refined post-training techniques
    to mitigate this.'
  published: '2026-03-03'
  pdf_url: http://arxiv.org/pdf/2603.03258
  arxiv_url: http://arxiv.org/abs/2603.03258
  key_findings: 'The accelerating adoption of language models (LMs) as agents for
    deployment in long-context tasks motivates a thorough understanding of goal drift:
    agents'' tendency to deviate from an original objective. While prior-generation
    language model agents have been shown to be susceptible to drift, the extent to
    which drift affects more recent models remains unclear. In this work, we provide
    an updated characterization of the extent and causes of goal drift.'
- id: '2603.03252'
  title: 'Valet: A Standardized Testbed of Traditional Imperfect-Information Card
    Games'
  authors: Mark Goadrich, Achille Morenville, Éric Piette
  abstract: AI algorithms for imperfect-information games are typically compared using
    performance metrics on individual games, making it difficult to assess robustness
    across game choices. Card games are a natural domain for imperfect information
    due to hidden hands and stochastic draws. To facilitate comparative research on
    imperfect-information game-playing algorithms and game systems, we introduce Valet,
    a diverse and comprehensive testbed of 21 traditional imperfect-information card
    games. These games span multiple genres, cultures, player counts, deck structures,
    mechanics, winning conditions, and methods of hiding and revealing information.
    To standardize implementations across systems, we encode the rules of each game
    in RECYCLE, a card game description language. We empirically characterize each
    game's branching factor and duration using random simulations, reporting baseline
    score distributions for a Monte Carlo Tree Search player against random opponents
    to demonstrate the suitability of Valet as a benchmarking suite.
  published: '2026-03-03'
  pdf_url: http://arxiv.org/pdf/2603.03252
  arxiv_url: http://arxiv.org/abs/2603.03252
  key_findings: AI algorithms for imperfect-information games are typically compared
    using performance metrics on individual games, making it difficult to assess robustness
    across game choices. Card games are a natural domain for imperfect information
    due to hidden hands and stochastic draws. To facilitate comparative research on
    imperfect-information game-playing algorithms and game systems, we introduce Valet,
    a diverse and comprehensive testbed of 21 traditional imperfect-information card
    games.
- id: '2603.03242'
  title: 'Density-Guided Response Optimization: Community-Grounded Alignment via Implicit
    Acceptance Signals'
  authors: Patrick Gerard, Svitlana Volkova
  abstract: 'Language models deployed in online communities must adapt to norms that
    vary across social, cultural, and domain-specific contexts. Prior alignment approaches
    rely on explicit preference supervision or predefined principles, which are effective
    for well-resourced settings but exclude most online communities -- particularly
    those without institutional backing, annotation infrastructure, or organized around
    sensitive topics -- where preference elicitation is costly, ethically fraught,
    or culturally misaligned. We observe that communities already express preferences
    implicitly through what content they accept, engage with, and allow to persist.
    We show that this acceptance behavior induces measurable geometric structure in
    representation space: accepted responses occupy coherent, high-density regions
    that reflect community-specific norms, while rejected content falls in sparser
    or misaligned areas. We operationalize this structure as an implicit preference
    signal for alignment and introduce density-guided response optimization (DGRO),
    a method that aligns language models to community norms without requiring explicit
    preference labels. Using labeled preference data, we demonstrate that local density
    recovers pairwise community judgments, indicating that geometric structure encodes
    meaningful preference signal. We then apply DGRO in annotation-scarce settings
    across diverse communities spanning platform, topic, and language. DGRO-aligned
    models consistently produce responses preferred by human annotators, domain experts,
    and model-based judges over supervised and prompt-based baselines. We position
    DGRO as a practical alignment alternative for communities where explicit preference
    supervision is unavailable or misaligned with situated practices, and discuss
    the implications and risks of learning from emergent acceptance behavior.'
  published: '2026-03-03'
  pdf_url: http://arxiv.org/pdf/2603.03242
  arxiv_url: http://arxiv.org/abs/2603.03242
  key_findings: Language models deployed in online communities must adapt to norms
    that vary across social, cultural, and domain-specific contexts. Prior alignment
    approaches rely on explicit preference supervision or predefined principles, which
    are effective for well-resourced settings but exclude most online communities
    -- particularly those without institutional backing, annotation infrastructure,
    or organized around sensitive topics -- where preference elicitation is costly,
    ethically fraught, or culturally misaligned. We observe that communities already
    express preferences implicitly through what content they accept, engage with,
    and allow to persist.
- id: '2603.03241'
  title: 'UniG2U-Bench: Do Unified Models Advance Multimodal Understanding?'
  authors: Zimo Wen, Boxiu Li, Wanbo Zhang, Junxiang Lei, Xiaoyu Chen, Yijia Fan,
    Qi Zhang, Yujiang Wang, Lili Qiu, Bo Li, Ziwei Liu, Caihua Shan, Yifan Yang, Yifei
    Shen
  abstract: 'Unified multimodal models have recently demonstrated strong generative
    capabilities, yet whether and when generation improves understanding remains unclear.
    Existing benchmarks lack a systematic exploration of the specific tasks where
    generation facilitates understanding. To this end, we introduce UniG2U-Bench,
    a comprehensive benchmark categorizing generation-to-understanding (G2U) evaluation
    into 7 regimes and 30 subtasks, requiring varying degrees of implicit or explicit
    visual transformations. Extensive evaluation of over 30 models reveals three core
    findings: 1) Unified models generally underperform their base Vision-Language
    Models (VLMs), and Generate-then-Answer (GtA) inference typically degrades performance
    relative to direct inference. 2) Consistent enhancements emerge in spatial intelligence,
    visual illusions, or multi-round reasoning subtasks, where enhanced spatial and
    shape perception, as well as multi-step intermediate image states, prove beneficial.
    3) Tasks with similar reasoning structures and models sharing architectures exhibit
    correlated behaviors, suggesting that generation-understanding coupling induces
    class-consistent inductive biases over tasks, pretraining data, and model architectures.
    These findings highlight the necessity for more diverse training data and novel
    paradigms to fully unlock the potential of unified multimodal modeling.'
  published: '2026-03-03'
  pdf_url: http://arxiv.org/pdf/2603.03241
  arxiv_url: http://arxiv.org/abs/2603.03241
  key_findings: Unified multimodal models have recently demonstrated strong generative
    capabilities, yet whether and when generation improves understanding remains unclear.
    Existing benchmarks lack a systematic exploration of the specific tasks where
    generation facilitates understanding. To this end, we introduce UniG2U-Bench,
    a comprehensive benchmark categorizing generation-to-understanding (G2U) evaluation
    into 7 regimes and 30 subtasks, requiring varying degrees of implicit or explicit
    visual transformations.
- id: '2603.03233'
  title: AI-for-Science Low-code Platform with Bayesian Adversarial Multi-Agent Framework
  authors: Zihang Zeng, Jiaquan Zhang, Pengze Li, Yuan Qi, Xi Chen
  abstract: 'Large Language Models (LLMs) demonstrate potentials for automating scientific
    code generation but face challenges in reliability, error propagation in multi-agent
    workflows, and evaluation in domains with ill-defined success metrics. We present
    a Bayesian adversarial multi-agent framework specifically designed for AI for
    Science (AI4S) tasks in the form of a Low-code Platform (LCP). Three LLM-based
    agents are coordinated under the Bayesian framework: a Task Manager that structures
    user inputs into actionable plans and adaptive test cases, a Code Generator that
    produces candidate solutions, and an Evaluator providing comprehensive feedback.
    The framework employs an adversarial loop where the Task Manager iteratively refines
    test cases to challenge the Code Generator, while prompt distributions are dynamically
    updated using Bayesian principles by integrating code quality metrics: functional
    correctness, structural alignment, and static analysis. This co-optimization of
    tests and code reduces dependence on LLM reliability and addresses evaluation
    uncertainty inherent to scientific tasks. LCP also streamlines human-AI collaboration
    by translating non-expert prompts into domain-specific requirements, bypassing
    the need for manual prompt engineering by practitioners without coding backgrounds.
    Benchmark evaluations demonstrate LCP''s effectiveness in generating robust code
    while minimizing error propagation. The proposed platform is also tested on an
    Earth Science cross-disciplinary task and demonstrates strong reliability, outperforming
    competing models.'
  published: '2026-03-03'
  pdf_url: http://arxiv.org/pdf/2603.03233
  arxiv_url: http://arxiv.org/abs/2603.03233
  key_findings: 'Large Language Models (LLMs) demonstrate potentials for automating
    scientific code generation but face challenges in reliability, error propagation
    in multi-agent workflows, and evaluation in domains with ill-defined success metrics.
    We present a Bayesian adversarial multi-agent framework specifically designed
    for AI for Science (AI4S) tasks in the form of a Low-code Platform (LCP). Three
    LLM-based agents are coordinated under the Bayesian framework: a Task Manager
    that structures user inputs into actionable plans and adaptive test cases, a Code
    Generator that produces candidate solutions, and an Evaluator providing comprehensive
    feedback.'
- id: '2603.03230'
  title: 'SynthCharge: An Electric Vehicle Routing Instance Generator with Feasibility
    Screening to Enable Learning-Based Optimization and Benchmarking'
  authors: Mertcan Daysalilar, Fuat Uyguroglu, Gabriel Nicolosi, Adam Meyers
  abstract: The electric vehicle routing problem with time windows (EVRPTW) extends
    the classical VRPTW by introducing battery capacity constraints and charging station
    decisions. Existing benchmark datasets are often static and lack verifiable feasibility,
    which restricts reproducible evaluation of learning-based routing models. We introduce
    SynthCharge, a parametric generator that produces diverse, feasibility-screened
    EVRPTW instances across varying spatiotemporal configurations and scalable customer
    counts. While SynthCharge can currently generate large-scale instances of up to
    500 customers, we focus our experiments on sizes ranging from 5 to 100 customers.
    Unlike static benchmark suites, SynthCharge integrates instance geometry with
    adaptive energy capacity scaling and range-aware charging station placement. To
    guarantee structural validity, the generator systematically filters out unsolvable
    instances through a fast feasibility screening process. Ultimately, SynthCharge
    provides the dynamic benchmarking infrastructure needed to systematically evaluate
    the robustness of emerging neural routing and data-driven approaches.
  published: '2026-03-03'
  pdf_url: http://arxiv.org/pdf/2603.03230
  arxiv_url: http://arxiv.org/abs/2603.03230
  key_findings: The electric vehicle routing problem with time windows (EVRPTW) extends
    the classical VRPTW by introducing battery capacity constraints and charging station
    decisions. Existing benchmark datasets are often static and lack verifiable feasibility,
    which restricts reproducible evaluation of learning-based routing models. We introduce
    SynthCharge, a parametric generator that produces diverse, feasibility-screened
    EVRPTW instances across varying spatiotemporal configurations and scalable customer
    counts.
- id: '2603.03224'
  title: Stabilized Adaptive Loss and Residual-Based Collocation for Physics-Informed
    Neural Networks
  authors: Divyavardhan Singh, Shubham Kamble, Dimple Sonone, Kishor Upla
  abstract: Physics-Informed Neural Networks (PINNs) have been recognized as a mesh-free
    alternative to solve partial differential equations where physics information
    is incorporated. However, in dealing with problems characterized by high stiffness
    or shock-dominated dynamics, traditional PINNs have been found to have limitations,
    including unbalanced training and inaccuracy in solution, even with small physics
    residuals. In this research, we seek to address these limitations using the viscous
    Burgers' equation with low viscosity and the Allen-Cahn equation as test problems.
    In addressing unbalanced training, we have developed a new adaptive loss balancing
    scheme using smoothed gradient norms to ensure satisfaction of initial and boundary
    conditions. Further, to address inaccuracy in the solution, we have developed
    an adaptive residual-based collocation scheme to improve the accuracy of solutions
    in the regions with high physics residuals. The proposed new approach significantly
    improves solution accuracy with consistent satisfaction of physics residuals.
    For instance, in the case of Burgers' equation, the relative L2 error is reduced
    by about 44 percent compared to traditional PINNs, while for the Allen-Cahn equation,
    the relative L2 error is reduced by approximately 70 percent. Additionally, we
    show the trustworthy solution comparison of the proposed method using a robust
    finite difference solver.
  published: '2026-03-03'
  pdf_url: http://arxiv.org/pdf/2603.03224
  arxiv_url: http://arxiv.org/abs/2603.03224
  key_findings: Physics-Informed Neural Networks (PINNs) have been recognized as a
    mesh-free alternative to solve partial differential equations where physics information
    is incorporated. However, in dealing with problems characterized by high stiffness
    or shock-dominated dynamics, traditional PINNs have been found to have limitations,
    including unbalanced training and inaccuracy in solution, even with small physics
    residuals. In this research, we seek to address these limitations using the viscous
    Burgers' equation with low viscosity and the Allen-Cahn equation as test problems.
- id: '2603.03212'
  title: 'NeuroSkill(tm): Proactive Real-Time Agentic System Capable of Modeling Human
    State of Mind'
  authors: Nataliya Kosmyna, Eugene Hauptmann
  abstract: Real-time proactive agentic system, capable of modeling Human State of
    Mind, using foundation EXG model and text embeddings model, running fully offline
    on the edge. Unlike all previously known systems, the NeuroSkill(tm) system leverages
    SKILL.md description of Human's State of Mind via API and CLI provided by the
    system, directly from the Brain-Computer Interface (BCI) devices, which records
    Human biophysical and brain signals. Our custom harness - NeuroLoop(tm) - utilizes
    all of the above to run agentic flow that manages to engage with the Human on
    multiple cognitive and affective levels of their State of Mind (e.g., empathy),
    by providing actionable tool calls and protocol execution with explicit or implicit
    requests from the Human. GPLv3 open-source software with ethically aligned AI100
    licensing for the skill markdown.
  published: '2026-03-03'
  pdf_url: http://arxiv.org/pdf/2603.03212
  arxiv_url: http://arxiv.org/abs/2603.03212
  key_findings: Real-time proactive agentic system, capable of modeling Human State
    of Mind, using foundation EXG model and text embeddings model, running fully offline
    on the edge. Unlike all previously known systems, the NeuroSkill(tm) system leverages
    SKILL. md description of Human's State of Mind via API and CLI provided by the
    system, directly from the Brain-Computer Interface (BCI) devices, which records
    Human biophysical and brain signals.
