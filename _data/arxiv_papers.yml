- id: '2603.02203'
  title: Tool Verification for Test-Time Reinforcement Learning
  authors: Ruotong Liao, Nikolai Röhrich, Xiaohan Wang, Yuhui Zhang, Yasaman Samadzadeh,
    Volker Tresp, Serena Yeung-Levy
  abstract: Test-time reinforcement learning (TTRL) has emerged as a promising paradigm
    for self-evolving large reasoning models (LRMs), enabling online adaptation on
    unlabeled test inputs via self-induced rewards through majority voting. However,
    a spurious yet high-frequency unverified consensus can become a biased and reinforced
    reward signal, leading to incorrect mode collapse. We address this failure mode
    with T^3RL (Tool-Verification for Test-Time Reinforcement Learning), which introduces
    test-time tool verification into reward estimation. Concretely, a verifier uses
    an external tool as evidence (e.g., from code execution) to upweight verified
    rollouts in a verification-aware voting, producing more reliable pseudo-labels
    for training. Across various math difficulties (MATH-500, AMC, and AIME 2024)
    and diverse backbone types, T^3RL significantly improves over TTRL, with larger
    gains on harder problems. More broadly, T^3RL can be viewed as verified online
    data synthesis, highlighting test-time tool verification as a key mechanism for
    stabilizing self-evolution.
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.02203
  arxiv_url: http://arxiv.org/abs/2603.02203
  key_findings: Test-time reinforcement learning (TTRL) has emerged as a promising
    paradigm for self-evolving large reasoning models (LRMs), enabling online adaptation
    on unlabeled test inputs via self-induced rewards through majority voting. However,
    a spurious yet high-frequency unverified consensus can become a biased and reinforced
    reward signal, leading to incorrect mode collapse. We address this failure mode
    with T^3RL (Tool-Verification for Test-Time Reinforcement Learning), which introduces
    test-time tool verification into reward estimation.
- id: '2603.02200'
  title: Adaptive Confidence Regularization for Multimodal Failure Detection
  authors: Moru Liu, Hao Dong, Olga Fink, Mario Trapp
  abstract: 'The deployment of multimodal models in high-stakes domains, such as self-driving
    vehicles and medical diagnostics, demands not only strong predictive performance
    but also reliable mechanisms for detecting failures. In this work, we address
    the largely unexplored problem of failure detection in multimodal contexts. We
    propose Adaptive Confidence Regularization (ACR), a novel framework specifically
    designed to detect multimodal failures. Our approach is driven by a key observation:
    in most failure cases, the confidence of the multimodal prediction is significantly
    lower than that of at least one unimodal branch, a phenomenon we term confidence
    degradation. To mitigate this, we introduce an Adaptive Confidence Loss that penalizes
    such degradations during training. In addition, we propose Multimodal Feature
    Swapping, a novel outlier synthesis technique that generates challenging, failure-aware
    training examples. By training with these synthetic failures, ACR learns to more
    effectively recognize and reject uncertain predictions, thereby improving overall
    reliability. Extensive experiments across four datasets, three modalities, and
    multiple evaluation settings demonstrate that ACR achieves consistent and robust
    gains. The source code will be available at https://github.com/mona4399/ACR.'
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.02200
  arxiv_url: http://arxiv.org/abs/2603.02200
  key_findings: The deployment of multimodal models in high-stakes domains, such as
    self-driving vehicles and medical diagnostics, demands not only strong predictive
    performance but also reliable mechanisms for detecting failures. In this work,
    we address the largely unexplored problem of failure detection in multimodal contexts.
    We propose Adaptive Confidence Regularization (ACR), a novel framework specifically
    designed to detect multimodal failures.
- id: '2603.02196'
  title: Conformal Policy Control
  authors: Drew Prinster, Clara Fannjiang, Ji Won Park, Kyunghyun Cho, Anqi Liu, Suchi
    Saria, Samuel Stanton
  abstract: An agent must try new behaviors to explore and improve. In high-stakes
    environments, an agent that violates safety constraints may cause harm and must
    be taken offline, curtailing any future interaction. Imitating old behavior is
    safe, but excessive conservatism discourages exploration. How much behavior change
    is too much? We show how to use any safe reference policy as a probabilistic regulator
    for any optimized but untested policy. Conformal calibration on data from the
    safe policy determines how aggressively the new policy can act, while provably
    enforcing the user's declared risk tolerance. Unlike conservative optimization
    methods, we do not assume the user has identified the correct model class nor
    tuned any hyperparameters. Unlike previous conformal methods, our theory provides
    finite-sample guarantees even for non-monotonic bounded constraint functions.
    Our experiments on applications ranging from natural language question answering
    to biomolecular engineering show that safe exploration is not only possible from
    the first moment of deployment, but can also improve performance.
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.02196
  arxiv_url: http://arxiv.org/abs/2603.02196
  key_findings: An agent must try new behaviors to explore and improve. In high-stakes
    environments, an agent that violates safety constraints may cause harm and must
    be taken offline, curtailing any future interaction. Imitating old behavior is
    safe, but excessive conservatism discourages exploration.
- id: '2603.02193'
  title: Symbol-Equivariant Recurrent Reasoning Models
  authors: Richard Freinschlag, Timo Bertram, Erich Kobler, Andreas Mayr, Günter Klambauer
  abstract: Reasoning problems such as Sudoku and ARC-AGI remain challenging for neural
    networks. The structured problem solving architecture family of Recurrent Reasoning
    Models (RRMs), including Hierarchical Reasoning Model (HRM) and Tiny Recursive
    Model (TRM), offer a compact alternative to large language models, but currently
    handle symbol symmetries only implicitly via costly data augmentation. We introduce
    Symbol-Equivariant Recurrent Reasoning Models (SE-RRMs), which enforce permutation
    equivariance at the architectural level through symbol-equivariant layers, guaranteeing
    identical solutions under symbol or color permutations. SE-RRMs outperform prior
    RRMs on 9x9 Sudoku and generalize from just training on 9x9 to smaller 4x4 and
    larger 16x16 and 25x25 instances, to which existing RRMs cannot extrapolate. On
    ARC-AGI-1 and ARC-AGI-2, SE-RRMs achieve competitive performance with substantially
    less data augmentation and only 2 million parameters, demonstrating that explicitly
    encoding symmetry improves the robustness and scalability of neural reasoning.
    Code is available at https://github.com/ml-jku/SE-RRM.
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.02193
  arxiv_url: http://arxiv.org/abs/2603.02193
  key_findings: Reasoning problems such as Sudoku and ARC-AGI remain challenging for
    neural networks. The structured problem solving architecture family of Recurrent
    Reasoning Models (RRMs), including Hierarchical Reasoning Model (HRM) and Tiny
    Recursive Model (TRM), offer a compact alternative to large language models, but
    currently handle symbol symmetries only implicitly via costly data augmentation.
    We introduce Symbol-Equivariant Recurrent Reasoning Models (SE-RRMs), which enforce
    permutation equivariance at the architectural level through symbol-equivariant
    layers, guaranteeing identical solutions under symbol or color permutations.
- id: '2603.02190'
  title: 'Sketch2Colab: Sketch-Conditioned Multi-Human Animation via Controllable
    Flow Distillation'
  authors: Divyanshu Daiya, Aniket Bera
  abstract: We present Sketch2Colab, which turns storyboard-style 2D sketches into
    coherent, object-aware 3D multi-human motion with fine-grained control over agents,
    joints, timing, and contacts. Conventional diffusion-based motion generators have
    advanced realism; however, achieving precise adherence to rich interaction constraints
    typically demands extensive training and/or costly posterior guidance, and performance
    can degrade under strong multi-entity conditioning. Sketch2Colab instead first
    learns a sketch-driven diffusion prior and then distills it into an efficient
    rectified-flow student operating in latent space for fast, stable sampling. Differentiable
    energies over keyframes, trajectories, and physics-based constraints directly
    shape the student's transport field, steering samples toward motions that faithfully
    satisfy the storyboard while remaining physically plausible. To capture coordinated
    interaction, we augment the continuous flow with a continuous-time Markov chain
    (CTMC) planner that schedules discrete events such as touches, grasps, and handoffs,
    modulating the dynamics to produce crisp, well-phased human-object-human collaborations.
    Experiments on CORE4D and InterHuman show that Sketch2Colab achieves state-of-the-art
    constraint adherence and perceptual quality while offering significantly faster
    inference than diffusion-only baselines.
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.02190
  arxiv_url: http://arxiv.org/abs/2603.02190
  key_findings: We present Sketch2Colab, which turns storyboard-style 2D sketches
    into coherent, object-aware 3D multi-human motion with fine-grained control over
    agents, joints, timing, and contacts. Conventional diffusion-based motion generators
    have advanced realism; however, achieving precise adherence to rich interaction
    constraints typically demands extensive training and/or costly posterior guidance,
    and performance can degrade under strong multi-entity conditioning. Sketch2Colab
    instead first learns a sketch-driven diffusion prior and then distills it into
    an efficient rectified-flow student operating in latent space for fast, stable
    sampling.
- id: '2603.02184'
  title: 'MAC: A Conversion Rate Prediction Benchmark Featuring Labels Under Multiple
    Attribution Mechanisms'
  authors: Jinqi Wu, Sishuo Chen, Zhangming Chan, Yong Bai, Lei Zhang, Sheng Chen,
    Chenghuan Hou, Xiang-Rong Sheng, Han Zhu, Jian Xu, Bo Zheng, Chaoyou Fu
  abstract: 'Multi-attribution learning (MAL), which enhances model performance by
    learning from conversion labels yielded by multiple attribution mechanisms, has
    emerged as a promising learning paradigm for conversion rate (CVR) prediction.
    However, the conversion labels in public CVR datasets are generated by a single
    attribution mechanism, hindering the development of MAL approaches. To address
    this data gap, we establish the Multi-Attribution Benchmark (MAC), the first public
    CVR dataset featuring labels from multiple attribution mechanisms. Besides, to
    promote reproducible research on MAL, we develop PyMAL, an open-source library
    covering a wide array of baseline methods. We conduct comprehensive experimental
    analyses on MAC and reveal three key insights: (1) MAL brings consistent performance
    gains across different attribution settings, especially for users featuring long
    conversion paths. (2) The performance growth scales up with objective complexity
    in most settings; however, when predicting first-click conversion targets, simply
    adding auxiliary objectives is counterproductive, underscoring the necessity of
    careful selection of auxiliary objectives. (3) Two architectural design principles
    are paramount: first, to fully learn the multi-attribution knowledge, and second,
    to fully leverage this knowledge to serve the main task. Motivated by these findings,
    we propose Mixture of Asymmetric Experts (MoAE), an effective MAL approach incorporating
    multi-attribution knowledge learning and main task-centric knowledge utilization.
    Experiments on MAC show that MoAE substantially surpasses the existing state-of-the-art
    MAL method. We believe that our benchmark and insights will foster future research
    in the MAL field. Our MAC benchmark and the PyMAL algorithm library are publicly
    available at https://github.com/alimama-tech/PyMAL.'
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.02184
  arxiv_url: http://arxiv.org/abs/2603.02184
  key_findings: Multi-attribution learning (MAL), which enhances model performance
    by learning from conversion labels yielded by multiple attribution mechanisms,
    has emerged as a promising learning paradigm for conversion rate (CVR) prediction.
    However, the conversion labels in public CVR datasets are generated by a single
    attribution mechanism, hindering the development of MAL approaches. To address
    this data gap, we establish the Multi-Attribution Benchmark (MAC), the first public
    CVR dataset featuring labels from multiple attribution mechanisms.
- id: '2603.02181'
  title: Leveraging Model Soups to Classify Intangible Cultural Heritage Images from
    the Mekong Delta
  authors: Quoc-Khang Tran, Minh-Thien Nguyen, Nguyen-Khang Pham
  abstract: The classification of Intangible Cultural Heritage (ICH) images in the
    Mekong Delta poses unique challenges due to limited annotated data, high visual
    similarity among classes, and domain heterogeneity. In such low-resource settings,
    conventional deep learning models often suffer from high variance or overfit to
    spurious correlations, leading to poor generalization. To address these limitations,
    we propose a robust framework that integrates the hybrid CoAtNet architecture
    with model soups, a lightweight weight-space ensembling technique that averages
    checkpoints from a single training trajectory without increasing inference cost.
    CoAtNet captures both local and global patterns through stage-wise fusion of convolution
    and self-attention. We apply two ensembling strategies - greedy and uniform soup
    - to selectively combine diverse checkpoints into a final model. Beyond performance
    improvements, we analyze the ensembling effect through the lens of bias-variance
    decomposition. Our findings show that model soups reduces variance by stabilizing
    predictions across diverse model snapshots, while introducing minimal additional
    bias. Furthermore, using cross-entropy-based distance metrics and Multidimensional
    Scaling (MDS), we show that model soups selects geometrically diverse checkpoints,
    unlike Soft Voting, which blends redundant models centered in output space. Evaluated
    on the ICH-17 dataset (7,406 images across 17 classes), our approach achieves
    state-of-the-art results with 72.36% top-1 accuracy and 69.28% macro F1-score,
    outperforming strong baselines including ResNet-50, DenseNet-121, and ViT. These
    results underscore that diversity-aware checkpoint averaging provides a principled
    and efficient way to reduce variance and enhance generalization in culturally
    rich, data-scarce classification tasks.
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.02181
  arxiv_url: http://arxiv.org/abs/2603.02181
  key_findings: The classification of Intangible Cultural Heritage (ICH) images in
    the Mekong Delta poses unique challenges due to limited annotated data, high visual
    similarity among classes, and domain heterogeneity. In such low-resource settings,
    conventional deep learning models often suffer from high variance or overfit to
    spurious correlations, leading to poor generalization. To address these limitations,
    we propose a robust framework that integrates the hybrid CoAtNet architecture
    with model soups, a lightweight weight-space ensembling technique that averages
    checkpoints from a single training trajectory without increasing inference cost.
- id: '2603.02178'
  title: Reservoir Subspace Injection for Online ICA under Top-n Whitening
  authors: Wenjun Xiao, Yuda Bi, Vince D Calhoun
  abstract: 'Reservoir expansion can improve online independent component analysis
    (ICA) under nonlinear mixing, yet top-$n$ whitening may discard injected features.
    We formalize this bottleneck as \emph{reservoir subspace injection} (RSI): injected
    features help only if they enter the retained eigenspace without displacing passthrough
    directions. RSI diagnostics (IER, SSO, $ρ_x$) identify a failure mode in our top-$n$
    setting: stronger injection increases IER but crowds out passthrough energy ($ρ_x:
    1.00\!\rightarrow\!0.77$), degrading SI-SDR by up to $2.2$\,dB. A guarded RSI
    controller preserves passthrough retention and recovers mean performance to within
    $0.1$\,dB of baseline $1/N$ scaling. With passthrough preserved, RE-OICA improves
    over vanilla online ICA by $+1.7$\,dB under nonlinear mixing and achieves positive
    SI-SDR$_{\mathrm{sc}}$ on the tested super-Gaussian benchmark ($+0.6$\,dB).'
  published: '2026-03-02'
  pdf_url: http://arxiv.org/pdf/2603.02178
  arxiv_url: http://arxiv.org/abs/2603.02178
