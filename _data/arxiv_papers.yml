papers:
- id: '2602.22207'
  title: 'Recovered in Translation: Efficient Pipeline for Automated Translation of
    Benchmarks and Datasets'
  authors: Hanna Yukhymenko, Anton Alexandrov, Martin Vechev
  abstract: The reliability of multilingual Large Language Model (LLM) evaluation
    is currently compromised by the inconsistent quality of translated benchmarks.
    Existing resources often suffer from semantic drift and context loss, which can
    lead to misleading performance metrics. In this work, we present a fully automated
    framework designed to address these challenges by enabling scalable, high-quality
    translation of datasets and benchmarks. We demonstrate that adapting test-time
    compute scaling strategies, specifically Universal Self-Improvement (USI) and
    our proposed multi-round ranking method, T-RANK, allows for significantly higher
    quality outputs compared to traditional pipelines. Our framework ensures that
    benchmarks preserve their original task structure and linguistic nuances during
    localization. We apply this approach to translate popular benchmarks and datasets
    into eight Eastern and Southern European languages (Ukrainian, Bulgarian, Slovak,
    Romanian, Lithuanian, Estonian, Turkish, Greek). Evaluations using both reference-based
    metrics and LLM-as-a-judge show that our translations surpass existing resources,
    resulting in more accurate downstream model assessment. We release both the framework
    and the improved benchmarks to facilitate robust and reproducible multilingual
    AI development.
  published: '2026-02-25'
  pdf_url: http://arxiv.org/pdf/2602.22207
  arxiv_url: http://arxiv.org/abs/2602.22207
  key_findings: The reliability of multilingual Large Language Model (LLM) evaluation
    is currently compromised by the inconsistent quality of translated benchmarks.
    Existing resources often suffer from semantic drift and context loss, which can
    lead to misleading performance metrics. In this work, we present a fully automated
    framework designed to address these challenges by enabling scalable, high-quality
    translation of datasets and benchmarks.
- id: '2602.22197'
  title: Off-The-Shelf Image-to-Image Models Are All You Need To Defeat Image Protection
    Schemes
  authors: Xavier Pleimling, Sifat Muhammad Abdullah, Gunjan Balde, Peng Gao, Mainack
    Mondal, Murtuza Jadliwala, Bimal Viswanath
  abstract: 'Advances in Generative AI (GenAI) have led to the development of various
    protection strategies to prevent the unauthorized use of images. These methods
    rely on adding imperceptible protective perturbations to images to thwart misuse
    such as style mimicry or deepfake manipulations. Although previous attacks on
    these protections required specialized, purpose-built methods, we demonstrate
    that this is no longer necessary. We show that off-the-shelf image-to-image GenAI
    models can be repurposed as generic ``denoisers" using a simple text prompt, effectively
    removing a wide range of protective perturbations. Across 8 case studies spanning
    6 diverse protection schemes, our general-purpose attack not only circumvents
    these defenses but also outperforms existing specialized attacks while preserving
    the image''s utility for the adversary. Our findings reveal a critical and widespread
    vulnerability in the current landscape of image protection, indicating that many
    schemes provide a false sense of security. We stress the urgent need to develop
    robust defenses and establish that any future protection mechanism must be benchmarked
    against attacks from off-the-shelf GenAI models. Code is available in this repository:
    https://github.com/mlsecviswanath/img2imgdenoiser'
  published: '2026-02-25'
  pdf_url: http://arxiv.org/pdf/2602.22197
  arxiv_url: http://arxiv.org/abs/2602.22197
  key_findings: Advances in Generative AI (GenAI) have led to the development of various
    protection strategies to prevent the unauthorized use of images. These methods
    rely on adding imperceptible protective perturbations to images to thwart misuse
    such as style mimicry or deepfake manipulations. Although previous attacks on
    these protections required specialized, purpose-built methods, we demonstrate
    that this is no longer necessary.
- id: '2602.22190'
  title: 'GUI-Libra: Training Native GUI Agents to Reason and Act with Action-aware
    Supervision and Partially Verifiable RL'
  authors: Rui Yang, Qianhui Wu, Zhaoyang Wang, Hanyang Chen, Ke Yang, Hao Cheng,
    Huaxiu Yao, Baoling Peng, Huan Zhang, Jianfeng Gao, Tong Zhang
  abstract: 'Open-source native GUI agents still lag behind closed-source systems
    on long-horizon navigation tasks. This gap stems from two limitations: a shortage
    of high-quality, action-aligned reasoning data, and the direct adoption of generic
    post-training pipelines that overlook the unique challenges of GUI agents. We
    identify two fundamental issues in these pipelines: (i) standard SFT with CoT
    reasoning often hurts grounding, and (ii) step-wise RLVR-tyle training faces partial
    verifiability, where multiple actions can be correct but only a single demonstrated
    action is used for verification. This makes offline step-wise metrics weak predictors
    of online task success. In this work, we present GUI-Libra, a tailored training
    recipe that addresses these challenges. First, to mitigate the scarcity of action-aligned
    reasoning data, we introduce a data construction and filtering pipeline and release
    a curated 81K GUI reasoning dataset. Second, to reconcile reasoning with grounding,
    we propose action-aware SFT that mixes reasoning-then-action and direct-action
    data and reweights tokens to emphasize action and grounding. Third, to stabilize
    RL under partial verifiability, we identify the overlooked importance of KL regularization
    in RLVR and show that a KL trust region is critical for improving offline-to-online
    predictability; we further introduce success-adaptive scaling to downweight unreliable
    negative gradients. Across diverse web and mobile benchmarks, GUI-Libra consistently
    improves both step-wise accuracy and end-to-end task completion. Our results suggest
    that carefully designed post-training and data curation can unlock significantly
    stronger task-solving capabilities without costly online data collection. We release
    our dataset, code, and models to facilitate further research on data-efficient
    post-training for reasoning-capable GUI agents.'
  published: '2026-02-25'
  pdf_url: http://arxiv.org/pdf/2602.22190
  arxiv_url: http://arxiv.org/abs/2602.22190
  key_findings: 'Open-source native GUI agents still lag behind closed-source systems
    on long-horizon navigation tasks. This gap stems from two limitations: a shortage
    of high-quality, action-aligned reasoning data, and the direct adoption of generic
    post-training pipelines that overlook the unique challenges of GUI agents. We
    identify two fundamental issues in these pipelines: (i) standard SFT with CoT
    reasoning often hurts grounding, and (ii) step-wise RLVR-tyle training faces partial
    verifiability, where multiple actions can be correct but only a single demonstrated
    action is used for verification.'
- id: '2602.22188'
  title: 'Surrogate models for Rock-Fluid Interaction: A Grid-Size-Invariant Approach'
  authors: Nathalie C. Pinheiro, Donghu Guo, Hannah P. Menke, Aniket C. Joshi, Claire
    E. Heaney, Ahmed H. ElSheikh, Christopher C. Pain
  abstract: Modelling rock-fluid interaction requires solving a set of partial differential
    equations (PDEs) to predict the flow behaviour and the reactions of the fluid
    with the rock on the interfaces. Conventional high-fidelity numerical models require
    a high resolution to obtain reliable results, resulting in huge computational
    expense. This restricts the applicability of these models for multi-query problems,
    such as uncertainty quantification and optimisation, which require running numerous
    scenarios. As a cheaper alternative to high-fidelity models, this work develops
    eight surrogate models for predicting the fluid flow in porous media. Four of
    these are reduced-order models (ROM) based on one neural network for compression
    and another for prediction. The other four are single neural networks with the
    property of grid-size invariance; a term which we use to refer to image-to-image
    models that are capable of inferring on computational domains that are larger
    than those used during training. In addition to the novel grid-size-invariant
    framework for surrogate models, we compare the predictive performance of UNet
    and UNet++ architectures, and demonstrate that UNet++ outperforms UNet for surrogate
    models. Furthermore, we show that the grid-size-invariant approach is a reliable
    way to reduce memory consumption during training, resulting in good correlation
    between predicted and ground-truth values and outperforming the ROMs analysed.
    The application analysed is particularly challenging because fluid-induced rock
    dissolution results in a non-static solid field and, consequently, it cannot be
    used to help in adjustments of the future prediction.
  published: '2026-02-25'
  pdf_url: http://arxiv.org/pdf/2602.22188
  arxiv_url: http://arxiv.org/abs/2602.22188
  key_findings: Modelling rock-fluid interaction requires solving a set of partial
    differential equations (PDEs) to predict the flow behaviour and the reactions
    of the fluid with the rock on the interfaces. Conventional high-fidelity numerical
    models require a high resolution to obtain reliable results, resulting in huge
    computational expense. This restricts the applicability of these models for multi-query
    problems, such as uncertainty quantification and optimisation, which require running
    numerous scenarios.
- id: '2602.22149'
  title: Enhancing Framingham Cardiovascular Risk Score Transparency through Logic-Based
    XAI
  authors: Emannuel L. de A. Bezerra, Luiz H. T. Viana, Vinícius P. Chagas, Diogo
    E. Rolim, Thiago Alves Rocha, Carlos H. L. Cavalcante
  abstract: Cardiovascular disease (CVD) remains one of the leading global health
    challenges, accounting for more than 19 million deaths worldwide. To address this,
    several tools that aim to predict CVD risk and support clinical decision making
    have been developed. In particular, the Framingham Risk Score (FRS) is one of
    the most widely used and recommended worldwide. However, it does not explain why
    a patient was assigned to a particular risk category nor how it can be reduced.
    Due to this lack of transparency, we present a logical explainer for the FRS.
    Based on first-order logic and explainable artificial intelligence (XAI) fundaments,
    the explainer is capable of identifying a minimal set of patient attributes that
    are sufficient to explain a given risk classification. Our explainer also produces
    actionable scenarios that illustrate which modifiable variables would reduce a
    patient's risk category. We evaluated all possible input combinations of the FRS
    (over 22,000 samples) and tested them with our explainer, successfully identifying
    important risk factors and suggesting focused interventions for each case. The
    results may improve clinician trust and facilitate a wider implementation of CVD
    risk assessment by converting opaque scores into transparent and prescriptive
    insights, particularly in areas with restricted access to specialists.
  published: '2026-02-25'
  pdf_url: http://arxiv.org/pdf/2602.22149
  arxiv_url: http://arxiv.org/abs/2602.22149
  key_findings: Cardiovascular disease (CVD) remains one of the leading global health
    challenges, accounting for more than 19 million deaths worldwide. To address this,
    several tools that aim to predict CVD risk and support clinical decision making
    have been developed. In particular, the Framingham Risk Score (FRS) is one of
    the most widely used and recommended worldwide.
- id: '2602.22146'
  title: Provable Last-Iterate Convergence for Multi-Objective Safe LLM Alignment
    via Optimistic Primal-Dual
  authors: Yining Li, Peizhong Ju, Ness Shroff
  abstract: Reinforcement Learning from Human Feedback (RLHF) plays a significant
    role in aligning Large Language Models (LLMs) with human preferences. While RLHF
    with expected reward constraints can be formulated as a primal-dual optimization
    problem, standard primal-dual methods only guarantee convergence with a distributional
    policy where the saddle-point problem is in convex-concave form. Moreover, standard
    primal-dual methods may exhibit instability or divergence in the last iterate
    under policy parameterization in practical applications. In this work, we propose
    a universal primal-dual framework for safe RLHF that unifies a broad class of
    existing alignment algorithms, including safe-RLHF, one-shot, and multi-shot based
    methods. Building on this framework, we introduce an optimistic primal-dual (OPD)
    algorithm that incorporates predictive updates for both primal and dual variables
    to stabilize saddle-point dynamics. We establish last-iterate convergence guarantees
    for the proposed method, covering both exact policy optimization in the distributional
    space and convergence to a neighborhood of the optimal solution whose gap is related
    to approximation error and bias under parameterized policies. Our analysis reveals
    that optimism plays a crucial role in mitigating oscillations inherent to constrained
    alignment objectives, thereby closing a key theoretical gap between constrained
    RL and practical RLHF.
  published: '2026-02-25'
  pdf_url: http://arxiv.org/pdf/2602.22146
  arxiv_url: http://arxiv.org/abs/2602.22146
  key_findings: Reinforcement Learning from Human Feedback (RLHF) plays a significant
    role in aligning Large Language Models (LLMs) with human preferences. While RLHF
    with expected reward constraints can be formulated as a primal-dual optimization
    problem, standard primal-dual methods only guarantee convergence with a distributional
    policy where the saddle-point problem is in convex-concave form. Moreover, standard
    primal-dual methods may exhibit instability or divergence in the last iterate
    under policy parameterization in practical applications.
- id: '2602.22145'
  title: When AI Writes, Whose Voice Remains? Quantifying Cultural Marker Erasure
    Across World English Varieties in Large Language Models
  authors: Satyam Kumar Navneet, Joydeep Chandra, Yong Zhang
  abstract: 'Large Language Models (LLMs) are increasingly used to ``professionalize''''
    workplace communication, often at the cost of linguistic identity. We introduce
    "Cultural Ghosting", the systematic erasure of linguistic markers unique to non-native
    English varieties during text processing. Through analysis of 22,350 LLM outputs
    generated from 1,490 culturally marked texts (Indian, Singaporean,& Nigerian English)
    processed by five models under three prompt conditions, we quantify this phenomenon
    using two novel metrics: Identity Erasure Rate (IER) & Semantic Preservation Score
    (SPS). Across all prompts, we find an overall IER of 10.26%, with model-level
    variation from 3.5% to 20.5% (5.9x range). Crucially, we identify a Semantic Preservation
    Paradox: models maintain high semantic similarity (mean SPS = 0.748) while systematically
    erasing cultural markers. Pragmatic markers (politeness conventions) are 1.9x
    more vulnerable than lexical markers (71.5% vs. 37.1% erasure). Our experiments
    demonstrate that explicit cultural-preservation prompts reduce erasure by 29%
    without sacrificing semantic quality.'
  published: '2026-02-25'
  pdf_url: http://arxiv.org/pdf/2602.22145
  arxiv_url: http://arxiv.org/abs/2602.22145
  key_findings: 'Large Language Models (LLMs) are increasingly used to ``professionalize''''
    workplace communication, often at the cost of linguistic identity. We introduce
    "Cultural Ghosting", the systematic erasure of linguistic markers unique to non-native
    English varieties during text processing. Through analysis of 22,350 LLM outputs
    generated from 1,490 culturally marked texts (Indian, Singaporean,& Nigerian English)
    processed by five models under three prompt conditions, we quantify this phenomenon
    using two novel metrics: Identity Erasure Rate (IER) & Semantic Preservation Score
    (SPS).'
- id: '2602.22144'
  title: 'NoLan: Mitigating Object Hallucinations in Large Vision-Language Models
    via Dynamic Suppression of Language Priors'
  authors: Lingfeng Ren, Weihao Yu, Runpeng Yu, Xinchao Wang
  abstract: 'Object hallucination is a critical issue in Large Vision-Language Models
    (LVLMs), where outputs include objects that do not appear in the input image.
    A natural question arises from this phenomenon: Which component of the LVLM pipeline
    primarily contributes to object hallucinations? The vision encoder to perceive
    visual information, or the language decoder to generate text responses? In this
    work, we strive to answer this question through designing a systematic experiment
    to analyze the roles of the vision encoder and the language decoder in hallucination
    generation. Our observations reveal that object hallucinations are predominantly
    associated with the strong priors from the language decoder. Based on this finding,
    we propose a simple and training-free framework, No-Language-Hallucination Decoding,
    NoLan, which refines the output distribution by dynamically suppressing language
    priors, modulated based on the output distribution difference between multimodal
    and text-only inputs. Experimental results demonstrate that NoLan effectively
    reduces object hallucinations across various LVLMs on different tasks. For instance,
    NoLan achieves substantial improvements on POPE, enhancing the accuracy of LLaVA-1.5
    7B and Qwen-VL 7B by up to 6.45 and 7.21, respectively. The code is publicly available
    at: https://github.com/lingfengren/NoLan.'
  published: '2026-02-25'
  pdf_url: http://arxiv.org/pdf/2602.22144
  arxiv_url: http://arxiv.org/abs/2602.22144
  key_findings: 'Object hallucination is a critical issue in Large Vision-Language
    Models (LVLMs), where outputs include objects that do not appear in the input
    image. A natural question arises from this phenomenon: Which component of the
    LVLM pipeline primarily contributes to object hallucinations. The vision encoder
    to perceive visual information, or the language decoder to generate text responses.'
- id: '2602.22124'
  title: 'SWE-Protégé: Learning to Selectively Collaborate With an Expert Unlocks
    Small Language Models as Software Engineering Agents'
  authors: Patrick Tser Jern Kon, Archana Pradeep, Ang Chen, Alexander P. Ellis, Warren
    Hunt, Zijian Wang, John Yang, Samuel Thompson
  abstract: Small language models (SLMs) offer compelling advantages in cost, latency,
    and adaptability, but have so far lagged behind larger models on long-horizon
    software engineering tasks such as SWE-bench, where they suffer from pervasive
    action looping and low resolution rates. We introduce SWE-Protégé, a post-training
    framework that reframes software repair as an expert-protégé collaboration problem.
    In SWE-Protégé, an SLM remains the sole decision-maker while learning to selectively
    seek guidance from a strong expert model, recognize stalled states, and follow
    through on expert feedback. Our approach combines supervised fine-tuning on expert-augmented
    trajectories with agentic reinforcement learning that explicitly discourages degenerative
    looping and unproductive expert collaboration. We lightly post-train Qwen2.5-Coder-7B-Instruct
    to achieve 42.4% Pass@1 on SWE-bench Verified, a +25.4% improvement over the prior
    SLM state of the art, while using expert assistance sparsely (~4 calls per task
    and 11% of total tokens).
  published: '2026-02-25'
  pdf_url: http://arxiv.org/pdf/2602.22124
  arxiv_url: http://arxiv.org/abs/2602.22124
  key_findings: Small language models (SLMs) offer compelling advantages in cost,
    latency, and adaptability, but have so far lagged behind larger models on long-horizon
    software engineering tasks such as SWE-bench, where they suffer from pervasive
    action looping and low resolution rates. We introduce SWE-Protégé, a post-training
    framework that reframes software repair as an expert-protégé collaboration problem.
    In SWE-Protégé, an SLM remains the sole decision-maker while learning to selectively
    seek guidance from a strong expert model, recognize stalled states, and follow
    through on expert feedback.
- id: '2602.22107'
  title: 'Don''t stop me now: Rethinking Validation Criteria for Model Parameter Selection'
  authors: Andrea Apicella, Francesco Isgrò, Andrea Pollastro, Roberto Prevete
  abstract: 'Despite the extensive literature on training loss functions, the evaluation
    of generalization on the validation set remains underexplored. In this work, we
    conduct a systematic empirical and statistical study of how the validation criterion
    used for model selection affects test performance in neural classifiers, with
    attention to early stopping. Using fully connected networks on standard benchmarks
    under $k$-fold evaluation, we compare: (i) early stopping with patience and (ii)
    post-hoc selection over all epochs (i.e. no early stopping). Models are trained
    with cross-entropy, C-Loss, or PolyLoss; the model parameter selection on the
    validation set is made using accuracy or one of the three loss functions, each
    considered independently. Three main findings emerge. (1) Early stopping based
    on validation accuracy performs worst, consistently selecting checkpoints with
    lower test accuracy than both loss-based early stopping and post-hoc selection.
    (2) Loss-based validation criteria yield comparable and more stable test accuracy.
    (3) Across datasets and folds, any single validation rule often underperforms
    the test-optimal checkpoint. Overall, the selected model typically achieves test-set
    performance statistically lower than the best performance across all epochs, regardless
    of the validation criterion. Our results suggest avoiding validation accuracy
    (in particular with early stopping) for parameter selection, favoring loss-based
    validation criteria.'
  published: '2026-02-25'
  pdf_url: http://arxiv.org/pdf/2602.22107
  arxiv_url: http://arxiv.org/abs/2602.22107
