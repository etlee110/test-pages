- id: '2603.08652'
  title: 'CoCo: Code as CoT for Text-to-Image Preview and Rare Concept Generation'
  authors: Haodong Li, Chunmei Qing, Huanyu Zhang, Dongzhi Jiang, Yihang Zou, Hongbo
    Peng, Dingming Li, Yuhong Dai, ZePeng Lin, Juanxi Tian, Yi Zhou, Siqi Dai, Jingwei
    Wu
  abstract: 'Recent advancements in Unified Multimodal Models (UMMs) have significantly
    advanced text-to-image (T2I) generation, particularly through the integration
    of Chain-of-Thought (CoT) reasoning. However, existing CoT-based T2I methods largely
    rely on abstract natural-language planning, which lacks the precision required
    for complex spatial layouts, structured visual elements, and dense textual content.
    In this work, we propose CoCo (Code-as-CoT), a code-driven reasoning framework
    that represents the reasoning process as executable code, enabling explicit and
    verifiable intermediate planning for image generation. Given a text prompt, CoCo
    first generates executable code that specifies the structural layout of the scene,
    which is then executed in a sandboxed environment to render a deterministic draft
    image. The model subsequently refines this draft through fine-grained image editing
    to produce the final high-fidelity result. To support this training paradigm,
    we construct CoCo-10K, a curated dataset containing structured draft-final image
    pairs designed to teach both structured draft construction and corrective visual
    refinement. Empirical evaluations on StructT2IBench, OneIG-Bench, and LongText-Bench
    show that CoCo achieves improvements of +68.83%, +54.8%, and +41.23% over direct
    generation, while also outperforming other generation methods empowered by CoT.
    These results demonstrate that executable code is an effective and reliable reasoning
    paradigm for precise, controllable, and structured text-to-image generation. The
    code is available at: https://github.com/micky-li-hd/CoCo'
  published: '2026-03-09'
  pdf_url: http://arxiv.org/pdf/2603.08652
  arxiv_url: http://arxiv.org/abs/2603.08652
  key_findings: Recent advancements in Unified Multimodal Models (UMMs) have significantly
    advanced text-to-image (T2I) generation, particularly through the integration
    of Chain-of-Thought (CoT) reasoning. However, existing CoT-based T2I methods largely
    rely on abstract natural-language planning, which lacks the precision required
    for complex spatial layouts, structured visual elements, and dense textual content.
    In this work, we propose CoCo (Code-as-CoT), a code-driven reasoning framework
    that represents the reasoning process as executable code, enabling explicit and
    verifiable intermediate planning for image generation.
- id: '2603.08640'
  title: 'PostTrainBench: Can LLM Agents Automate LLM Post-Training?'
  authors: Ben Rank, Hardik Bhatnagar, Ameya Prabhu, Shira Eisenberg, Karina Nguyen,
    Matthias Bethge, Maksym Andriushchenko
  abstract: 'AI agents have become surprisingly proficient at software engineering
    over the past year, largely due to improvements in reasoning capabilities. This
    raises a deeper question: can these systems extend their capabilities to automate
    AI research itself? In this paper, we explore post-training, the critical phase
    that turns base LLMs into useful assistants. We introduce PostTrainBench to benchmark
    how well LLM agents can perform post-training autonomously under bounded compute
    constraints (10 hours on one H100 GPU). We ask frontier agents (e.g., Claude Code
    with Opus 4.6) to optimize the performance of a base LLM on a particular benchmark
    (e.g., Qwen3-4B on AIME). Importantly, we do not provide any predefined strategies
    to the agents and instead give them full autonomy to find necessary information
    on the web, run experiments, and curate data. We find that frontier agents make
    substantial progress but generally lag behind instruction-tuned LLMs from leading
    providers: 23.2% for the best agent vs. 51.1% for official instruction-tuned models.
    However, agents can exceed instruction-tuned models in targeted scenarios: GPT-5.1
    Codex Max achieves 89% on BFCL with Gemma-3-4B vs. 67% for the official model.
    We also observe several failure modes worth flagging. Agents sometimes engage
    in reward hacking: training on the test set, downloading existing instruction-tuned
    checkpoints instead of training their own, and using API keys they find to generate
    synthetic data without authorization. These behaviors are concerning and highlight
    the importance of careful sandboxing as these systems become more capable. Overall,
    we hope PostTrainBench will be useful for tracking progress in AI R&D automation
    and for studying the risks that come with it. Website and code are available at
    https://posttrainbench.com/.'
  published: '2026-03-09'
  pdf_url: http://arxiv.org/pdf/2603.08640
  arxiv_url: http://arxiv.org/abs/2603.08640
  key_findings: 'AI agents have become surprisingly proficient at software engineering
    over the past year, largely due to improvements in reasoning capabilities. This
    raises a deeper question: can these systems extend their capabilities to automate
    AI research itself. In this paper, we explore post-training, the critical phase
    that turns base LLMs into useful assistants.'
